<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>미리토퍼 북마크</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink: #e91e8c;
      --border: #d4c97a;
      --yellow: #fffacd;
      --yellow-hdr: #f5f0a0;
      --hover-bg: #fff7e6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #fafafa; color: #333; padding: 32px 20px 80px; }

    h1 { text-align: center; font-size: 1.3rem; font-weight: 700; color: var(--pink); margin-bottom: 24px; letter-spacing: 2px; }
    h1::before, h1::after { content: "♥"; margin: 0 6px; }

    a { color: #1a6abf; text-decoration: none; transition: color .13s; }
    a:hover { color: #e91e8c; text-decoration: underline; }

    /* ── 바로가기 아이콘 그리드 ── */
    .section-title { font-size: .82rem; font-weight: 800; color: #888; margin: 20px 0 10px; letter-spacing: 1px; }
    .bm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(68px, 1fr));
      gap: 10px;
      max-width: 960px;
      margin: 0 auto;
    }
    .bm-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
    .bm-icon { width: 54px; height: 54px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.45rem; box-shadow: 0 2px 8px rgba(0,0,0,.08); transition: transform .13s; }
    .bm-item:hover .bm-icon { transform: scale(1.09); }
    .bm-name { font-size: .6rem; color: #666; font-weight: 600; text-align: center; line-height: 1.3; max-width: 66px; word-break: keep-all; }

    /* ── 행 섹션 ── */
    .rows-wrap { max-width: 960px; margin: 0 auto; }
    .row-block { margin-bottom: 20px; }
    .row-block-hd { font-size: .82rem; font-weight: 800; color: #555; padding-bottom: 6px; margin-bottom: 8px; border-bottom: 1.5px solid #F0ECE8; }
    .row-sites { display: flex; flex-wrap: wrap; gap: 10px; }

    /* ── 로딩/빈 상태 ── */
    .empty { text-align: center; color: #CCC; padding: 40px; font-size: .85rem; }

    /* toast */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 24px; border-radius: 30px; font-size: .82rem; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 200; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<h1>미리토퍼 북마크</h1>

<div id="bm-grid-wrap" style="max-width:960px;margin:0 auto"></div>
<div class="rows-wrap" id="rows-wrap"></div>

<div class="toast" id="toast"></div>

<script>
const FB_SHORTCUTS = 'https://my-workspace-b1b7a-default-rtdb.firebaseio.com/ws5/boss_shortcuts.json';

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function render(){
  try{
    const r = await fetch(FB_SHORTCUTS + '?t=' + Date.now());
    const d = await r.json();
    const shortcuts = Array.isArray(d?.shortcuts) ? d.shortcuts.filter(b => b.showInBookmark !== false) : [];
    const rows = Array.isArray(d?.rows) ? d.rows : [];

    // 바로가기 아이콘 그리드
    const gridEl = document.getElementById('bm-grid-wrap');
    if(shortcuts.length){
      gridEl.innerHTML = `<div class="section-title">⚡ 바로가기</div>
        <div class="bm-grid">${shortcuts.map(b=>`
          <a class="bm-item" ${b.url?`href="${esc(b.url)}" target="_blank"`:'href="#" onclick="return false"'}>
            <div class="bm-icon" style="background:${esc(b.color)}">${esc(b.emoji)}</div>
            <span class="bm-name">${esc(b.name)}</span>
          </a>`).join('')}
        </div>`;
    } else {
      gridEl.innerHTML = '<div class="empty">boss.html에서 바로가기를 추가하면 여기에 표시됩니다</div>';
    }

    // 행 섹션
    const rowsEl = document.getElementById('rows-wrap');
    const filledRows = rows.filter(row => row.title || (row.sites && row.sites.length));
    if(filledRows.length){
      rowsEl.innerHTML = filledRows.map(row => `
        <div class="row-block">
          ${row.title ? `<div class="row-block-hd">${esc(row.title)}</div>` : ''}
          <div class="row-sites">${(row.sites||[]).map(s=>`
            <a class="bm-item" ${s.url?`href="${esc(s.url)}" target="_blank"`:'href="#" onclick="return false"'}>
              <div class="bm-icon" style="background:${esc(s.color)}">${esc(s.emoji)}</div>
              <span class="bm-name">${esc(s.name)}</span>
            </a>`).join('')}
          </div>
        </div>`).join('');
    } else {
      rowsEl.innerHTML = '';
    }
  } catch(e){
    document.getElementById('bm-grid-wrap').innerHTML = '<div class="empty">불러오기 실패 — 새로고침 해주세요</div>';
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2600);
}

render();
// 30초마다 자동 갱신
setInterval(()=>render(), 30000);
</script>
</body>
</html>
