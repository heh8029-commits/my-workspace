<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>미리토퍼 북마크</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #fafafa; color: #333; padding: 32px 20px 80px; }

    h1 { text-align: center; font-size: 1.3rem; font-weight: 700; color: #e91e8c; margin-bottom: 24px; letter-spacing: 2px; }
    h1::before, h1::after { content: "♥"; margin: 0 6px; }

    /* ── 표 영역 ── */
    .bm-table-wrap { max-width: 900px; margin: 0 auto; border: 2px solid #d4c97a; border-radius: 10px; overflow: hidden; background: #fff; }
    .bm-table-head { background: #f5f0a0; text-align: center; padding: 10px; font-size: .88rem; font-weight: 800; color: #555; border-bottom: 2px solid #d4c97a; display: flex; align-items: center; justify-content: space-between; }
    .bm-table-head-label { flex: 1; text-align: center; }
    .bm-table table { width: 100%; border-collapse: collapse; }
    .bm-table td { border: 1px solid #e8e2a0; padding: 0; text-align: center; width: 33.33%; height: 70px; }
    .bm-table td a { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 1.3rem; font-weight: 700; color: #1a6abf; text-decoration: none; padding: 6px 12px; transition: background .12s; }
    .bm-table td a:hover { background: #fffacd; color: #e91e8c; }
    .bm-table td.empty-cell { color: #ddd; font-size: .9rem; }
    .bm-table td.empty-cell span { display: flex; align-items: center; justify-content: center; height: 100%; }
    .bm-table td.empty-cell span.addable { cursor: pointer; transition: background .12s; }
    .bm-table td.empty-cell span.addable:hover { background: #fffacd; }

    /* ── 타이틀 행 ── */
    .bm-table tr.title-row td { background: #fffde8; height: 42px; border-bottom: 2px solid #e8e2a0; }
    .bm-table tr.title-row td span { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 1rem; font-weight: 800; color: #888; }
    .bm-table tr.title-row td input { border: none; background: transparent; text-align: center; font-size: 1rem; font-weight: 800; color: #666; width: 100%; height: 100%; font-family: inherit; outline: none; padding: 0 8px; }
    .bm-table tr.title-row td input::placeholder { color: #CCC; font-weight: 400; }

    /* ── 편집 버튼 ── */
    .edit-toggle-btn { padding: 4px 12px; border-radius: 20px; border: 1.5px solid #d4c97a; background: #fff; font-size: .75rem; font-weight: 700; cursor: pointer; color: #888; transition: all .13s; }
    .edit-toggle-btn:hover, .edit-toggle-btn.on { background: #f5f0a0; border-color: #b8a800; color: #555; }

    /* ── 편집 모드 셀 ── */
    .bm-table td.edit-mode { padding: 4px; }
    .cell-edit-wrap { display: flex; flex-direction: column; gap: 2px; height: 100%; }
    .cell-edit-wrap input { border: 1px solid #e0daa0; border-radius: 4px; padding: 2px 4px; font-size: .72rem; font-family: inherit; width: 100%; background: #fffff8; }
    .cell-edit-wrap input::placeholder { color: #CCC; }
    .cell-edit-wrap .cell-btns { display: flex; gap: 2px; }
    .cell-edit-wrap .cell-save-btn { flex: 1; padding: 2px; border-radius: 4px; border: none; background: #f5f0a0; font-size: .65rem; font-weight: 700; cursor: pointer; color: #666; }
    .cell-edit-wrap .cell-save-btn:hover { background: #d4c97a; }
    .cell-edit-wrap .cell-del-btn { padding: 2px 5px; border-radius: 4px; border: none; background: #ffe0e0; font-size: .65rem; cursor: pointer; color: #e03a3a; }
    .drag-handle { text-align: center; color: #CCC; font-size: .85rem; cursor: grab; user-select: none; line-height: 1; padding: 1px 0; }
    .drag-handle:active { cursor: grabbing; }
    .bm-table td.drag-over-cell { background: #fffacd !important; outline: 2px dashed #d4c97a; outline-offset: -2px; }

    /* ── 행 추가/편집 컨트롤 ── */
    .bm-controls { max-width: 900px; margin: 10px auto 0; display: flex; gap: 8px; justify-content: flex-end; }
    .bm-add-row-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px dashed #d4c97a; background: none; font-size: .76rem; font-weight: 700; color: #999; cursor: pointer; transition: all .13s; }
    .bm-add-row-btn:hover { border-color: #b8a800; color: #666; background: #fffacd; }

    /* 편집 모드일 때 td 높이 좀 크게 */
    .edit-mode-active .bm-table td { height: 72px; }

    /* ── toast ── */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 24px; border-radius: 30px; font-size: .82rem; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 200; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<h1>미리토퍼 북마크</h1>

<div class="bm-table-wrap">
  <div class="bm-table-head">
    <div style="width:80px"></div>
    <div class="bm-table-head-label">⚡ 바로가기</div>
    <button class="edit-toggle-btn" id="edit-btn" onclick="toggleEdit()">✏️ 편집</button>
  </div>
  <div class="bm-table" id="bm-table"></div>
</div>
<div class="bm-controls" id="bm-controls" style="display:none">
  <button class="bm-add-row-btn" onclick="addRow()">+ 행 추가</button>
</div>

<div class="toast" id="toast"></div>

<script>
const FB_BM = 'https://my-workspace-b1b7a-default-rtdb.firebaseio.com/ws5/boss_bookmark.json';
const COLS = 3;

let _links = []; // [{id, name, url}]
let _colTitles = ['', '', '']; // 3열 타이틀
let _editMode = false;
let _saveTimer = null;
let _dragIdx = null;

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function load(){
  try{
    const r = await fetch(FB_BM + '?t=' + Date.now());
    const d = await r.json();
    if(d && Array.isArray(d.links)) _links = d.links;
    if(d && Array.isArray(d.colTitles)) _colTitles = d.colTitles;
    render();
  } catch(e){
    document.getElementById('bm-table').innerHTML = '<div style="padding:20px;text-align:center;color:#CCC">불러오기 실패 — 새로고침</div>';
  }
}

function save(){
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async ()=>{
    try{
      await fetch(FB_BM, {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({links: _links, colTitles: _colTitles})});
    } catch(e){ showToast('저장 실패'); }
  }, 600);
}

function render(){
  const tableEl = document.getElementById('bm-table');
  // 총 슬롯 수: 내용이 있는 링크들 + 빈 셀들을 COLS 단위로 행 구성
  // 편집 모드면 맨 마지막에 빈 셀 하나 추가 (추가용)
  const slots = [..._links];

  // 최소 10행(50슬롯) 보장
  while(slots.length < 10 * COLS) slots.push(undefined);

  // COLS 단위로 행 구성
  const rows = [];
  for(let i=0; i<slots.length; i+=COLS){
    rows.push(slots.slice(i, i+COLS));
  }

  // 각 행을 COLS 개로 패딩
  const paddedRows = rows.map(row => {
    while(row.length < COLS) row.push(undefined);
    return row;
  });

  const tableClass = _editMode ? 'edit-mode-active' : '';

  let html = `<table class="${tableClass}"><tbody>`;

  // 타이틀 행
  html += '<tr class="title-row">';
  for(let c=0; c<COLS; c++){
    if(_editMode){
      html += `<td><input value="${esc(_colTitles[c]||'')}" placeholder="타이틀 입력" oninput="_colTitles[${c}]=this.value;save()"></td>`;
    } else {
      html += `<td><span>${esc(_colTitles[c]||'')}</span></td>`;
    }
  }
  html += '</tr>';

  paddedRows.forEach(row => {
    html += '<tr>';
    row.forEach((item, ci) => {
      if(item === undefined){
        if(_editMode){
          html += `<td class="empty-cell"><span class="addable" onclick="addCell()">＋</span></td>`;
        } else {
          html += `<td class="empty-cell"><span>—</span></td>`;
        }
      } else {
        // 실제 링크
        const idx = _links.findIndex(l => l.id === item.id);
        if(_editMode){
          const idx = _links.findIndex(l => l.id === item.id);
          html += `<td class="edit-mode" ondragover="cellDragOver(event,${idx})" ondrop="cellDrop(event,${idx})" ondragleave="cellDragLeave(event)">
            <div class="cell-edit-wrap">
              <div class="drag-handle" draggable="true" ondragstart="cellDragStart(event,${idx})" ondragend="cellDragEnd()">⠿</div>
              <input id="n_${item.id}" value="${esc(item.name)}" placeholder="이름" onkeydown="if(event.key==='Enter')saveCell('${item.id}')">
              <input id="u_${item.id}" value="${esc(item.url)}" placeholder="URL" onkeydown="if(event.key==='Enter')saveCell('${item.id}')">
              <div class="cell-btns">
                <button class="cell-save-btn" onclick="saveCell('${item.id}')">저장</button>
                <button class="cell-del-btn" onclick="delCell('${item.id}')">✕</button>
              </div>
            </div></td>`;
        } else {
          const href = item.url ? (item.url.match(/^https?:\/\//) ? item.url : 'https://'+item.url) : '#';
          html += `<td><a href="${esc(href)}" target="_blank">${esc(item.name)}</a></td>`;
        }
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  tableEl.innerHTML = html;

  document.getElementById('bm-controls').style.display = _editMode ? 'flex' : 'none';
  const editBtn = document.getElementById('edit-btn');
  editBtn.textContent = _editMode ? '✅ 완료' : '✏️ 편집';
  editBtn.classList.toggle('on', _editMode);
}

function cellDragStart(e, idx){ _dragIdx=idx; e.dataTransfer.effectAllowed='move'; }
function cellDragOver(e, idx){
  e.preventDefault();
  document.querySelectorAll('.bm-table td').forEach(td=>td.classList.remove('drag-over-cell'));
  e.currentTarget.classList.add('drag-over-cell');
}
function cellDragLeave(e){ e.currentTarget.classList.remove('drag-over-cell'); }
function cellDrop(e, idx){
  e.preventDefault();
  document.querySelectorAll('.bm-table td').forEach(td=>td.classList.remove('drag-over-cell'));
  if(_dragIdx===null || _dragIdx===idx) return;
  const [moved]=_links.splice(_dragIdx,1);
  _links.splice(idx,0,moved);
  _dragIdx=null;
  save(); render();
}
function cellDragEnd(){
  _dragIdx=null;
  document.querySelectorAll('.bm-table td').forEach(td=>td.classList.remove('drag-over-cell'));
}

function toggleEdit(){
  _editMode = !_editMode;
  render();
}

function addCell(){
  const id = 'bm_' + Date.now();
  _links.push({id, name:'', url:''});
  render();
  // 방금 추가된 셀의 이름 input에 포커스
  setTimeout(()=>{
    const el = document.getElementById('n_'+id);
    if(el) el.focus();
  }, 50);
}

function addRow(){
  // 빈 슬롯이 없으면 새 행(COLS개) 추가
  const remainder = _links.length % COLS;
  const toAdd = remainder === 0 ? COLS : (COLS - remainder);
  for(let i=0; i<toAdd; i++){
    _links.push({id:'bm_'+Date.now()+'_'+i, name:'', url:''});
  }
  save();
  render();
}

function saveCell(id){
  const link = _links.find(l => l.id === id);
  if(!link) return;
  const nameEl = document.getElementById('n_'+id);
  const urlEl = document.getElementById('u_'+id);
  link.name = nameEl ? nameEl.value.trim() : link.name;
  link.url = urlEl ? urlEl.value.trim() : link.url;
  // 이름+URL 둘 다 없으면 삭제
  if(!link.name && !link.url){
    _links = _links.filter(l => l.id !== id);
  }
  save();
  render();
}

function delCell(id){
  _links = _links.filter(l => l.id !== id);
  save();
  render();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2600);
}

load();
</script>
</body>
</html>
