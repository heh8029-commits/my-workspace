<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>미리토퍼 북마크</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink:       #e91e8c;
      --pink-light: #fce4f3;
      --yellow:     #fffacd;
      --yellow-hdr: #f5f0a0;
      --border:     #d4c97a;
      --text:       #333;
      --hover-bg:   #fff7e6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #fafafa;
      color: var(--text);
      padding: 40px 20px 80px;
    }

    h1 {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--pink);
      margin-bottom: 24px;
      letter-spacing: 2px;
    }
    h1::before, h1::after { content: "♥"; margin: 0 6px; }

    a {
      color: #1a6abf;
      text-decoration: none;
      transition: color 0.13s;
    }
    a:hover { color: #e91e8c; text-decoration: underline; }

    /* ── boss 바로가기 표 ── */
    .table-wrap {
      max-width: 960px;
      margin: 0 auto;
      border: 2px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 14px rgba(0,0,0,0.07);
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      background: var(--yellow-hdr);
      font-weight: 700; font-size: 0.88rem;
      padding: 13px 10px;
      border: 1px solid var(--border);
      text-align: center;
    }

    tbody tr { transition: background 0.12s; }
    tbody tr:hover { background: var(--hover-bg); }
    tbody tr:nth-child(even) { background: var(--yellow); }
    tbody tr:nth-child(even):hover { background: var(--hover-bg); }

    tbody td {
      padding: 14px 10px;
      border: 1px solid #e0d9a0;
      text-align: center;
      font-size: 1.15rem;
      vertical-align: middle;
      font-weight: 500;
    }

    tbody td.no-url { color: #bbb; }
    tbody td.empty  { color: #ddd; font-size: 0.72rem; }

    /* toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff;
      padding: 10px 24px; border-radius: 30px;
      font-size: 0.82rem; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s; z-index: 200;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<h1>미리토퍼 북마크</h1>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th colspan="5">⚡ 바로가기</th>
      </tr>
    </thead>
    <tbody id="boss-body"></tbody>
  </table>
</div>

<div class="toast" id="toast"></div>

<script>
const COLS = 5;

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const bms = JSON.parse(localStorage.getItem('boss_bm') || '[]').filter(b => b.showInBookmark !== false);
  const tbody = document.getElementById('boss-body');
  if (!bms.length) {
    tbody.innerHTML = `<tr><td colspan="${COLS}" style="text-align:center;color:#ccc;padding:20px">boss.html에서 바로가기를 추가하면 여기에 표시됩니다</td></tr>`;
    return;
  }
  const rows = [];
  for (let i = 0; i < bms.length; i += COLS) rows.push(bms.slice(i, i + COLS));
  tbody.innerHTML = rows.map(row => {
    const cells = row.map(b => {
      if (!b.name) return '<td class="empty">─</td>';
      if (b.url)   return `<td><a href="${esc(b.url)}" target="_blank">${esc(b.name)}</a></td>`;
      return `<td class="no-url">${esc(b.name)}</td>`;
    });
    while (cells.length < COLS) cells.push('<td class="empty">─</td>');
    return `<tr>${cells.join('')}</tr>`;
  }).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2600);
}

render();

window.addEventListener('storage', e => {
  if (e.key === 'boss_bm') { render(); showToast('바로가기가 업데이트됐어요'); }
});
</script>
</body>
</html>
