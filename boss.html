<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boss</title>
<style>
/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','맑은 고딕',sans-serif;background:#F8F5F0;color:#2C2C2C;font-size:14px;min-height:100vh}
button{font-family:inherit;cursor:pointer}
a{text-decoration:none;color:inherit}

/* ── TOP BAR ── */
.topbar{
  position:sticky;top:0;z-index:300;
  background:#fff;
  border-bottom:1px solid #EDE8E1;
  display:flex;align-items:center;
  padding:0 10px;height:50px;gap:4px;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}
.topbar-menus{display:flex;gap:3px;align-items:center;flex:1;overflow-x:auto;scrollbar-width:none}
.topbar-menus::-webkit-scrollbar{display:none}
.menu-tab{
  display:flex;align-items:center;gap:5px;
  padding:7px 13px;border-radius:20px;
  font-size:.8rem;font-weight:700;
  color:#999;background:transparent;border:none;
  cursor:pointer;white-space:nowrap;transition:all .15s;
}
.menu-tab:hover{background:#F5F0EB;color:#666}
.menu-tab.active{background:#C4714A;color:#fff}
.topbar-right{display:flex;align-items:center;gap:5px;flex-shrink:0;margin-left:6px}
.top-icon-btn{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:#F5F0EB;border:none;font-size:.95rem;
  cursor:pointer;transition:all .15s;color:#888;flex-shrink:0;
}
.top-icon-btn:hover{background:#EDE5DA;color:#C4714A}
.top-icon-btn.on{background:#C4714A;color:#fff}

/* ── 동기화 버튼 ── */
.sync-btn{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:#F5F0EB;border:none;font-size:1rem;
  cursor:pointer;transition:all .15s;color:#C4714A;
  flex-shrink:0;margin-right:4px;
}
.sync-btn:hover{background:#EDE5DA}
.sync-btn.spinning .sync-icon{animation:spin .6s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.sync-icon{display:inline-block;transition:transform .3s}

/* ── DATE BAR ── */
.datebar{
  background:linear-gradient(135deg,#C4714A 0%,#D4895E 100%);
  color:#fff;padding:6px 16px;
  display:flex;align-items:center;justify-content:space-between;
  font-size:.75rem;letter-spacing:.02em;
}
.datebar-l{font-weight:600}
.datebar-r{opacity:.85;font-size:.72rem}

/* ── MOBILE SUBNAV (서브메뉴 - 모바일) ── */
.mobile-subnav{
  background:#fff;border-bottom:1px solid #EDE8E1;
  padding:7px 10px;display:flex;gap:6px;
  overflow-x:auto;scrollbar-width:none;
}
.mobile-subnav::-webkit-scrollbar{display:none}
.mob-sub-item{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 11px;border-radius:14px;
  font-size:.73rem;font-weight:600;color:#999;
  background:#F5F0EB;border:none;white-space:nowrap;
  cursor:pointer;transition:all .13s;flex-shrink:0;
}
.mob-sub-item:hover{color:#C4714A}
.mob-sub-item.active{background:#C4714A;color:#fff}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 82px)}

/* ── SIDEBAR ── */
.sidebar{
  width:172px;flex-shrink:0;
  background:#fff;border-right:1px solid #EDE8E1;
  padding:0 0 20px;overflow-y:auto;
  transition:width .2s;
}
.sidebar-top{
  padding:14px 14px 10px;
  border-bottom:1px solid #F0EBE5;
  font-size:.88rem;font-weight:800;color:#C4714A;
  display:flex;align-items:center;gap:6px;
}
.sid-main{
  display:flex;align-items:center;gap:6px;
  padding:9px 14px 4px;
  font-size:.8rem;font-weight:800;color:#555;
  cursor:pointer;border:none;background:transparent;
  width:100%;text-align:left;margin-top:4px;
}
.sid-main:hover{color:#C4714A}
.sid-main.active{color:#C4714A}
.sid-item{
  display:flex;align-items:center;gap:7px;
  padding:6px 14px 6px 24px;font-size:.76rem;color:#777;
  border:none;background:transparent;width:100%;text-align:left;
  border-left:3px solid transparent;cursor:pointer;transition:all .12s;
}
.sid-item:hover{background:#FDF5F1;color:#C4714A}
.sid-item.active{background:#FDF0EA;color:#C4714A;border-left-color:#C4714A;font-weight:700}

/* ── CONTENT ── */
.content{flex:1;padding:22px 20px;overflow-x:hidden;min-width:0}

/* ── PAGE ── */
.page{display:none}
.page.active{display:block}

/* ── HOME - 바로가기 ── */
.bm-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.bm-title{font-size:.88rem;font-weight:800;color:#555}
.bm-edit-btn{
  padding:5px 13px;border-radius:12px;
  background:#F5F0EB;border:1px solid #EDE8E1;
  font-size:.72rem;font-weight:700;color:#999;
  cursor:pointer;transition:all .13s;
}
.bm-edit-btn:hover{background:#EDE5DA;color:#C4714A}

.bm-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(68px,1fr));
  gap:10px;
}
.bm-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;
}
.bm-icon{
  width:54px;height:54px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.45rem;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  transition:transform .13s;
}
.bm-item:hover .bm-icon{transform:scale(1.09)}
.bm-name{
  font-size:.6rem;color:#666;font-weight:600;
  text-align:center;line-height:1.3;max-width:66px;
  word-break:keep-all;
}

/* 팝업용 작은 그리드 */
.bm-grid-sm{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(50px,1fr));
  gap:7px;
}
.bm-grid-sm .bm-icon{
  width:40px;height:40px;border-radius:11px;
  font-size:1.1rem;
}
.bm-grid-sm .bm-name{
  font-size:.54rem;max-width:50px;
}

/* ── CONTENT PLACEHOLDER ── */
.placeholder{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:70px 20px;
  color:#CCC;text-align:center;
}
.placeholder .ph-icon{font-size:2.8rem;margin-bottom:14px}
.placeholder .ph-title{font-size:.95rem;font-weight:700;color:#BBA99A;margin-bottom:6px}
.placeholder .ph-sub{font-size:.78rem;color:#CCBBAE}

/* ── IFRAME 페이지 ── */
.page-iframe-wrap{
  display:flex;flex-direction:column;
  height:calc(100vh - 82px);
  margin:-22px -20px;
}
.page-iframe-wrap iframe{
  flex:1;border:none;width:100%;
}

/* ── BOOKMARK POPUP (헤더 바로가기 아이콘) ── */
.bm-overlay{
  display:none;position:fixed;inset:0;z-index:400;
}
.bm-overlay.open{display:block}
.bm-popup{
  position:absolute;top:54px;right:10px;
  width:450px;max-height:200px;overflow-y:auto;
  background:#fff;border-radius:16px;
  box-shadow:0 8px 36px rgba(0,0,0,.16);
  padding:12px 14px;scrollbar-width:thin;
}
.bm-popup-title{
  font-size:.68rem;font-weight:700;color:#BBA99A;
  text-align:center;margin-bottom:8px;letter-spacing:.05em;
}
.bm-popup-backdrop{position:fixed;inset:0;z-index:-1}

/* ── BOOKMARK EDITOR MODAL ── */
.modal-bg{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.38);
  align-items:center;justify-content:center;
}
.modal-bg.open{display:flex}
.modal{
  background:#fff;border-radius:22px;
  padding:20px 20px 16px;width:min(480px,94vw);
  max-height:85vh;overflow-y:auto;
  box-shadow:0 14px 44px rgba(0,0,0,.2);
}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.modal-head-title{font-size:.95rem;font-weight:800;color:#333}
.modal-x{
  width:30px;height:30px;border-radius:50%;border:none;
  background:#F0EBE5;color:#999;font-size:1rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .13s;
}
.modal-x:hover{background:#E5DDD6;color:#555}
.bm-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}

/* 일반 행 */
.bm-row{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:12px;background:#F8F5F0;
  transition:background .12s;
}
.bm-row-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.25rem;flex-shrink:0;
}
.bm-row-info{flex:1;min-width:0}
.bm-row-name{font-size:.78rem;font-weight:700;color:#333}
.bm-row-url{font-size:.63rem;color:#BBB;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bm-row-btns{display:flex;gap:5px;flex-shrink:0}
.rbtn{padding:4px 9px;border-radius:8px;border:none;font-size:.68rem;font-weight:700;cursor:pointer;transition:all .12s}
.rbtn-e{background:#E8F0FF;color:#3A7FE0}
.rbtn-e:hover{background:#D4E4FF}
.rbtn-d{background:#FFE8E8;color:#E03A3A}
.rbtn-d:hover{background:#FFD4D4}
.rbtn-bm{background:#E8F8EE;color:#27AE60}
.rbtn-bm:hover{background:#D4F0E0}
.rbtn-bm.off{background:#F0F0F0;color:#BBB}
.rbtn-bm.off:hover{background:#E8E8E8}

/* 인라인 편집 행 */
.bm-row-edit{
  background:#FDF0EA;border-radius:12px;
  padding:10px 12px;border:1.5px solid #E8C4A8;
}
.inline-row1{display:flex;gap:8px;align-items:center;margin-bottom:7px}
.inline-emoji-preview{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.35rem;flex-shrink:0;
}
.inline-name{flex:1;padding:6px 10px;border:1.5px solid #E8C4A8;border-radius:9px;font-size:.8rem;font-family:inherit;outline:none;background:#fff}
.inline-name:focus{border-color:#C4714A}
.inline-emoji{width:54px;padding:6px 8px;border:1.5px solid #E8C4A8;border-radius:9px;font-size:.8rem;font-family:inherit;outline:none;background:#fff;text-align:center}
.inline-emoji:focus{border-color:#C4714A}
.inline-url{width:100%;padding:6px 10px;border:1.5px solid #E8C4A8;border-radius:9px;font-size:.78rem;font-family:inherit;outline:none;background:#fff;margin-bottom:7px}
.inline-url:focus{border-color:#C4714A}
.inline-colors{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.icswatch{width:24px;height:24px;border-radius:7px;cursor:pointer;border:2px solid transparent;transition:all .12s;flex-shrink:0}
.icswatch.sel{border-color:#333;transform:scale(1.2)}
.inline-bm-label{display:flex;align-items:center;gap:6px;font-size:.76rem;color:#888;margin-bottom:8px;cursor:pointer}
.inline-bm-label input{width:15px;height:15px;accent-color:#C4714A;cursor:pointer}
.inline-btns{display:flex;gap:7px}
.ibtn{flex:1;padding:7px;border-radius:9px;border:none;font-size:.76rem;font-weight:700;cursor:pointer;transition:all .13s}
.ibtn-save{background:#C4714A;color:#fff}
.ibtn-save:hover{background:#B46040}
.ibtn-cancel{background:#EDE5DA;color:#888}
.ibtn-cancel:hover{background:#E0D8D0}

.add-bm-btn{
  width:100%;padding:9px;border-radius:12px;
  background:#F5F0EB;border:1.5px dashed #D4B8A8;
  font-size:.78rem;font-weight:700;color:#C4714A;
  cursor:pointer;transition:all .13s;
}
.add-bm-btn:hover{background:#EDE5DA}
.modal-done-btn{
  width:100%;padding:10px;border-radius:14px;background:#C4714A;
  border:none;font-size:.82rem;font-weight:800;color:#fff;
  cursor:pointer;margin-top:10px;transition:all .13s;
}
.modal-done-btn:hover{background:#B46040}
.form-input{
  width:100%;padding:8px 11px;border:1.5px solid #E8E0D8;
  border-radius:10px;font-size:.8rem;color:#333;background:#fff;
  outline:none;transition:border .13s;font-family:inherit;
}
.form-input:focus{border-color:#C4714A}
.color-swatches{display:flex;gap:7px;flex-wrap:wrap}
.cswatch{width:26px;height:26px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all .13s}
.cswatch.sel{border-color:#333;transform:scale(1.18)}

/* ── ALARM PAGE ── */
.alarm-section-title{font-size:.88rem;font-weight:800;color:#555;margin-bottom:12px;margin-top:4px}
.alarm-add-card{background:#fff;border-radius:16px;padding:16px;border:1px solid #EDE8E1;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.alarm-add-top{display:flex;gap:7px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.alarm-time-input{padding:7px 10px;border:1.5px solid #E8E0D8;border-radius:9px;font-size:.82rem;font-family:inherit;outline:none;background:#fff;transition:border .13s;flex-shrink:0}
.alarm-time-input:focus{border-color:#C4714A}
.alarm-label-input{flex:1;min-width:100px;padding:7px 10px;border:1.5px solid #E8E0D8;border-radius:9px;font-size:.82rem;font-family:inherit;outline:none;background:#fff;transition:border .13s}
.alarm-label-input:focus{border-color:#C4714A}
.alarm-day-checks{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.day-check-lbl{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;background:#F5F0EB;font-size:.75rem;font-weight:700;color:#888;cursor:pointer;transition:all .13s;user-select:none;border:2px solid transparent}
.day-check-lbl.checked{background:#C4714A;color:#fff;border-color:#C4714A}
.alarm-add-btn{width:100%;padding:9px;border-radius:10px;background:#C4714A;color:#fff;border:none;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .13s}
.alarm-add-btn:hover{background:#B46040}
.alarm-divider{border:none;border-top:1px solid #EDE8E1;margin:6px 0 18px}
.alarm-list{display:flex;flex-direction:column;gap:8px}
.alarm-row{display:flex;align-items:center;gap:9px;padding:10px 13px;border-radius:13px;background:#F8F5F0}
.alarm-row-left{flex:1;min-width:0}
.alarm-row-meta{display:flex;align-items:baseline;gap:7px}
.alarm-row-time{font-size:.9rem;font-weight:800;color:#C4714A}
.alarm-row-lbl{font-size:.8rem;color:#555}
.alarm-day-tags{margin-top:4px;display:flex;gap:3px;flex-wrap:wrap}
.alarm-day-tag{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:8px;background:#EDE0FF;color:#7A5CCB}
.alarm-day-tag.daily{background:#FFE8D6;color:#C4714A}
.alarm-toggle{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0}
.alarm-toggle input{opacity:0;width:0;height:0;position:absolute}
.alarm-toggle-sl{position:absolute;cursor:pointer;inset:0;background:#E0D8D0;border-radius:20px;transition:.2s}
.alarm-toggle-sl:before{content:'';position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.alarm-toggle input:checked+.alarm-toggle-sl{background:#C4714A}
.alarm-toggle input:checked+.alarm-toggle-sl:before{transform:translateX(16px)}
.alarm-btn-edit{padding:4px 8px;border-radius:7px;border:none;background:#E8F0FF;color:#3A7FE0;font-size:.68rem;font-weight:700;cursor:pointer;flex-shrink:0}
.alarm-btn-edit:hover{background:#D4E4FF}
.alarm-row-del{padding:4px 8px;border-radius:7px;border:none;background:#FFE8E8;color:#E03A3A;font-size:.68rem;font-weight:700;cursor:pointer;flex-shrink:0}
.alarm-row-del:hover{background:#FFD4D4}
.alarm-row-edit-form{background:#FDF0EA;border-radius:13px;padding:12px 14px;border:1.5px solid #E8C4A8;display:flex;flex-direction:column;gap:9px}
.alarm-edit-top{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.alarm-empty{text-align:center;padding:24px;color:#CCC;font-size:.8rem}
.alarm-tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:13px;border:1px solid #EDE8E1;background:#fff}
.alarm-table{width:100%;border-collapse:collapse;font-size:.78rem;min-width:380px}
.alarm-table th{padding:8px 3px;text-align:center;font-size:.68rem;font-weight:700;color:#AAA;border-bottom:2px solid #EDE8E1;white-space:nowrap;background:#FAFAF8}
.alarm-table th.col-t{text-align:left;padding-left:12px;min-width:50px}
.alarm-table th.col-n{text-align:left;min-width:60px}
.alarm-table td{padding:9px 3px;text-align:center;border-bottom:1px solid #F5F0EB;vertical-align:middle}
.alarm-table tbody tr:last-child td{border-bottom:none}
.alarm-table td.col-t{text-align:left;padding-left:12px;font-size:.88rem;font-weight:800;color:#C4714A;white-space:nowrap}
.alarm-table td.col-n{text-align:left;font-size:.78rem;color:#555;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:6px}
.alarm-table td.col-d{width:26px}
.alarm-dot{width:13px;height:13px;border-radius:50%;background:#C4714A;display:inline-block}
.alarm-dot.daily{background:#D4895E}
.alarm-table tr:hover td{background:#FDF8F5}
.alarm-tbl-btns{display:flex;gap:3px;align-items:center;justify-content:flex-end;padding-right:6px;flex-wrap:nowrap}
.alarm-edit-colspan td{padding:0}
.alarm-edit-colspan .alarm-row-edit-form{margin:6px 8px;border-radius:10px}
/* ── 브라우저 알림 팝업 ── */
.alarm-notify{position:fixed;bottom:20px;right:20px;z-index:9999;background:#fff;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.18);padding:14px 18px;min-width:230px;max-width:300px;border-left:4px solid #C4714A;transform:translateY(20px);opacity:0;transition:transform .3s ease,opacity .3s ease;pointer-events:none}
.alarm-notify.show{transform:translateY(0);opacity:1;pointer-events:auto}
.alarm-notify-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.alarm-notify-title{font-size:.82rem;font-weight:800;color:#C4714A}
.alarm-notify-close{border:none;background:none;font-size:1rem;cursor:pointer;color:#CCC;padding:0;line-height:1}
.alarm-notify-close:hover{color:#999}
.alarm-notify-body{font-size:.9rem;color:#333;font-weight:600}
.alarm-notify-time{font-size:.7rem;color:#BBB;margin-top:3px}
/* ── VIEW MODE ── */
/* 기본: 화면 너비로 자동 판단 */
.mobile-subnav{display:none}
@media(max-width:767px){
  .sidebar{display:none}
  .mobile-subnav{display:flex}
}
/* 강제 PC 모드 */
body.mode-pc .sidebar{display:block!important}
body.mode-pc .mobile-subnav{display:none!important}
/* 강제 모바일 모드 */
body.mode-mob .sidebar{display:none!important}
body.mode-mob .mobile-subnav{display:flex!important}
/* ── 손익 메모 ── */
.pnl-memo-add{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:14px;border:1px solid #EDE8E1;display:flex;gap:8px;align-items:center}
.pnl-memo-input{flex:1;padding:8px 12px;border-radius:9px;border:1.5px solid #EDE8E1;font-size:.85rem;font-family:inherit;color:#333;outline:none;min-width:0}
.pnl-memo-input:focus{border-color:#C4714A}
.pnl-memo-add-btn{padding:8px 15px;border-radius:9px;background:#C4714A;color:#fff;border:none;font-size:.8rem;font-weight:700;cursor:pointer;flex-shrink:0;white-space:nowrap}
.pnl-memo-add-btn:hover{background:#B46040}
.pnl-memo-list{display:flex;flex-direction:column;gap:5px}
.pnl-memo-row{display:flex;align-items:center;gap:7px;background:#fff;border-radius:10px;padding:9px 11px;border:1px solid #EDE8E1;transition:background .12s}
.pnl-memo-row:hover{background:#FDF5F1}
.pnl-memo-row.done{opacity:.6}
.pnl-memo-row.done .pnl-memo-text{text-decoration:line-through;color:#BBB}
.pnl-memo-check{width:16px;height:16px;cursor:pointer;accent-color:#C4714A;flex-shrink:0}
.pnl-memo-text{flex:1;font-size:.83rem;color:#333;word-break:break-all;line-height:1.4;min-width:0}
.pnl-memo-date{font-size:.66rem;color:#CCC;white-space:nowrap;flex-shrink:0}
.pnl-memo-actions{display:flex;gap:2px;flex-shrink:0}

<body>

<!-- ── TOP BAR ── -->
<header class="topbar">

</div>

<!-- ── LAYOUT ── -->

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">🎀 My Boss</div>
  </aside>

  <!-- CONTENT -->
  <main class="content">

    <!-- 홈 -->
    <div class="page active" id="page-home">

      </div>

    <!-- 알림설정 페이지 -->
    <div class="page" id="page-alarm">
      <div style="max-width:620px">

        <div style="background:#FDF0EA;border-radius:14px;padding:16px;margin-bottom:18px;border:1px solid #E8C4A8">
          <div style="font-size:.85rem;font-weight:800;color:#C4714A;margin-bottom:12px">🔔 알람 추가</div>

            <input type="text" id="new-alarm-label" placeholder="알람 이름" maxlength="30" style="flex:1;min-width:120px;padding:7px 10px;border-radius:9px;border:1.5px solid #E8C4A8;font-size:.85rem;background:#fff;color:#333;font-family:inherit">
          </div>

            <span class="day-check-lbl" onclick="toggleNewDay(this,'월')">월</span>
            <span class="day-check-lbl" onclick="toggleNewDay(this,'화')">화</span>
            <span class="day-check-lbl" onclick="toggleNewDay(this,'수')">수</span>
            <span class="day-check-lbl" onclick="toggleNewDay(this,'목')">목</span>
            <span class="day-check-lbl" onclick="toggleNewDay(this,'금')">금</span>
            <span class="day-check-lbl" onclick="toggleNewDay(this,'토')">토</span>

      </div>
    </div>

          <div style="font-size:.9rem;font-weight:800;color:#555">📈 월별손익 메모</div>
          <button onclick="fetchPnlMemos().then(()=>renderPnlMemos())" style="padding:5px 11px;border-radius:9px;background:#F5F0EB;border:1px solid #EDE8E1;font-size:.72rem;font-weight:700;color:#C4714A;cursor:pointer">🔄 새로고침</button>

// ── 사이드바 렌더 (전체 메뉴 항상 표시) ──────────────────
function renderSidebar(){
  const el = document.getElementById('sidebar');
  let html = '<div class="sidebar-top">🎀 My Boss</div>';
  for(const m of MENUS){
    const isMainActive = activeMenu===m.id;
    html += `<button class="sid-main${isMainActive?' active':''}" onclick="setMenu('${m.id}')">
      ${m.emoji} ${m.label}
    </button>`;
    if(m.sub && m.sub.length){
      html += m.sub.map(s=>
        `<button class="sid-item${activeSubMenu===s.id?' active':''}" onclick="setSub('${s.id}','${s.label}')">
          ${s.emoji} ${s.label}
        </button>`
      ).join('');
    }
  }
  el.innerHTML = html;
}

// ── 모바일 서브메뉴 렌더 ──────────────────────────────────
function renderMobileSub(){
  const m = MENUS.find(x=>x.id===activeMenu);
  const el = document.getElementById('mobile-subnav');
  if(!m||!m.sub||!m.sub.length){el.innerHTML='';return;}
  el.innerHTML = m.sub.map(s=>
    `<button class="mob-sub-item${activeSubMenu===s.id?' active':''}" onclick="setSub('${s.id}','${s.label}')">
      ${s.emoji} ${s.label}
    </button>`
  ).join('');
}

// ── 메뉴 이동 ──────────────────────────────────────────────
function setMenu(id){
  activeMenu=id; activeSubMenu=null;
  renderTopMenu(); renderSidebar(); renderMobileSub();
  if(id==='home'){ showPage('home'); }
  else if(id==='alarm'){ showPage('alarm'); renderAllAlarmLists(); }
  else if(id==='search'){ showPage('sub'); document.getElementById('ph-title').textContent='전체검색 — 준비 중'; }
  else { showPage('sub'); }
}

function setSub(id, label){
  activeSubMenu=id;

  // 어느 부모 메뉴에 속한 서브아이템인지 전체 탐색
  let subItem = null;
  for(const m of MENUS){
    if(m.sub){
      const found = m.sub.find(s=>s.id===id);
      if(found){ subItem=found; activeMenu=m.id; break; }
    }
  }

  renderTopMenu(); renderSidebar(); renderMobileSub();

  if(subItem && subItem.url){
    const fr = document.getElementById('embed-frame');
    const base = subItem.url.split('#')[0];
    const hash = subItem.url.includes('#') ? '#' + subItem.url.split('#')[1] : '';
    // 동일 페이지면 hash만 교체해서 hashchange 이벤트 발생 → 내부 탭 전환
    if(fr.src && fr.src.split('#')[0] === base && fr.src.split('?')[0] === base){
      fr.contentWindow && (fr.contentWindow.location.hash = hash.slice(1) || '');
    } else {
      fr.src = subItem.url;
    }
    showPage('iframe');
  } else if(id==='alarm'){
    showPage('alarm'); renderAllAlarmLists();
  } else if(id==='expense'){
    showPage('expense');
    fetchExpenses().then(()=>renderExpenses());
  } else if(id==='profit'){
    showPage('profit');
    fetchPnlMemos().then(()=>renderPnlMemos());
    fetchCalcData().then(()=>renderCalc());
  } else {
    document.getElementById('ph-title').textContent = label;
    showPage('sub');
  }
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const el = document.getElementById('page-'+id);
  if(el) el.classList.add('active');
}

function renderEditorList(){
  const listEl = document.getElementById('bm-list');
  let html = '';

  // 신규 추가 폼 (맨 위)
  if(inlineEditId === 'new'){

      return buildInlineForm(b);
    }
    return `
    <div class="bm-row">
      <div class="bm-row-icon" style="background:${b.color}">${b.emoji}</div>
      <div class="bm-row-info">
        <div class="bm-row-name">${b.name}</div>

        <button class="rbtn rbtn-bm${b.showInBookmark===false?' off':''}" onclick="toggleBmVisible(${b.id})">${b.showInBookmark===false?'북마크숨김':'북마크노출'}</button>
        <button class="rbtn rbtn-e" onclick="startEdit(${b.id})">수정</button>
        <button class="rbtn rbtn-d" onclick="delBm(${b.id})">삭제</button>
      </div>
    </div>`;
  }).join('');

  listEl.innerHTML = html;

  // 인라인 폼 색상 스와치 이벤트 & 이모지 미리보기
  if(inlineEditId !== null){
    syncInlinePreview();
  }
}

function buildInlineForm(b){
  const name  = b ? b.name  : '';
  const url   = b ? (b.url||'') : '';
  const emoji = b ? b.emoji : '🔗';
  const color = b ? b.color : COLORS[0];
  selColor = color;

  const swatches = COLORS.map(c=>
    `<div class="icswatch${c===color?' sel':''}" style="background:${c}"
      onclick="pickInlineColor('${c}')"></div>`
  ).join('');

  return `
  <div class="bm-row-edit">
    <div class="inline-row1">
      <div class="inline-emoji-preview" id="inline-preview" style="background:${color}">${emoji}</div>
      <input class="inline-name" id="if-name" value="${name}" placeholder="이름" maxlength="12"
        oninput="syncInlinePreview()">
      <input class="inline-emoji" id="if-emoji" value="${emoji}" placeholder="🔗" maxlength="2"
        oninput="syncInlinePreview()">
    </div>
    <input class="inline-url" id="if-url" value="${url}" placeholder="https://..." type="url">
    <label class="inline-bm-label">
      <input type="checkbox" id="if-bm" ${(b ? b.showInBookmark!==false : true) ? 'checked' : ''}>
      북마크에 표시
    </label>
    <div class="inline-colors" id="inline-colors">${swatches}</div>
    <div class="inline-btns">
      <button class="ibtn ibtn-cancel" onclick="cancelInline()">취소</button>
      <button class="ibtn ibtn-save" onclick="saveInline()">저장</button>
    </div>
  </div>`;
}

function syncInlinePreview(){
  const preview = document.getElementById('inline-preview');
  if(!preview) return;
  const emoji = document.getElementById('if-emoji').value || '🔗';
  preview.textContent = emoji;
  preview.style.background = selColor;
}

function pickInlineColor(c){
  selColor = c;
  document.querySelectorAll('.icswatch').forEach(el=>{
    el.classList.toggle('sel', el.style.background === c || el.style.backgroundColor === c);
  });
  // 더 확실하게 재렌더
  document.getElementById('inline-colors').innerHTML = COLORS.map(col=>
    `<div class="icswatch${col===c?' sel':''}" style="background:${col}"
      onclick="pickInlineColor('${col}')"></div>`
  ).join('');
  syncInlinePreview();
}

function startEdit(id){
  inlineEditId = id;
  renderEditorList();
  // 해당 행으로 부드럽게 스크롤
  setTimeout(()=>{
    const el = document.querySelector('.bm-row-edit');
    if(el) el.scrollIntoView({behavior:'smooth', block:'nearest'});
    const nameEl = document.getElementById('if-name');
    if(nameEl) nameEl.focus();
  }, 50);
}

function addNewInline(){
  inlineEditId = 'new';
  renderEditorList();
  setTimeout(()=>{
    const el = document.querySelector('.bm-row-edit');
    if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
    const nameEl = document.getElementById('if-name');
    if(nameEl) nameEl.focus();
  }, 50);
}

function cancelInline(){
  inlineEditId = null;
  renderEditorList();
}

function saveInline(){
  const name  = (document.getElementById('if-name').value||'').trim();
  const url   = (document.getElementById('if-url').value||'').trim();
  const emoji = (document.getElementById('if-emoji').value||'').trim() || '🔗';
  const showInBookmark = document.getElementById('if-bm').checked;
  if(!name){alert('이름을 입력해주세요!'); return;}

  if(inlineEditId === 'new'){
    const newId = Math.max(0, ...bms.map(b=>b.id)) + 1;
    bms.push({id:newId, name, url, emoji, color:selColor, showInBookmark});
  } else {
    const idx = bms.findIndex(b=>b.id===inlineEditId);
    if(idx>=0) bms[idx] = {id:inlineEditId, name, url, emoji, color:selColor, showInBookmark};
  }
  inlineEditId = null;
  saveBm(); renderEditorList();
}

function toggleBmVisible(id){
  const idx = bms.findIndex(b=>b.id===id);
  if(idx<0) return;
  bms[idx].showInBookmark = bms[idx].showInBookmark === false ? true : false;
  saveBm(); renderEditorList();
}

function delBm(id){
  if(!confirm('삭제할까요?')) return;
  bms=bms.filter(b=>b.id!==id); saveBm(); renderEditorList();
}

// ── 알림설정 ────────────────────────────────────────────────
const WDAY_NAMES = ['일','월','화','수','목','금','토']; // JS getDay() 순서
const FB_ALARMS = 'https://my-workspace-b1b7a-default-rtdb.firebaseio.com/ws5/boss_alarms.json';
let alarmData  = {alarms:[]};
const firedSet = new Set();

async function fetchAlarms(){
  try{
    const r = await fetch(FB_ALARMS + '?t=' + Date.now());
    if(r.ok){
      const d = await r.json();
      if(d && Array.isArray(d.alarms)) alarmData = d;
    }
  }catch(e){ console.log('알람 fetch 실패',e); }
}

function refreshAlarms(){
  document.getElementById('alarm-list-all').innerHTML='<div class="alarm-empty">불러오는 중...</div>';
  fetchAlarms().then(()=>renderAlarmList());
}

const DAY_COLS = ['매일','월','화','수','목','금','토','일'];
let alarmEditId = null;
let editSelDays = new Set();

async function saveAlarms(){
  try{
    await fetch(FB_ALARMS, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(alarmData)
    });
  }catch(e){ console.log('알람 저장 실패',e); }
}

function renderAlarmList(){
  const el = document.getElementById('alarm-list-all');
  if(!el) return;
  if(!alarmData.alarms.length){
    el.innerHTML='<div class="alarm-empty">등록된 알람이 없어요</div>'; return;
  }
  const tbody = alarmData.alarms.map(a=>{
    if(alarmEditId===a.id) return _buildEditRow(a);
    const isDaily = a.days.includes('매일');
    const dots = DAY_COLS.map(d=>{
      const active = isDaily ? d==='매일' : a.days.includes(d);
      return `<td class="col-d">${active?`<span class="alarm-dot${d==='매일'?' daily':''}"></span>`:''}</td>`;
    }).join('');
    return `
    <tr>
      <td class="col-t">${a.time}</td>
      <td class="col-n" title="${a.label}">${a.label}</td>
      ${dots}
      <td>
        <div class="alarm-tbl-btns">
          <label class="alarm-toggle">
            <input type="checkbox" ${a.on?'checked':''} onchange="toggleAlarmOn(${a.id},this.checked)">
            <span class="alarm-toggle-sl"></span>
          </label>
          <button class="alarm-btn-edit" onclick="startAlarmEdit(${a.id})">수정</button>
          <button class="alarm-row-del"  onclick="delAlarm(${a.id})">삭제</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  el.innerHTML = `
  <div class="alarm-tbl-wrap">
    <table class="alarm-table">
      <thead><tr>
        <th class="col-t">시간</th>
        <th class="col-n">이름</th>
        <th>매일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th><th>일</th>
        <th></th>
      </tr></thead>
      <tbody>${tbody}</tbody>
    </table>
  </div>`;
}

function _buildEditRow(a){
  const dayBtns = DAY_COLS.map(d=>
    `<span class="day-check-lbl${editSelDays.has(d)?' checked':''}" onclick="toggleEditDay(this,'${d}')">${d}</span>`
  ).join('');
  return `
  <tr class="alarm-edit-colspan">
    <td colspan="11">
      <div class="alarm-row-edit-form">
        <div class="alarm-edit-top">
          <input type="time" class="alarm-time-input" id="ea-time" value="${a.time}">
          <input type="text" class="alarm-label-input" id="ea-label" value="${a.label}" maxlength="30">
        </div>
        <div class="alarm-day-checks" id="ea-days">${dayBtns}</div>
        <div class="inline-btns">
          <button class="ibtn ibtn-cancel" onclick="cancelAlarmEdit()">취소</button>
          <button class="ibtn ibtn-save"   onclick="saveAlarmEdit(${a.id})">저장</button>
        </div>
      </div>
    </td>
  </tr>`;
}

function startAlarmEdit(id){
  alarmEditId=id;
  const a=alarmData.alarms.find(x=>x.id===id);
  editSelDays=new Set(a?a.days:[]);
  renderAlarmList();
  setTimeout(()=>document.querySelector('.alarm-row-edit-form')?.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function toggleEditDay(el, day){
  if(editSelDays.has(day)){
    editSelDays.delete(day); el.classList.remove('checked');
  } else {
    if(day==='매일'){
      ['월','화','수','목','금','토','일'].forEach(d=>editSelDays.delete(d));
      document.querySelectorAll('#ea-days .day-check-lbl').forEach(e=>{if(e.textContent!=='매일')e.classList.remove('checked');});
    } else {
      editSelDays.delete('매일');
      document.querySelectorAll('#ea-days .day-check-lbl').forEach(e=>{if(e.textContent==='매일')e.classList.remove('checked');});
    }
    editSelDays.add(day); el.classList.add('checked');
  }
}

function cancelAlarmEdit(){ alarmEditId=null; renderAlarmList(); }

async function saveAlarmEdit(id){
  const time  = document.getElementById('ea-time').value;
  const label = (document.getElementById('ea-label').value||'').trim()||'알람';
  if(!time){ alert('시간을 선택해주세요!'); return; }
  if(!editSelDays.size){ alert('요일을 선택해주세요!'); return; }
  const idx=alarmData.alarms.findIndex(a=>a.id===id);
  if(idx>=0) alarmData.alarms[idx]={...alarmData.alarms[idx],time,label,days:[...editSelDays]};
  alarmData.alarms.sort((a,b)=>a.time.localeCompare(b.time));
  alarmEditId=null;
  await saveAlarms();
  renderAlarmList();
}

async function toggleAlarmOn(id,on){
  const a=alarmData.alarms.find(x=>x.id===id);
  if(a){ a.on=on; await saveAlarms(); }
}

async function delAlarm(id){
  if(!confirm('알람을 삭제할까요?')) return;
  alarmData.alarms=alarmData.alarms.filter(a=>a.id!==id);
  await saveAlarms(); renderAlarmList();
}

  } else {
    if(day==='매일'){

async function addNewAlarm(){

  const newId = Math.max(0,...alarmData.alarms.map(a=>a.id),0)+1;
  alarmData.alarms.push({id:newId, time, label, days:[...newAlarmSelDays], on:true});
  alarmData.alarms.sort((a,b)=>a.time.localeCompare(b.time));
  await saveAlarms();

  document.getElementById('new-alarm-label').value='';

(function initAlarmChecker(){
  function check(){
    const now=new Date();
    const hhmm=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    const todayName=WDAY_NAMES[now.getDay()];
    const dateStr=now.toDateString();
    alarmData.alarms.forEach(a=>{
      if(!a.on||a.time!==hhmm) return;
      if(!a.days.includes('매일')&&!a.days.includes(todayName)) return;
      const k=a.id+'_'+hhmm+'_'+dateStr;
      if(!firedSet.has(k)){firedSet.add(k);fireNotify(a.label,hhmm);}
    });
  }
  const now=new Date();
  const msToNext=(60-now.getSeconds())*1000-now.getMilliseconds();
  setTimeout(()=>{check();setInterval(check,60000);},msToNext);
})();

function _setFormStatus(html){ const el=document.getElementById('pnl-form-status'); if(el) el.innerHTML=html; }

function _renderFormImgs(){
  if(!pendingMemoImgs.length){ _setFormStatus(''); return; }
  const previews = pendingMemoImgs.map((url,i)=>`
    <div class="pnl-form-img-preview">
      <img src="${url.replace('/upload/','/upload/w_160,h_160,c_fill/')}" alt="">
      <button class="pnl-form-img-del" onclick="clearMemoImg(${i})" title="제거">✕</button>
    </div>`).join('');
  _setFormStatus(`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:2px">${previews}</div>`);
}

async function _uploadImg(file){
  const idx = pendingMemoImgs.length;
  pendingMemoImgs.push(null); // 자리 확보
  _setFormStatus(`<div class="pnl-uploading">⏳ 업로드 중 (${idx+1}번째)...</div>`);
  try{
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', UPLOAD_PRESET);
    const r = await fetch(CLOUDINARY_URL, {method:'POST', body:fd});
    const d = await r.json();
    if(d.secure_url){
      pendingMemoImgs[idx] = d.secure_url;
      _renderFormImgs();
    } else {
      pendingMemoImgs.splice(idx,1);
      _setFormStatus('<div class="pnl-uploading" style="color:#E03A3A">업로드 실패</div>');
    }
  }catch(e){
    pendingMemoImgs.splice(idx,1);
    _setFormStatus('<div class="pnl-uploading" style="color:#E03A3A">업로드 실패</div>');
    console.log(e);
  }
}

function handleMemoFile(file){ if(file && file.type.startsWith('image/')) _uploadImg(file); }

function handleMemoPaste(e){
  const items = e.clipboardData?.items;
  if(!items) return;
  for(const it of items){
    if(it.type.startsWith('image/')){
      e.preventDefault();
      _uploadImg(it.getAsFile());
      return;
    }
  }
}

function clearMemoImg(idx){
  pendingMemoImgs.splice(idx,1);
  _renderFormImgs();
}

// ── URL 자동 링크 ─────────────────────────────────────────
function _linkify(text){
  const esc = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return esc.replace(/(https?:\/\/[^\s<>"']+)/g,
    '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
}

function _srcIcon(src){ return src==='bot' ? '🤖' : '💻'; }

const _DAY_KO = ['일','월','화','수','목','금','토'];
function _fmtMemoDate(dateStr){
  const today = new Date().toISOString().slice(0,10);
  if(dateStr === today) return '오늘';
  const d = new Date(dateStr + 'T00:00:00');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const day = _DAY_KO[d.getDay()];
  return `${mm}.${dd}(${day})`;
}

async function addPnlMemo(){
  const inp = document.getElementById('pnl-memo-input');
  const text = (inp.value||'').trim();
  const validImgs = pendingMemoImgs.filter(Boolean);
  if(!text && !validImgs.length) return;
  const newId = Math.max(0,...pnlMemos.map(m=>m.id),0)+1;
  const today = new Date().toISOString().slice(0,10);
  const memo = {id:newId, text:text||'', done:false, date:today, source:'pc'};
  if(validImgs.length) memo.images = validImgs;
  pnlMemos.unshift(memo);
  await savePnlMemos();
  inp.value=''; pendingMemoImgs=[]; _setFormStatus(''); renderPnlMemos();
}

async function togglePnlDone(id, done){
  const m=pnlMemos.find(x=>x.id===id);
  if(m){ m.done=done; await savePnlMemos(); renderPnlMemos(); }
}

function copyPnlMemo(i){
  const text = pnlMemos[i]?.text||'';
  navigator.clipboard.writeText(text).catch(()=>{ prompt('복사:', text); });
}

function startPnlEdit(id){ pnlEditId=id; renderPnlMemos(); setTimeout(()=>document.getElementById('pnl-edit-'+id)?.focus(),40); }
function cancelPnlEdit(){ pnlEditId=null; renderPnlMemos(); }

async function savePnlEdit(id){
  const inp = document.getElementById('pnl-edit-'+id);
  const text = (inp?.value||'').trim();
  if(!text){ cancelPnlEdit(); return; }
  const m=pnlMemos.find(x=>x.id===id);
  if(m){ m.text=text; pnlEditId=null; await savePnlMemos(); renderPnlMemos(); }
}

async function deletePnlMemo(id){
  if(!confirm('삭제할까요?')) return;
  pnlMemos=pnlMemos.filter(m=>m.id!==id);
  await savePnlMemos(); renderPnlMemos();
}

async function movePnlMemo(i, dir){
  const j=i+dir;
  if(j<0||j>=pnlMemos.length) return;
  [pnlMemos[i],pnlMemos[j]]=[pnlMemos[j],pnlMemos[i]];
  await savePnlMemos(); renderPnlMemos();
}

        onchange="calcData.income[${i}].name=this.value" onblur="saveCalcData()">
      <input class="pnl-calc-amount" value="${_fmtAmt(+r.amount||0)}" placeholder="금액"
        onchange="onCalcAmtChange('income',${i},this.value)" onblur="saveCalcData()">
      <button class="pnl-calc-del" onclick="delCalcRow('income',${i})">✕</button>
    </div>`).join('');
  const expRows = calcData.expenses.map((r,i)=>{
    const pct = totalExp ? Math.round((+r.amount||0)/totalExp*1000)/10 : 0;
    return `
    <div class="pnl-calc-row">
      <input class="pnl-calc-name" value="${r.name.replace(/"/g,'&quot;')}" placeholder="항목명"
        onchange="calcData.expenses[${i}].name=this.value" onblur="saveCalcData()">
      <input class="pnl-calc-amount" value="${_fmtAmt(+r.amount||0)}" placeholder="금액"
        onchange="onCalcAmtChange('expenses',${i},this.value)" onblur="saveCalcData()">
      <span class="pnl-calc-pct">${pct}%</span>
      <button class="pnl-calc-del" onclick="delCalcRow('expenses',${i})">✕</button>
    </div>`;
  }).join('');
  cont.innerHTML = `
  <div class="pnl-summary-card">
    <div class="pnl-summary-row">
      <div class="pnl-summary-box">
        <div class="pnl-summary-label">💵 번 돈</div>
        <div class="pnl-summary-amount inc">${_fmtAmt(totalInc)}원</div>
      </div>
      <div class="pnl-summary-box">
        <div class="pnl-summary-label">💸 나간 돈</div>
        <div class="pnl-summary-amount exp">${_fmtAmt(totalExp)}원</div>
        <div class="pnl-summary-sub">${expPct}% 비중</div>
      </div>
      <div class="pnl-summary-box">
        <div class="pnl-summary-label">🌿 순이익</div>
        <div class="pnl-summary-amount prf">${_fmtAmt(profit)}원</div>
        <div class="pnl-summary-sub">수익률 ${profitPct}%</div>
      </div>
    </div>
    <div class="pnl-summary-formula">${_fmtAmt(totalInc)} - ${_fmtAmt(totalExp)} = ${_fmtAmt(profit)}원</div>
  </div>
  <div class="pnl-calc-block">
    <div class="pnl-calc-block-head">
      <span class="pnl-calc-block-label inc">💵 이번달 번 돈</span>
      <button class="pnl-calc-add-btn inc" onclick="addCalcRow('income')">+ 추가</button>
    </div>
    ${incRows}
  </div>
  <div class="pnl-calc-block">
    <div class="pnl-calc-block-head">
      <span class="pnl-calc-block-label exp">💸 이번달 나간 돈</span>
      <button class="pnl-calc-add-btn exp" onclick="addCalcRow('expenses')">+ 추가</button>
    </div>
    ${expRows}
  </div>`;
}

function onCalcAmtChange(type, idx, val){
  calcData[type][idx].amount = parseInt(val.replace(/,/g,'')) || 0;
  renderCalc();
}

function addCalcRow(type){
  calcData[type].push({name:'',amount:0});
  renderCalc();
  saveCalcData();
  // 새 행 이름 input 포커스
  const inputs = document.querySelectorAll(`#pnl-calc-cont .pnl-calc-name`);
  if(inputs.length) inputs[inputs.length-1].focus();
}

function delCalcRow(type, idx){
  calcData[type].splice(idx,1);
  renderCalc();
  saveCalcData();
}

// ── 소프트 새로고침 (현재 페이지 데이터만 다시 불러옴) ──────
function hardRefresh(){
  const btn = document.getElementById('sync-btn');
  btn.classList.add('spinning');
  setTimeout(()=>btn.classList.remove('spinning'), 700);
  const pid = (document.querySelector('.page.active')||{}).id || '';
  if(pid==='page-alarm'){
    fetchAlarms().then(()=>renderAlarmList());
  } else if(pid==='page-expense'){
    fetchExpenses().then(()=>renderExpenses());
  } else if(pid==='page-profit'){
    fetchPnlMemos().then(()=>renderPnlMemos());
    fetchCalcData().then(()=>renderCalc());
  } else if(pid==='page-iframe'){
    const fr=document.getElementById('embed-frame');
    if(fr){ const s=fr.src; fr.src=''; setTimeout(()=>fr.src=s,50); }
  } else {
    location.href = location.pathname + '?t=' + Date.now();
  }
}

function gotoCalendar(){
  setSub('calendar','달력/일정');
  setMenu('house');
}

// ── 초기화 ─────────────────────────────────────────────────
(function init(){
  renderTopMenu();
  renderSidebar();
  renderMobileSub();
  renderAllGrids();
  const savedMode = localStorage.getItem('boss_mode');
  if(savedMode) setMode(savedMode);
  fetchAlarms().then(()=>renderAlarmList());
})();
</script>
</body>
</html>
