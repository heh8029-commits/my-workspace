<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쿠팡 판매현황</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','맑은 고딕',sans-serif;background:#f4f4f6;color:#222;font-size:13px}

/* 브랜드 탭 */
.brand-bar{background:#fff;border-bottom:1px solid #e8e8e8;padding:0 16px;display:flex;gap:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.brand-tab{padding:14px 24px;font-size:.9rem;font-weight:700;color:#aaa;border-bottom:3px solid transparent;cursor:pointer;transition:all .15s}
.brand-tab.active[data-brand="미리토퍼"]{color:#1a5eff;border-color:#1a5eff}
.brand-tab.active[data-brand="몽몽토퍼"]{color:#e91e8c;border-color:#e91e8c}
.brand-tab:hover{color:#555}

/* 월 탭 */
.month-bar{background:#fff;border-bottom:1px solid #eee;padding:8px 16px;display:flex;gap:6px;flex-wrap:wrap;position:sticky;top:49px;z-index:99}
.month-tab{padding:5px 14px;border-radius:20px;font-size:.78rem;font-weight:600;color:#888;background:#f4f4f6;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.month-tab.active{background:#222;color:#fff;border-color:#222}

/* 그리드 */
.grid-wrap{overflow-x:auto;padding:16px}
table{border-collapse:collapse;white-space:nowrap;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);min-width:max-content;border:1px solid #e0e0e0}
thead th{background:#f8f8f8;color:#888;font-size:.72rem;font-weight:600;padding:8px 12px;text-align:center;border-bottom:2px solid #d0d0d0;border-right:1px solid #e0e0e0;position:sticky;top:0}
thead th:last-child{border-right:none}
thead th:first-child,thead th:nth-child(2){position:sticky;background:#f8f8f8;z-index:10}
thead th:first-child{left:0}
thead th:nth-child(2){left:52px}
tbody tr:hover{background:#fafafa}
td{padding:7px 10px;border-bottom:1px solid #e8e8e8;border-right:1px solid #e8e8e8;text-align:center;color:#444}
td:last-child{border-right:none}
td.date-cell{font-weight:600;color:#333;position:sticky;left:0;background:inherit;min-width:52px;font-size:.8rem;border-right:1px solid #d0d0d0}
td.day-cell{position:sticky;left:52px;background:inherit;min-width:26px;font-size:.75rem;color:#aaa;padding:7px 6px;border-right:2px solid #d0d0d0}
td.amount{font-size:.8rem;color:#222;font-weight:500;min-width:82px}
td.today{background:#fffbe6!important}
td.today.date-cell{color:#e8234a;font-weight:800}
tr.sunday td.day-cell{color:#e8234a}
tr.saturday td.day-cell{color:#1a5eff}
tr.today-row{background:#fffbe6}

.empty-msg{text-align:center;padding:60px;color:#ccc;font-size:.9rem}

/* 상단 요약 */
.summary{display:flex;gap:12px;padding:16px;flex-wrap:wrap}
.summary-card{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.05);flex:1;min-width:160px}
.summary-label{font-size:.72rem;color:#aaa;letter-spacing:.06em;margin-bottom:6px}
.summary-val{font-size:1.5rem;font-weight:700;color:#111}
.summary-val.miri{color:#1a5eff}
.summary-val.mong{color:#e91e8c}

/* 매출 탭 */
.view-tab{padding:14px 24px;font-size:.9rem;font-weight:700;color:#aaa;border-bottom:3px solid transparent;cursor:pointer;transition:all .15s}
.view-tab.active{color:#06b06a;border-color:#06b06a}
.view-tab:hover{color:#555}
#sales-view{display:none;padding:16px}
#sales-view.active{display:block}
#main-view.hidden{display:none}
.sales-table-wrap{overflow-x:auto}
.sales-table{border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);width:100%;border:1px solid #e0e0e0}
.sales-table thead th{background:#f8f8f8;color:#888;font-size:.72rem;font-weight:600;padding:9px 14px;text-align:center;border-bottom:2px solid #d0d0d0;border-right:1px solid #e0e0e0;white-space:nowrap}
.sales-table thead th:last-child{border-right:none}
.sales-table th.group-miri{color:#1a5eff;background:#f0f4ff}
.sales-table th.group-mong{color:#e91e8c;background:#fff0f7}
.sales-table th.group-label{background:#f0f4ff;color:#1a5eff;font-size:.8rem;text-align:center;border-bottom:1px solid #d0d0d0}
.sales-table th.group-label-mong{background:#fff0f7;color:#e91e8c}
.sales-table tbody tr:hover{background:#fafafa}
.sales-table td{padding:8px 14px;border-bottom:1px solid #e8e8e8;border-right:1px solid #e8e8e8;text-align:right;color:#444;white-space:nowrap;font-size:.82rem}
.sales-table td:last-child{border-right:none}
.sales-table td.date-col{text-align:center;font-weight:700;color:#333;min-width:70px}
.sales-table td.total-col{font-weight:700;color:#111}
.sales-table td.rg-col{color:#1a5eff}
.sales-table td.sd-col{color:#888}
.sales-table tr.today-sales{background:#fffbe6}
.sales-table tr.today-sales td.date-col{color:#e8234a}
.sales-updated{font-size:.72rem;color:#bbb;padding:8px 16px}
.sales-summary{display:grid;grid-template-columns:repeat(9,1fr);gap:8px;padding:0 16px 12px}
.sales-summary-card{border-radius:10px;padding:8px 10px;line-height:1.3}
.sales-summary-card.rev{background:#eafaf1}
.sales-summary-card.cost{background:#fdeef2}
.sales-summary-card.grand{background:#eeecfb}
.sales-summary-label{font-size:.66rem;color:#999;white-space:nowrap}
.sales-summary-val{font-size:.92rem;font-weight:800;white-space:nowrap}
.sales-summary-val.rev{color:#0f9960}
.sales-summary-val.cost{color:#e0316b}
.sales-summary-val.grand{color:#6c4fd1}
.sales-summary-pct{font-size:.66rem;font-weight:700;color:#0f9960;margin-left:4px}
.sales-summary-pct .pct-label{display:none}
@media (max-width:900px){.sales-summary{grid-template-columns:repeat(3,1fr)}}
</style>
</head>

<div class="brand-bar">
  <div class="brand-tab active" data-brand="미리토퍼" onclick="setBrand('미리토퍼')">그로스매출 미리토퍼</div>
  <div class="brand-tab" data-brand="몽몽토퍼" onclick="setBrand('몽몽토퍼')">그로스매출 몽몽토퍼</div>
  <div class="view-tab" onclick="setView('sales')">매출</div>
</div>

<div id="main-view">

    <table id="grid-table">

        </tr>
        <tr>

          <th class="group-miri">합계</th>

          <th class="group-mong">AI광고</th>
          <th class="group-mong">광고%</th>

          <th style="background:#fff7e0;color:#b8860b">총광고비</th>
          <th style="background:#fff7e0;color:#b8860b">총광고%</th>
        </tr>
      </thead>
      <tbody id="sales-body"></tbody>
    </table>
  </div>
</div>

let currentBrand = "미리토퍼";
let currentMonth = null; // null = 전체
let autoData = {};
let currentAmount = {}; // brand → 실시간 매출 (오늘 최신값)
let salesData = {}; // brand → [{date, rocket_growth, seller_delivery, total}]
let salesUpdated = '';
let currentView = 'main'; // 'main' | 'sales'

// coupang_data.json 로드
async function loadAutoData() {
  try {
    const r = await fetch('coupang_data.json?t=' + Date.now());
    const d = await r.json();
    const accs = d.accounts || {};
    const todayStr = new Date().toISOString().slice(0, 10);
    for (const brand of Object.keys(accs)) {
      autoData[brand] = {};
      for (const h of (accs[brand].history || [])) {
        const [dateStr, timeStr] = h.time.split(' ');
        const hh = parseInt(timeStr.split(':')[0]);
        const hourKey = hh < 12 ? `오전${hh}시` : (hh === 12 ? '오후12시' : `오후${hh-12}시`);
        if (!autoData[brand][dateStr]) autoData[brand][dateStr] = {};
        autoData[brand][dateStr][hourKey] = h.amount;
      }
      const todayVals = Object.values(autoData[brand][todayStr] || {});
      currentAmount[brand] = todayVals.length ? Math.max(...todayVals) : 0;
    }
    // 매출 데이터 로드
    const sd = d.sales_data || {};
    salesUpdated = sd.last_updated || '';
    salesData['미리토퍼'] = sd['미리토퍼'] || [];
    salesData['몽몽토퍼'] = sd['몽몽토퍼'] || [];
  } catch(e) {}
  if (currentView === 'sales') renderSales();
  else render();
}

function setView(v) {
  currentView = v;
  const mainEl = document.getElementById('main-view');
  const salesEl = document.getElementById('sales-view');
  document.querySelectorAll('.brand-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  if (v === 'sales') {
    mainEl.classList.add('hidden');
    salesEl.classList.add('active');
    document.querySelector('.view-tab').classList.add('active');
    renderSales();
  } else {
    mainEl.classList.remove('hidden');
    salesEl.classList.remove('active');
    document.querySelector(`.brand-tab[data-brand="${currentBrand}"]`).classList.add('active');
    render();
  }
}

let adData = JSON.parse(localStorage.getItem('coupangAdData') || '{}');

function saveAdData() {
  localStorage.setItem('coupangAdData', JSON.stringify(adData));
}

function updateAdField(date, field, value) {
  const n = Number(String(value).replace(/[^\d.-]/g, '')) || 0;
  if (!adData[date]) adData[date] = {};
  adData[date][field] = n;
  saveAdData();
  renderSales();
}

function renderSalesSummary(date, m, ad) {
  const box = document.getElementById('sales-summary');
  if (!date) { box.innerHTML = ''; return; }

  const fmtNum = n => Number(n || 0).toLocaleString('ko-KR') + '원';
  const fmtPct = n => n.toFixed(0) + '%';

  const rg = m.rocket_growth || 0;
  const sd = m.seller_delivery || 0;
  const cpTotal = m.total || (rg + sd);
  const cpAdCost = ad.cpAdCost || 0;
  const naverSales = ad.naverSales || 0;
  const naverSearchAd = ad.naverSearchAd || 0;
  const naverAiAd = ad.naverAiAd || 0;
  const totalSales = cpTotal + naverSales;
  const totalAdCost = cpAdCost + naverSearchAd + naverAiAd;

  const pctOf = v => totalSales ? `<span class="sales-summary-pct">${fmtPct(v / totalSales * 100)}</span>` : '';

  const card = (label, val, cls, pctHtml) => `
    <div class="sales-summary-card ${cls}">
      <div class="sales-summary-label">${label}</div>
      <div class="sales-summary-val ${cls}">${fmtNum(val)}${pctHtml || ''}</div>
    </div>`;

  box.innerHTML = [
    card('쿠팡 그로스', rg, 'rev', pctOf(rg)),
    card('쿠팡 판매자배송', sd, 'rev', pctOf(sd)),
    card('쿠팡 총매출', cpTotal, 'rev', pctOf(cpTotal)),
    card('쿠팡 광고비', cpAdCost, 'cost', ''),
    card('네이버 총매출', naverSales, 'rev', pctOf(naverSales)),
    card('네이버 검색광고', naverSearchAd, 'cost', ''),
    card('네이버 AI광고', naverAiAd, 'cost', ''),
    card('전체 총광고비', totalAdCost, 'cost', ''),
    card('전체 총매출', totalSales, 'grand', ''),
  ].join('');
}

function renderSales() {
  document.getElementById('sales-updated').textContent = salesUpdated
    ? `최종 수집: ${salesUpdated} · 매일 오후 8시 10분에 업데이트됩니다 (쿠팡 로켓그로스/판매자배송만 자동 수집, 나머지는 직접 입력)`
    : '매일 오후 8시 10분에 업데이트됩니다';

  const todayMD = `${String(new Date().getMonth()+1).padStart(2,'0')}/${String(new Date().getDate()).padStart(2,'0')}`;

  const miriMap = {};
  for (const row of (salesData['미리토퍼'] || [])) miriMap[row.date] = row;

  const allDates = Object.keys(miriMap).sort().reverse();

  renderSalesSummary(allDates[0], miriMap[allDates[0]] || {}, adData[allDates[0]] || {});

  if (!allDates.length) {
    document.getElementById('sales-body').innerHTML =
      '<tr><td colspan="13" style="text-align:center;padding:40px;color:#ccc">매출 데이터가 없습니다<br><small>매일 오후 8시 10분에 수집됩니다</small></td></tr>';
    return;
  }

  const fmtNum = n => n ? Number(n).toLocaleString('ko-KR') : '-';
  const fmtPct = n => n ? n.toFixed(1) + '%' : '-';
  const inputCell = (date, field, val) =>
    `<td class="rg-col"><input type="number" value="${val || ''}" placeholder="0"
      style="width:72px;text-align:right;border:1px solid #ddd;border-radius:4px;padding:3px 5px;font-size:.8rem"
      onchange="updateAdField('${date}','${field}',this.value)"></td>`;

  const rows = allDates.map(date => {
    const isToday = date === todayMD;
    const m = miriMap[date] || {};
    const ad = adData[date] || {};

    const rg = m.rocket_growth || 0;
    const sd = m.seller_delivery || 0;
    const cpTotal = m.total || (rg + sd);
    const cpAdCost = ad.cpAdCost || 0;
    const cpAdPct = cpTotal ? (cpAdCost / cpTotal * 100) : 0;

    const naverSales = ad.naverSales || 0;
    const naverSearchAd = ad.naverSearchAd || 0;
    const naverAiAd = ad.naverAiAd || 0;
    const naverAdTotal = naverSearchAd + naverAiAd;
    const naverAdPct = naverSales ? (naverAdTotal / naverSales * 100) : 0;

    const totalSales = cpTotal + naverSales;
    const totalAdCost = cpAdCost + naverAdTotal;
    const totalAdPct = totalSales ? (totalAdCost / totalSales * 100) : 0;

    return `<tr class="${isToday ? 'today-sales' : ''}">
      <td class="date-col">${date}</td>
      <td class="rg-col">${fmtNum(rg)}</td>
      <td class="sd-col">${fmtNum(sd)}</td>
      <td class="total-col">${fmtNum(cpTotal)}</td>
      ${inputCell(date, 'cpAdCost', cpAdCost)}
      <td class="sd-col">${fmtPct(cpAdPct)}</td>
      ${inputCell(date, 'naverSales', naverSales)}
      ${inputCell(date, 'naverSearchAd', naverSearchAd)}
      ${inputCell(date, 'naverAiAd', naverAiAd)}
      <td class="sd-col">${fmtPct(naverAdPct)}</td>
      <td class="total-col">${fmtNum(totalSales)}</td>
      <td class="total-col">${fmtNum(totalAdCost)}</td>
      <td class="sd-col">${fmtPct(totalAdPct)}</td>
    </tr>`;
  }).join('');
  document.getElementById('sales-body').innerHTML = rows;
}

function getMergedData(brand) {
  const merged = {};
  const manual = MANUAL[brand] || {};
  const auto   = autoData[brand] || {};
  const allDates = new Set([...Object.keys(manual), ...Object.keys(auto)]);
  for (const d of allDates) {
    merged[d] = Object.assign({}, manual[d] || {}, auto[d] || {});
  }
  return merged;
}

function getAvailableMonths(brand) {
  const data = getMergedData(brand);
  const months = new Set();
  for (const d of Object.keys(data)) months.add(d.slice(0, 7));
  return Array.from(months).sort();
}

function monthLabel(ym) {
  const [y, m] = ym.split('-');
  return `${y === '2026' ? '' : y + '년 '}${parseInt(m)}월`;
}

function fmt(n) { return n ? Number(n).toLocaleString('ko-KR') : ''; }

function dayOfWeek(dateStr) {
  return DAYS[new Date(dateStr).getDay()];
}

function setBrand(brand) {
  currentBrand = brand;
  currentMonth = null;
  currentView = 'main';
  document.querySelectorAll('.brand-tab').forEach(t => t.classList.toggle('active', t.dataset.brand === brand));
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('main-view').classList.remove('hidden');
  document.getElementById('sales-view').classList.remove('active');
  render();
}

function setMonth(ym) {
  currentMonth = ym;
  render();
}

function renderMonthBar() {
  const months = getAvailableMonths(currentBrand);
  const bar = document.getElementById('month-bar');
  const allTab = `<div class="month-tab${currentMonth === null ? ' active' : ''}" onclick="setMonth(null)">전체</div>`;
  const monthTabs = months.map(ym =>
    `<div class="month-tab${ym === currentMonth ? ' active' : ''}" data-ym="${ym}" onclick="setMonth('${ym}')">${monthLabel(ym)}</div>`
  ).join('');
  bar.innerHTML = allTab + monthTabs;
}

function render() {
  renderMonthBar();
  const data = getMergedData(currentBrand);
  const todayStr = new Date().toISOString().slice(0, 10);

  // 날짜 필터 후 최신순 정렬 (최근 날짜가 첫 행)
  let dates = Object.keys(data)
    .filter(d => currentMonth === null || d.startsWith(currentMonth))
    .sort().reverse();

  // 요약
  const brandClass = currentBrand === '미리토퍼' ? 'miri' : 'mong';
  const todayAmt = currentAmount[currentBrand] || 0;
  document.getElementById('summary').innerHTML = `
    <div class="summary-card">
      <div class="summary-label">실시간 매출 (오늘)</div>
      <div class="summary-val ${brandClass}">${fmt(todayAmt) || '—'}원</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">기록 일수</div>
      <div class="summary-val">${dates.length}일</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">조회 기간</div>
      <div class="summary-val" style="font-size:1rem">${currentMonth ? monthLabel(currentMonth) : '전체'}</div>
    </div>
  `;

  if (!dates.length) {
    document.getElementById('grid-body').innerHTML = '<tr><td colspan="20" class="empty-msg">데이터가 없습니다</td></tr>';
    document.getElementById('grid-head').innerHTML = '';
    return;
  }

  // 헤더
  document.getElementById('grid-head').innerHTML = `<tr>
    <th style="left:0;position:sticky">날짜</th>
    <th style="left:52px;position:sticky">요</th>
    ${HOURS.map(h => `<th>${h.replace('시','')}</th>`).join('')}
  </tr>`;

  // 바디
  const rows = dates.map(dateStr => {
    const row = data[dateStr] || {};
    const dow = dayOfWeek(dateStr);
    const isToday = dateStr === todayStr;
    const isSun = dow === '일', isSat = dow === '토';
    const mm = dateStr.slice(5, 7), dd = dateStr.slice(8, 10);
    const trClass = [isToday ? 'today-row' : '', isSun ? 'sunday' : '', isSat ? 'saturday' : ''].filter(Boolean).join(' ');
    const cells = HOURS.map(h => {
      const v = row[h];
      return `<td class="amount">${v ? fmt(v) : ''}</td>`;
    }).join('');
    return `<tr class="${trClass}">
      <td class="date-cell${isToday ? ' today' : ''}">${parseInt(mm)}/${parseInt(dd)}</td>
      <td class="day-cell">${dow}</td>
      ${cells}
    </tr>`;
  }).join('');

  document.getElementById('grid-body').innerHTML = rows;
}

function scrollToCurrentHour() {
  const hh = new Date().getHours();
  const hourKey = hh < 12 ? `오전${hh}시` : (hh === 12 ? '오후12시' : `오후${hh-12}시`);
  const idx = HOURS.indexOf(hourKey);
  if (idx < 0) return;
  const ths = document.querySelectorAll('#grid-head th');
  const target = ths[idx + 2]; // 날짜·요일 열 2개 건너뜀
  if (!target) return;
  const wrap = document.querySelector('.grid-wrap');
  const stickyW = 78; // date-cell + day-cell
  wrap.scrollLeft = target.offsetLeft - stickyW - (wrap.clientWidth - stickyW) / 2 + target.offsetWidth / 2;
}

let initialScrollDone = false;
const _origRender = render;
render = function() {
  _origRender();
  if (!initialScrollDone) {
    setTimeout(scrollToCurrentHour, 50);
    initialScrollDone = true;
  }
};

loadAutoData();
setInterval(loadAutoData, 60000);
</script>
</body>
