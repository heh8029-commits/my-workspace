<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쿠팡 판매현황</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','맑은 고딕',sans-serif;background:#f4f4f6;color:#222;font-size:13px}

/* 브랜드 탭 */
.brand-bar{background:#fff;border-bottom:1px solid #e8e8e8;padding:0 16px;display:flex;gap:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow-x:auto}
.brand-tab{padding:14px 24px;font-size:.9rem;font-weight:700;color:#aaa;border-bottom:3px solid transparent;cursor:pointer;transition:all .15s}
.brand-tab.active[data-brand="미리토퍼"]{color:#1a5eff;border-color:#1a5eff}
.brand-tab.active[data-brand="몽몽토퍼"]{color:#e91e8c;border-color:#e91e8c}
.brand-tab:hover{color:#555}

/* 월 탭 */
.month-bar{background:#fff;border-bottom:1px solid #eee;padding:8px 16px;display:flex;gap:6px;flex-wrap:wrap;position:sticky;top:49px;z-index:99}
.month-tab{padding:5px 14px;border-radius:20px;font-size:.78rem;font-weight:600;color:#888;background:#f4f4f6;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.month-tab.active{background:#222;color:#fff;border-color:#222}

/* 그리드 */
.grid-wrap{overflow-x:auto;padding:16px}
table{border-collapse:collapse;white-space:nowrap;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);min-width:max-content;border:1px solid #e0e0e0}
thead th{background:#f8f8f8;color:#888;font-size:.72rem;font-weight:600;padding:8px 12px;text-align:center;border-bottom:2px solid #d0d0d0;border-right:1px solid #e0e0e0;position:sticky;top:0;z-index:6}
thead th:last-child{border-right:none}
thead th:first-child,thead th:nth-child(2){position:sticky;background:#f8f8f8;z-index:15}
thead th:first-child{left:0}
thead th:nth-child(2){left:52px}
tbody tr:hover{background:#fafafa}
td{padding:7px 10px;border-bottom:1px solid #e8e8e8;border-right:1px solid #e8e8e8;text-align:center;color:#444}
td:last-child{border-right:none}
td.date-cell{font-weight:600;color:#333;position:sticky;left:0;background:inherit;min-width:52px;font-size:.8rem;border-right:1px solid #d0d0d0;z-index:3}
td.day-cell{position:sticky;left:52px;background:inherit;min-width:26px;font-size:.75rem;color:#aaa;padding:7px 6px;border-right:2px solid #d0d0d0;z-index:3}
td.amount{font-size:.85rem;color:#222;font-weight:700;min-width:82px}
td.today{background:#fffbe6!important}
td.today.date-cell{color:#e8234a;font-weight:800}
tr.sunday td.day-cell{color:#e8234a}
tr.saturday td.day-cell{color:#1a5eff}
tr.saturday{background:#eef6ff}
tr.sunday{background:#fff0f0}
tr.today-row{background:#fffbe6}

.empty-msg{text-align:center;padding:60px;color:#ccc;font-size:.9rem}

/* 상단 요약 */
.summary{display:flex;gap:12px;padding:16px;flex-wrap:wrap}
.summary-card{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.05);flex:1;min-width:160px}
.summary-label{font-size:.72rem;color:#aaa;letter-spacing:.06em;margin-bottom:6px}
.summary-val{font-size:1.5rem;font-weight:700;color:#111}
.summary-val.miri{color:#1a5eff}
.summary-val.mong{color:#e91e8c}

/* 매출 탭 */
.view-tab{padding:14px 24px;font-size:.9rem;font-weight:700;color:#aaa;border-bottom:3px solid transparent;cursor:pointer;transition:all .15s}
.view-tab.active{color:#06b06a;border-color:#06b06a}
.view-tab:hover{color:#555}
#sales-view{display:none;padding:16px}
#sales-view.active{display:block}
#log-view{display:none}
#log-view.active{display:block}
.sales-table td.status-ok{color:#0f9960;font-weight:700}
.sales-table td.status-fail{color:#e0316b;font-weight:700}
#main-view.hidden{display:none}
.sales-table-wrap{overflow-x:auto}
.sales-table{border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);width:100%;border:1px solid #e0e0e0}
.sales-table thead th{background:#f8f8f8;color:#888;font-size:.72rem;font-weight:600;padding:9px 14px;text-align:center;border-bottom:2px solid #d0d0d0;border-right:1px solid #e0e0e0;white-space:nowrap;position:sticky;top:0;z-index:6}
.sales-table thead th:last-child{border-right:none}
.sales-table thead th:first-child{position:sticky;left:0;z-index:15;background:#f8f8f8}
.sales-table th.group-miri{color:#1a5eff;background:#f0f4ff}
.sales-table th.group-mong{color:#e91e8c;background:#fff0f7}
.th-link{color:inherit;text-decoration:none;border-bottom:1px dashed currentColor}
.th-link:hover{opacity:.75}
.sales-table th.group-label{background:#f0f4ff;color:#1a5eff;font-size:.8rem;text-align:center;border-bottom:1px solid #d0d0d0}
.sales-table th.group-label-mong{background:#fff0f7;color:#e91e8c}
.sales-table tbody tr:hover{background:#fafafa}
.sales-table td{padding:8px 14px;border-bottom:1px solid #e8e8e8;border-right:1px solid #e8e8e8;text-align:right;color:#444;white-space:nowrap;font-size:.82rem}
.sales-table td:last-child{border-right:none}
.sales-table td.date-col{text-align:center;font-weight:700;color:#333;min-width:70px;position:sticky;left:0;background:inherit;z-index:3;border-right:2px solid #d0d0d0}
.sales-table td.date-col.weekend{color:#e8234a}
.sales-table td.total-col{font-weight:700;color:#111}
.sales-table td.rg-col{color:#1a5eff}
.sales-table td.sd-col{color:#888}
.sales-brand-bar{display:flex;gap:8px;padding:0 0 10px;margin-bottom:6px}
.sales-brand-btn{padding:5px 16px;border-radius:20px;border:1.5px solid #ddd;background:#f5f5f5;color:#999;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s}
.sales-brand-btn.active[data-brand="미리토퍼"]{background:#e8f0ff;color:#1a5eff;border-color:#1a5eff}
.sales-brand-btn.active[data-brand="몽몽토퍼"]{background:#fff0f7;color:#e91e8c;border-color:#e91e8c}
.sales-table tr.today-sales{background:#fffbe6}
.sales-table tr.today-sales td.date-col{color:#e8234a}
.sales-table tr.row-sat{background:#eef6ff}
.sales-table tr.row-sun{background:#fff0f0}
.sales-table tfoot td{padding:8px 14px;border-bottom:1px solid #e8e8e8;border-right:1px solid #e8e8e8;text-align:right;font-size:.82rem;white-space:nowrap}
.sales-table tfoot td:last-child{border-right:none}
.sales-table tfoot tr.foot-sum{background:#f4f4f6;font-weight:800}
.sales-table tfoot tr.foot-avg{background:#fafafa;color:#666}
.sales-table tfoot td.date-col{text-align:center}
.sales-updated{font-size:.72rem;color:#bbb;padding:8px 16px}
.sales-summary{display:grid;grid-template-columns:repeat(9,1fr);gap:8px;padding:0 16px 12px}
.sales-summary-card{border-radius:10px;padding:8px 10px;line-height:1.3;border:1px solid transparent}
.sales-summary-card.rev{background:#eafaf1;border-color:#bfe8d2}
.sales-summary-card.cost{background:#fdeef2;border-color:#f6cddc}
.sales-summary-card.grand{background:#eeecfb;border-color:#d6d0f3}
.sales-summary-label{font-size:.66rem;color:#999;white-space:nowrap}
.sales-summary-val{font-size:.92rem;font-weight:800;white-space:nowrap}
.sales-summary-val.rev{color:#0f9960}
.sales-summary-val.cost{color:#e0316b}
.sales-summary-val.grand{color:#6c4fd1}
.sales-summary-pct{font-size:.66rem;font-weight:700;color:#0f9960;margin-left:4px}
.sales-summary-pct .pct-label{display:none}
@media (max-width:900px){.sales-summary{grid-template-columns:repeat(3,1fr)}}

.sync-area{margin-left:auto;display:flex;align-items:center;gap:8px;padding-right:4px}
.sync-time{font-size:.7rem;color:#aaa}
.sync-btn{display:flex;align-items:center;gap:5px;background:#f4f4f6;border:1px solid #e0e0e0;border-radius:20px;padding:6px 14px;font-size:.78rem;font-weight:600;color:#555;cursor:pointer;transition:all .15s}
.sync-btn:hover{background:#ececef}
.sync-btn .icon{display:inline-block;transition:transform .5s}
.sync-btn.spinning .icon{animation:sync-spin .6s linear infinite}
@keyframes sync-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* 광고성과 패널 */
#ad-perf-view{display:none;padding:16px}
#ad-perf-view.active{display:block}
.view-tab[data-view="ad"]{color:#f4830a}
.view-tab[data-view="ad"].active{color:#f4830a;border-color:#f4830a}

.ad-brand-section{margin-bottom:24px}
.ad-brand-title{font-size:.9rem;font-weight:800;margin-bottom:10px;padding:6px 12px;border-radius:8px;display:inline-block}
.ad-brand-title.miri{background:#eef2ff;color:#1a5eff}
.ad-brand-title.mong{background:#fff0f7;color:#e91e8c}
.ad-perf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:900px}
.ad-period-card{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid #eee}
.ad-period-label{font-size:.72rem;font-weight:700;color:#fff;background:#555;border-radius:20px;padding:2px 10px;display:inline-block;margin-bottom:10px}
.ad-period-label.yesterday{background:#e8234a}
.ad-period-label.week{background:#1a5eff}
.ad-period-label.month{background:#06b06a}
.ad-metric-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #f0f0f0;font-size:.8rem}
.ad-metric-row:last-child{border-bottom:none}
.ad-metric-key{color:#888}
.ad-metric-val{font-weight:700;color:#222}
.ad-metric-val.highlight{color:#e8234a}
.ad-updated{font-size:.7rem;color:#bbb;margin-top:6px}
.ad-no-data{color:#ccc;font-size:.85rem;padding:20px;text-align:center}
.back-btn{display:inline-flex;align-items:center;gap:6px;margin:20px 0 8px;padding:10px 22px;background:#f4f4f6;border:1px solid #e0e0e0;border-radius:20px;font-size:.82rem;font-weight:600;color:#555;cursor:pointer;transition:all .15s}
.back-btn:hover{background:#e8e8eb}
</style>
</head>

<div class="brand-bar">

  <div class="view-tab" data-view="sales" onclick="setView('sales')">매출</div>
  <div class="view-tab" data-view="ad" onclick="setView('ad')">광고성과</div>
  <div class="view-tab" data-view="log" onclick="setView('log')">로그</div>
  <div class="sync-area">
    <span id="save-status" style="font-size:.75rem;color:#888;margin-right:6px"></span>
    <span class="sync-time" id="sync-time"></span>
    <div class="sync-btn" id="sync-btn" onclick="manualSync()"><span class="icon">⟳</span>새로고침</div>
  </div>
</div>

<div id="main-view">
  <div class="month-bar" id="month-bar"></div>
  <div class="summary" id="summary"></div>
  <div class="grid-wrap">
    <table id="grid-table">
      <thead id="grid-head"></thead>
      <tbody id="grid-body"></tbody>
    </table>
  </div>
</div>

<div id="sales-view">
  <div class="sales-brand-bar">
    <button class="sales-brand-btn active" data-brand="미리토퍼" onclick="setSalesBrand('미리토퍼')">미리토퍼</button>
    <button class="sales-brand-btn" data-brand="몽몽토퍼" onclick="setSalesBrand('몽몽토퍼')">몽몽토퍼</button>
  </div>
  <div class="month-bar" id="sales-month-bar"></div>
  <div class="sales-updated" id="sales-updated"></div>
  <div class="sales-summary" id="sales-summary"></div>
  <div class="sales-table-wrap">
    <table class="sales-table">
      <thead>
        <tr>
          <th rowspan="2" style="vertical-align:middle">날짜</th>
          <th colspan="5" class="group-label">쿠팡</th>
          <th colspan="4" class="group-label group-label-mong">네이버</th>
          <th colspan="3" class="group-label" style="background:#fff7e0;color:#b8860b">전체</th>
        </tr>
        <tr>
          <th class="group-miri"><a href="https://wing.coupang.com/tenants/rfm-inventory/management/list" target="_blank" class="th-link">로켓그로스</a></th>
          <th class="group-miri"><a href="https://wing.coupang.com/tenants/rfm/rfm-home/view" target="_blank" class="th-link">판매자배송</a></th>
          <th class="group-miri">합계</th>
          <th class="group-miri"><a href="https://advertising.coupang.com/marketing/dashboard/sales" target="_blank" class="th-link">광고비</a></th>
          <th class="group-miri">광고%</th>
          <th class="group-mong"><a href="https://sell.smartstore.naver.com/#/store-diagnosis" target="_blank" class="th-link">매출</a></th>
          <th class="group-mong"><a href="https://ads.naver.com/manage/ad-accounts/1992742/sa/campaigns/cmp-a001-02-000000006059416" target="_blank" class="th-link">검색광고</a></th>
          <th class="group-mong"><a href="https://sell.smartstore.naver.com/#/smart-ads/manage" target="_blank" class="th-link">AI광고</a></th>
          <th class="group-mong">광고%</th>
          <th style="background:#fff7e0;color:#b8860b">총매출</th>
          <th style="background:#fff7e0;color:#b8860b">총광고비</th>
          <th style="background:#fff7e0;color:#b8860b">총광고%</th>
        </tr>
      </thead>
      <tbody id="sales-body"></tbody>
      <tfoot id="sales-foot"></tfoot>
    </table>
  </div>
</div>

<div id="ad-perf-view">
  <div id="ad-perf-content"></div>
  <div style="padding:0 16px 24px">
    <div class="back-btn" onclick="setView('main')">← 메뉴로 돌아가기</div>
  </div>
</div>


<div id="log-view">
  <div class="sales-table-wrap" style="padding:16px">
    <table class="sales-table">
      <thead>
        <tr>
          <th>시간</th>
          <th>계정</th>
          <th>상태</th>
          <th>실패 사유</th>
        </tr>
      </thead>
      <tbody id="log-body"></tbody>
    </table>
  </div>
</div>

// coupang_data.json + Firebase 수동 데이터 동시 로드
async function loadAutoData() {
  try {
    const [r, fbR, fbHR] = await Promise.all([
      fetch('coupang_data.json?t=' + Date.now()),
      fetch(FB_MANUAL_AD + '?t=' + Date.now()).catch(() => null),
      fetch(FB_MANUAL_HOURLY + '?t=' + Date.now()).catch(() => null)
    ]);
    if (fbR && fbR.ok) {
      const fb = await fbR.json();
      if (fb && typeof fb === 'object') manualAdData = fb;
    }
    if (fbHR && fbHR.ok) {
      const fbH = await fbHR.json();
      if (fbH && typeof fbH === 'object') manualHourlyData = fbH;
    }
    const d = await r.json();
    const accs = d.accounts || {};
    const todayStr = localDateStr();
    for (const brand of Object.keys(accs)) {
      autoData[brand] = {};
      for (const h of (accs[brand].history || [])) {
        const [dateStr, timeStr] = h.time.split(' ');
        const hh = parseInt(timeStr.split(':')[0]);
        const hourKey = hh < 12 ? `오전${hh}시` : (hh === 12 ? '오후12시' : `오후${hh-12}시`);
        if (!autoData[brand][dateStr]) autoData[brand][dateStr] = {};
        autoData[brand][dateStr][hourKey] = h.amount;
      }
      const todayVals = Object.values(autoData[brand][todayStr] || {});
      currentAmount[brand] = todayVals.length ? Math.max(...todayVals) : 0;
    }
    // 수동 입력 hourly 데이터 merge
    for (const [brand, dates] of Object.entries(manualHourlyData)) {
      if (!autoData[brand]) autoData[brand] = {};
      for (const [date, hours] of Object.entries(dates)) {
        if (!autoData[brand][date]) autoData[brand][date] = {};
        for (const [h, v] of Object.entries(hours)) {
          if (v) autoData[brand][date][h] = v;
        }
      }
    }
    // 매출 데이터 로드
    const sd = d.sales_data || {};
    salesUpdated = sd.last_updated || '';
    salesData['미리토퍼'] = sd['미리토퍼'] || [];
    salesData['몽몽토퍼'] = sd['몽몽토퍼'] || [];

    // 광고비/네이버 매출: JSON 기본값 위에 수동 입력값(manualAdData) 덮어쓰기 (필드 단위 병합)
    const jsonAdData = d.ad_data || {};
    adData = {};
    for (const date of new Set([...Object.keys(jsonAdData), ...Object.keys(manualAdData)])) {
      const merged = Object.assign({}, jsonAdData[date] || {});
      // 0인 manual값은 무시 → JSON 원래값 유지
      for (const [k, v] of Object.entries(manualAdData[date] || {})) {
        if (v !== 0 && v !== null && v !== undefined) merged[k] = v;
      }
      adData[date] = merged;
    }

    adPerformance = d.ad_performance || {};
    runLog = d.run_log || [];
  } catch(e) {}
  const t = document.getElementById('sync-time');
  if (t) t.textContent = '갱신: ' + new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  if (currentView === 'sales') renderSales();
  else if (currentView === 'log') renderLog();
  else if (currentView === 'ad') renderAdPerf();
  else render();
}

let _saveTimer = null;

function setSaveStatus(msg) {

function saveAdData() {
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(doFirebaseSave, 800);
}

async function doFirebaseSave() {
  setSaveStatus('저장 중...');
  try {
    const r = await fetch(FB_MANUAL_AD, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(manualAdData)
    });
    if (r.ok) {
      setSaveStatus('✓ 저장됨');
      setTimeout(() => setSaveStatus(''), 3000);
    } else throw new Error(r.status);
  } catch(e) {
    setSaveStatus('저장 오류');
    console.error('Firebase save error:', e);
  }
}

async function saveManualHour(el) {
  const n = Number(el.value.replace(/[^\d]/g, '')) || 0;
  if (!n) return;
  const brand = el.dataset.brand, date = el.dataset.date, hour = el.dataset.hour;
  if (!manualHourlyData[brand]) manualHourlyData[brand] = {};
  if (!manualHourlyData[brand][date]) manualHourlyData[brand][date] = {};
  manualHourlyData[brand][date][hour] = n;
  if (!autoData[brand]) autoData[brand] = {};
  if (!autoData[brand][date]) autoData[brand][date] = {};
  autoData[brand][date][hour] = n;
  setSaveStatus('저장 중...');
  try {
    await fetch(FB_MANUAL_HOURLY, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(manualHourlyData)
    });
    setSaveStatus('✓ 저장됨');
    setTimeout(() => setSaveStatus(''), 3000);
  } catch(e) { setSaveStatus('저장 오류'); }
  render();
}

    manualAdData[date][field] = n;

      delete manualAdData[date][field];
      if (!Object.keys(manualAdData[date]).length) delete manualAdData[date];
    }
  }
  if (!adData[date]) adData[date] = {};

  saveAdData();

function renderSalesSummary(date, m, ad, dayCount) {
  const box = document.getElementById('sales-summary');
  if (!date) { box.innerHTML = ''; return; }

  const fmtNum = n => Number(n || 0).toLocaleString('ko-KR') + '원';
  const fmtPct = n => n.toFixed(0) + '%';

  const rg = m.rocket_growth || 0;
  const sd = m.seller_delivery || 0;
  const cpTotal = m.total || (rg + sd);
  const cpAdCost = ad.cpAdCost || 0;
  const naverSales = ad.naverSales || 0;
  const naverSearchAd = ad.naverSearchAd || 0;
  const naverAiAd = ad.naverAiAd || 0;
  const totalSales = cpTotal + naverSales;
  const totalAdCost = cpAdCost + naverSearchAd + naverAiAd;

  const pctOf = v => totalSales ? `<span class="sales-summary-pct">${fmtPct(v / totalSales * 100)}</span>` : '';

  const card = (label, val, cls, pctHtml) => `
    <div class="sales-summary-card ${cls}">
      <div class="sales-summary-label">${label}</div>
      <div class="sales-summary-val ${cls}">${fmtNum(val)}${pctHtml || ''}</div>
    </div>`;

  box.innerHTML = [
    card('쿠팡 그로스', rg, 'rev', pctOf(rg)),
    card('쿠팡 판매자배송', sd, 'rev', pctOf(sd)),
    card('쿠팡 총매출', cpTotal, 'rev', pctOf(cpTotal)),
    card('쿠팡 광고비', cpAdCost, 'cost', ''),
    card('네이버 총매출', naverSales, 'rev', pctOf(naverSales)),
    card('네이버 검색광고', naverSearchAd, 'cost', ''),
    card('네이버 AI광고', naverAiAd, 'cost', ''),
    card('전체 총광고비', totalAdCost, 'cost', ''),
    card('전체 총매출', totalSales, 'grand', dayCount ? `<span class="sales-summary-pct" style="color:#999">일평균 ${fmtNum(Math.round(totalSales / dayCount))}</span>` : ''),
  ].join('');
}

function renderSales() {
  document.getElementById('sales-updated').textContent = salesUpdated
    ? `최종 수집: ${salesUpdated} · 매일 오후 8시 10분에 업데이트됩니다 (쿠팡 로켓그로스/판매자배송만 자동 수집, 나머지는 직접 입력)`
    : '매일 오후 8시 10분에 업데이트됩니다';

  const todayMD = `${String(new Date().getMonth()+1).padStart(2,'0')}/${String(new Date().getDate()).padStart(2,'0')}`;

  const isMong = currentSalesBrand === '몽몽토퍼';
  const fRg   = isMong ? 'mongRg'          : 'manualRg';
  const fSd   = isMong ? 'mongSd'          : 'manualSd';
  const fCp   = isMong ? 'mongCpAdCost'    : 'cpAdCost';
  const fNvS  = isMong ? 'mongNaverSales'  : 'naverSales';
  const fNvSe = isMong ? 'mongNaverSearch' : 'naverSearchAd';
  const fNvAi = isMong ? 'mongNaverAi'     : 'naverAiAd';

  const brandMap = {};
  for (const row of (salesData[currentSalesBrand] || [])) brandMap[row.date] = row;

  renderSalesMonthBar(Object.keys(brandMap));

  // 실제 데이터가 있는 날짜 (합계/평균 계산용)
  const dataDates = Object.keys(brandMap)
    .filter(d => currentSalesMonth === null || d.split('/')[0] === currentSalesMonth);

  // 화면에 표시할 날짜: 입력 안 된 날도 포함해서 해당 달 전체를 채움
  const monthsInScope = currentSalesMonth !== null
    ? [currentSalesMonth]
    : Array.from(new Set(Object.keys(brandMap).map(d => d.split('/')[0]))).sort();
  const todayMM = String(new Date().getMonth() + 1).padStart(2, '0');
  const todayDD = new Date().getDate();
  const allDates = [];
  for (const mm of monthsInScope) {
    let dCount = new Date(2026, parseInt(mm), 0).getDate();
    if (mm === todayMM) dCount = Math.min(dCount, todayDD);
    for (let day = 1; day <= dCount; day++) {
      allDates.push(`${mm}/${String(day).padStart(2, '0')}`);
    }
  }
  allDates.sort().reverse();

  const getRgSd = (date) => {
    const m = brandMap[date] || {};
    const ad = adData[date] || {};
    const rg = (ad[fRg] !== undefined && ad[fRg] !== null && ad[fRg] !== '') ? ad[fRg] : (m.rocket_growth || 0);
    const sd = (ad[fSd] !== undefined && ad[fSd] !== null && ad[fSd] !== '') ? ad[fSd] : (m.seller_delivery || 0);
    return { rg, sd };
  };

  // 합산 요약 (실제 데이터가 있는 날짜 기준)
  const sumRow = { rocket_growth: 0, seller_delivery: 0, total: 0 };
  const sumAd = { cpAdCost: 0, naverSales: 0, naverSearchAd: 0, naverAiAd: 0 };
  for (const d of dataDates) {
    const { rg, sd } = getRgSd(d);
    const ad = adData[d] || {};
    sumRow.rocket_growth += rg;
    sumRow.seller_delivery += sd;
    sumRow.total += rg + sd;
    sumAd.cpAdCost     += ad[fCp]   || 0;
    sumAd.naverSales   += ad[fNvS]  || 0;
    sumAd.naverSearchAd += ad[fNvSe] || 0;
    sumAd.naverAiAd    += ad[fNvAi] || 0;
  }
  renderSalesSummary(dataDates.length ? 'sum' : null, sumRow, sumAd, dataDates.length);

  if (!allDates.length) {
    document.getElementById('sales-body').innerHTML =
      '<tr><td colspan="13" style="text-align:center;padding:40px;color:#ccc">매출 데이터가 없습니다<br><small>매일 오후 8시 10분에 수집됩니다</small></td></tr>';
    return;
  }

  const fmtNum = n => n ? Number(n).toLocaleString('ko-KR') : '-';
  const fmtPct = n => n ? n.toFixed(1) + '%' : '-';
  const inputCell = (date, field, val) =>
    `<td class="rg-col"><input type="text" inputmode="numeric" value="${val ? Number(val).toLocaleString('ko-KR') : ''}" placeholder="0"
      style="width:84px;text-align:right;border:1px solid #ddd;border-radius:4px;padding:3px 5px;font-size:.8rem"
      oninput="formatInputCommas(this);_saveAdInput('${date}','${field}',this.value)"
      onblur="updateAdField('${date}','${field}',this.value)"></td>`;

  const rows = allDates.map(date => {
    const isToday = date === todayMD;
    const ad = adData[date] || {};

    const { rg, sd } = getRgSd(date);
    const cpTotal = rg + sd;
    const cpAdCost = ad[fCp] || 0;
    const cpAdPct = cpTotal ? (cpAdCost / cpTotal * 100) : 0;

    const naverSales    = ad[fNvS]  || 0;
    const naverSearchAd = ad[fNvSe] || 0;
    const naverAiAd     = ad[fNvAi] || 0;
    const naverAdTotal  = naverSearchAd + naverAiAd;
    const naverAdPct    = naverSales ? (naverAdTotal / naverSales * 100) : 0;

    const totalSales  = cpTotal + naverSales;
    const totalAdCost = cpAdCost + naverAdTotal;
    const totalAdPct  = totalSales ? (totalAdCost / totalSales * 100) : 0;

    const [mm, dd] = date.split('/');
    const dow = dayOfWeek(`2026-${mm}-${dd}`);
    const isWeekend = dow === '토' || dow === '일';
    const isSat = dow === '토', isSun = dow === '일';
    const trCls = [isToday?'today-sales':'', isSat?'row-sat':'', isSun?'row-sun':''].filter(Boolean).join(' ');

    return `<tr class="${trCls}">
      <td class="date-col${isWeekend ? ' weekend' : ''}">${date} (${dow})</td>
      ${inputCell(date, fRg, rg)}
      ${inputCell(date, fSd, sd)}
      <td class="total-col">${fmtNum(cpTotal)}</td>
      ${inputCell(date, fCp, cpAdCost)}
      <td class="sd-col">${fmtPct(cpAdPct)}</td>
      ${inputCell(date, fNvS, naverSales)}
      ${inputCell(date, fNvSe, naverSearchAd)}
      ${inputCell(date, fNvAi, naverAiAd)}
      <td class="sd-col">${fmtPct(naverAdPct)}</td>
      <td class="total-col">${fmtNum(totalSales)}</td>
      <td class="total-col">${fmtNum(totalAdCost)}</td>
      <td class="sd-col">${fmtPct(totalAdPct)}</td>
    </tr>`;
  }).join('');
  document.getElementById('sales-body').innerHTML = rows;

  // 하단 합계/평균 행
  const n = allDates.length;
  const sCpTotal = sumRow.total;
  const sNaverAdTotal = sumAd.naverSearchAd + sumAd.naverAiAd;
  const sTotalSales = sumRow.total + sumAd.naverSales;
  const sTotalAdCost = sumAd.cpAdCost + sNaverAdTotal;
  const sCpAdPct = sCpTotal ? sumAd.cpAdCost / sCpTotal * 100 : 0;
  const sNaverAdPct = sumAd.naverSales ? sNaverAdTotal / sumAd.naverSales * 100 : 0;
  const sTotalAdPct = sTotalSales ? sTotalAdCost / sTotalSales * 100 : 0;
  const avg = v => n ? v / n : 0;

  const footRow = (label, cls, vals, pcts) => `<tr class="${cls}">
    <td class="date-col">${label}</td>
    <td>${fmtNum(vals.rg)}</td>
    <td>${fmtNum(vals.sd)}</td>
    <td>${fmtNum(vals.cpTotal)}</td>
    <td>${fmtNum(vals.cpAdCost)}</td>
    <td>${fmtPct(pcts.cpAdPct)}</td>
    <td>${fmtNum(vals.naverSales)}</td>
    <td>${fmtNum(vals.naverSearchAd)}</td>
    <td>${fmtNum(vals.naverAiAd)}</td>
    <td>${fmtPct(pcts.naverAdPct)}</td>
    <td>${fmtNum(vals.totalSales)}</td>
    <td>${fmtNum(vals.totalAdCost)}</td>
    <td>${fmtPct(pcts.totalAdPct)}</td>
  </tr>`;

  const pcts = { cpAdPct: sCpAdPct, naverAdPct: sNaverAdPct, totalAdPct: sTotalAdPct };

  document.getElementById('sales-foot').innerHTML =
    footRow('합계', 'foot-sum', {
      rg: sumRow.rocket_growth, sd: sumRow.seller_delivery, cpTotal: sCpTotal,
      cpAdCost: sumAd.cpAdCost, naverSales: sumAd.naverSales, naverSearchAd: sumAd.naverSearchAd,
      naverAiAd: sumAd.naverAiAd, totalSales: sTotalSales, totalAdCost: sTotalAdCost,
    }, pcts) +
    footRow(`평균 (${n}일 기준)`, 'foot-avg', {
      rg: avg(sumRow.rocket_growth), sd: avg(sumRow.seller_delivery), cpTotal: avg(sCpTotal),
      cpAdCost: avg(sumAd.cpAdCost), naverSales: avg(sumAd.naverSales), naverSearchAd: avg(sumAd.naverSearchAd),
      naverAiAd: avg(sumAd.naverAiAd), totalSales: avg(sTotalSales), totalAdCost: avg(sTotalAdCost),
    }, pcts);
}

function getMergedData(brand) {
  const merged = {};
  const manual = MANUAL[brand] || {};
  const auto   = autoData[brand] || {};
  const allDates = new Set([...Object.keys(manual), ...Object.keys(auto)]);
  for (const d of allDates) {
    merged[d] = Object.assign({}, manual[d] || {}, auto[d] || {});
  }
  return merged;
}

function getAvailableMonths(brand) {
  const data = getMergedData(brand);
  const months = new Set();
  for (const d of Object.keys(data)) months.add(d.slice(0, 7));
  return Array.from(months).sort();
}

function monthLabel(ym) {
  const [y, m] = ym.split('-');
  return `${y === '2026' ? '' : y + '년 '}${parseInt(m)}월`;
}

function fmt(n) { return n ? Number(n).toLocaleString('ko-KR') : ''; }

function localDateStr(offsetDays = 0) {
  const d = new Date();
  if (offsetDays) d.setDate(d.getDate() + offsetDays);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function dayOfWeek(dateStr) {
  return DAYS[new Date(dateStr).getDay()];
}

function setBrand(brand) {
  currentBrand = brand;
  currentMonth = null;
  currentView = 'main';
  document.querySelectorAll('.brand-tab').forEach(t => t.classList.toggle('active', t.dataset.brand === brand));
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('main-view').classList.remove('hidden');
  document.getElementById('sales-view').classList.remove('active');
  document.getElementById('log-view').classList.remove('active');
  render();
}

function setMonth(ym) {
  currentMonth = ym;
  render();
}

function renderMonthBar() {
  const months = getAvailableMonths(currentBrand);
  const bar = document.getElementById('month-bar');
  const allTab = `<div class="month-tab${currentMonth === null ? ' active' : ''}" onclick="setMonth(null)">전체</div>`;
  const monthTabs = months.map(ym =>
    `<div class="month-tab${ym === currentMonth ? ' active' : ''}" data-ym="${ym}" onclick="setMonth('${ym}')">${monthLabel(ym)}</div>`
  ).join('');
  bar.innerHTML = allTab + monthTabs;
}

function render() {
  renderMonthBar();
  const data = getMergedData(currentBrand);
  const todayStr = localDateStr();

  // 날짜 범위: 데이터 있는 날짜 기준 최솟값 ~ 오늘, 빈 날짜도 행 표시
  const dataKeys = Object.keys(data);
  const minDate = dataKeys.length ? dataKeys.sort()[0] : todayStr;
  const allDates = [];
  for (let d = new Date(minDate + 'T12:00:00'); d <= new Date(todayStr + 'T12:00:00'); d.setDate(d.getDate() + 1)) {
    allDates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
  }
  let dates = allDates
    .filter(d => currentMonth === null || d.startsWith(currentMonth))
    .reverse();

  // 요약
  const brandClass = currentBrand === '미리토퍼' ? 'miri' : 'mong';
  const todayAmt = currentAmount[currentBrand] || 0;
  const ydD = new Date(); ydD.setDate(ydD.getDate()-1);
  const ydMD = `${String(ydD.getMonth()+1).padStart(2,'0')}/${String(ydD.getDate()).padStart(2,'0')}`;
  const ydRow = (salesData[currentBrand] || []).find(r => r.date === ydMD) || {};
  const ydRocket = ydRow.rocket_growth || 0;
  const ydSeller = ydRow.seller_delivery || 0;
  const ydTotal  = ydRocket + ydSeller;
  document.getElementById('summary').innerHTML = `
    <div class="summary-card">
      <div class="summary-label">실시간 매출 (오늘)</div>
      <div class="summary-val ${brandClass}">${fmt(todayAmt) || '—'}원</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">어제 로켓그로스</div>
      <div class="summary-val ${brandClass}">${ydRocket ? fmt(ydRocket)+'원' : '—'}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">어제 판매자배송</div>
      <div class="summary-val ${brandClass}">${ydSeller ? fmt(ydSeller)+'원' : '—'}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">어제 총매출</div>
      <div class="summary-val ${brandClass}">${ydTotal ? fmt(ydTotal)+'원' : '—'}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">기록 일수</div>
      <div class="summary-val">${dates.length}일</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">조회 기간</div>
      <div class="summary-val" style="font-size:1rem">${currentMonth ? monthLabel(currentMonth) : '전체'}</div>
    </div>
  `;

  if (!dates.length) {
    document.getElementById('grid-body').innerHTML = '<tr><td colspan="20" class="empty-msg">데이터가 없습니다</td></tr>';
    document.getElementById('grid-head').innerHTML = '';
    return;
  }

  // 헤더
  document.getElementById('grid-head').innerHTML = `<tr>
    <th style="left:0;position:sticky">날짜</th>
    <th style="left:52px;position:sticky">요</th>
    ${HOURS.map(h => `<th>${h.replace('시','')}</th>`).join('')}
  </tr>`;

  // 시간대별 5분위 계산 (1위그룹=최상위 20%)
  const RANK_COLORS = ['#1B5E20','#66BB6A','#F57F17','#EF5350','#B71C1C'];
  const RANK_LABELS = ['1위','2위','3위','4위','5위'];
  const hourRankMap = {};  // h → Map(dateStr → rank 0~4)
  for (const h of HOURS) {
    const vals = [];
    for (const d of Object.keys(data)) {
      const v = data[d][h];
      if (v) vals.push({ d, v });
    }
    vals.sort((a, b) => b.v - a.v);  // 내림차순
    const n = vals.length;
    const map = new Map();
    vals.forEach(({ d, v }, i) => {
      const rank = n < 2 ? 0 : Math.min(4, Math.floor(i / n * 5));
      map.set(d, rank);
    });
    hourRankMap[h] = map;
  }

  // 바디
  const yesterdayStr = localDateStr(-1);
  const rows = dates.map(dateStr => {
    const row = data[dateStr] || {};
    const dow = dayOfWeek(dateStr);
    const isToday = dateStr === todayStr;
    const isRecent = dateStr >= yesterdayStr;
    const isSun = dow === '일', isSat = dow === '토';
    const mm = dateStr.slice(5, 7), dd = dateStr.slice(8, 10);
    const trClass = [isToday ? 'today-row' : '', isSun ? 'sunday' : '', isSat ? 'saturday' : ''].filter(Boolean).join(' ');
    const cells = HOURS.map(h => {
      const v = row[h];
      let badge = '';
      if (v) {
        const rank = hourRankMap[h].get(dateStr);
        if (rank !== undefined) {
          badge = `<br><span style="font-size:.6rem;font-weight:700;color:${RANK_COLORS[rank]}">${RANK_LABELS[rank]}</span>`;
        }
      }
      if (!v && isRecent) {
        return `<td class="amount"><input type="text" class="manual-hour-input" data-brand="${currentBrand}" data-date="${dateStr}" data-hour="${h}" placeholder="-" onblur="saveManualHour(this)" style="width:48px;font-size:.68rem;text-align:center;border:1px solid #ddd;border-radius:3px;padding:1px 2px;background:#fafafa;color:#666"></td>`;
      }
      return `<td class="amount">${v ? fmt(v) : ''}${badge}</td>`;
    }).join('');
    return `<tr class="${trClass}">
      <td class="date-cell${isToday ? ' today' : ''}">${parseInt(mm)}/${parseInt(dd)}</td>
      <td class="day-cell">${dow}</td>
      ${cells}
    </tr>`;
  }).join('');

  document.getElementById('grid-body').innerHTML = rows;
}

function getCurrentHourKey() {
  const hh = new Date().getHours();
  return hh < 12 ? `오전${hh}시` : (hh === 12 ? '오후12시' : `오후${hh-12}시`);
}

function scrollToCurrentHour() {
  const hourKey = getCurrentHourKey();
  const idx = HOURS.indexOf(hourKey);
  if (idx < 0) return;
  const ths = document.querySelectorAll('#grid-head th');
  const target = ths[idx + 2]; // 날짜·요일 열 2개 건너뜀
  if (!target) return;
  const wrap = document.querySelector('.grid-wrap');
  const stickyW = 78; // date-cell + day-cell
  wrap.scrollLeft = target.offsetLeft - stickyW - (wrap.clientWidth - stickyW) / 2 + target.offsetWidth / 2;
}

let initialScrollDone = false;
const _origRender = render;
render = function() {
  _origRender();
  if (!initialScrollDone) {
    setTimeout(scrollToCurrentHour, 50);
    initialScrollDone = true;
  }
};

loadAutoData();
setInterval(loadAutoData, 60000);

function _applyHash() {
  const h = location.hash.replace('#', '');
  if (h === 'sales' || h === 'ad' || h === 'log') setView(h);
}
window.addEventListener('hashchange', _applyHash);
const _hashView = location.hash.replace('#', '');
if (_hashView === 'sales' || _hashView === 'ad' || _hashView === 'log') {
  setTimeout(() => setView(_hashView), 300);
}
</script>
