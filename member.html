<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👥 멤버 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#f7a8c0;--pink-dark:#e8648a;--pink-pale:#fff0f5;--pink-mid:#fcd5e5;
  --rose:#e03c6e;--cream:#fff8fb;--text:#3a1a2e;--soft:#b888a8;
  --shadow:rgba(232,100,138,.13);--white:#fff;
  --lav:#ddd0f8;--lav-dark:#8b60d0;
}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
button{font-family:inherit;cursor:pointer}

/* ── 탑바 ── */
.topbar{
  background:linear-gradient(180deg,#fff2f7,#ffe6f0);
  border-bottom:2.5px solid var(--pink);
  padding:9px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  position:sticky;top:0;z-index:200;box-shadow:0 3px 12px var(--shadow);
}
.topbar-title{font-size:1.05rem;font-weight:800;color:var(--rose);white-space:nowrap}
.topbar-tabs{display:flex;gap:5px;flex:1;flex-wrap:wrap}
.t-tab{
  padding:6px 16px;border-radius:30px;background:white;border:2px solid var(--pink);
  font-size:.82rem;font-weight:700;color:var(--soft);cursor:pointer;transition:all .15s;
  white-space:nowrap;
}
.t-tab:hover{background:var(--pink-pale);color:var(--rose)}
.t-tab.active{background:linear-gradient(135deg,var(--pink-dark),var(--rose));color:white;border-color:var(--rose);box-shadow:0 3px 10px rgba(224,60,110,.25)}
.topbar-right{display:flex;gap:6px;align-items:center;margin-left:auto}
.add-btn{
  padding:7px 18px;border-radius:30px;background:linear-gradient(135deg,var(--pink-dark),var(--rose));
  color:white;border:none;font-size:.85rem;font-weight:700;
  box-shadow:0 3px 10px rgba(224,60,110,.3);transition:all .15s;
}
.add-btn:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(224,60,110,.4)}

/* ── 메인 ── */
.main{max-width:960px;margin:0 auto;padding:20px 16px 60px}

/* ── 검색 바 ── */
.search-bar{
  display:flex;gap:8px;align-items:center;margin-bottom:18px;
  background:white;border:2px solid var(--pink-mid);border-radius:14px;padding:8px 14px;
  box-shadow:0 2px 8px var(--shadow);
}
.search-bar input{
  border:none;outline:none;flex:1;font-family:inherit;font-size:.88rem;
  color:var(--text);background:transparent;
}
.search-bar input::placeholder{color:var(--soft)}
.search-icon{font-size:1rem;color:var(--soft)}

/* ── 요약 카드 ── */
.summary-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.sum-card{
  flex:1;min-width:120px;background:white;border-radius:14px;padding:12px 16px;
  border:1.5px solid var(--pink-mid);box-shadow:0 2px 8px var(--shadow);text-align:center;
}
.sum-card .num{font-size:1.6rem;font-weight:800;color:var(--rose);line-height:1}
.sum-card .lbl{font-size:.72rem;color:var(--soft);margin-top:4px;font-weight:600}

/* ── 멤버 그리드 ── */
.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}

/* ── 멤버 카드 ── */
.member-card{
  background:white;border-radius:18px;border:1.5px solid var(--pink-mid);
  padding:18px 16px 14px;box-shadow:0 2px 10px var(--shadow);
  position:relative;transition:all .15s;
}
.member-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(232,100,138,.18)}
.member-card.inactive{opacity:.55;filter:grayscale(.4)}

.card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.avatar{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;font-weight:800;color:white;flex-shrink:0;
  box-shadow:0 3px 8px rgba(0,0,0,.15);
}
.card-info{flex:1;min-width:0}
.card-name{font-size:1rem;font-weight:800;color:var(--text);margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-role{
  display:inline-block;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:700;
  background:var(--pink-pale);color:var(--rose);
}
.card-menu{
  position:absolute;top:12px;right:12px;
  background:none;border:none;font-size:1.1rem;color:var(--soft);
  padding:2px 6px;border-radius:8px;
}
.card-menu:hover{background:var(--pink-pale);color:var(--rose)}

.card-body{font-size:.8rem;color:var(--soft);line-height:1.9}
.card-body .row{display:flex;align-items:center;gap:6px;min-width:0}
.card-body .row span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-body .ico{width:16px;flex-shrink:0;text-align:center}

.card-footer{
  margin-top:12px;padding-top:10px;border-top:1px solid var(--pink-mid);
  display:flex;align-items:center;justify-content:space-between;
}
.card-since{font-size:.7rem;color:var(--soft)}
.status-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
  display:inline-block;margin-right:4px;
}
.status-dot.on{background:#3dbb8f;box-shadow:0 0 0 3px rgba(61,187,143,.2)}
.status-dot.off{background:#ccc}
.status-txt{font-size:.72rem;font-weight:600}

.memo-tag{
  display:inline-block;margin-top:6px;padding:3px 10px;border-radius:10px;
  background:#f5f0fd;color:var(--lav-dark);font-size:.72rem;max-width:100%;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ── 빈 상태 ── */
.empty{text-align:center;padding:60px 0;color:var(--soft)}
.empty .ico{font-size:3rem;margin-bottom:12px}
.empty p{font-size:.9rem}

/* ── 모달 ── */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(58,26,46,.35);
  z-index:500;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(3px);
}
.modal-bg.open{display:flex}
.modal{
  background:white;border-radius:22px;width:100%;max-width:440px;
  box-shadow:0 20px 60px rgba(232,100,138,.25);padding:28px 24px 24px;
  max-height:90vh;overflow-y:auto;
}
.modal h2{font-size:1.1rem;font-weight:800;color:var(--rose);margin-bottom:20px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:.78rem;font-weight:700;color:var(--soft);margin-bottom:5px}
.form-row input,.form-row select,.form-row textarea{
  width:100%;padding:9px 12px;border:1.5px solid var(--pink-mid);border-radius:10px;
  font-family:inherit;font-size:.88rem;color:var(--text);outline:none;
  transition:border-color .15s;background:var(--cream);
}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--rose)}
.form-row textarea{resize:vertical;min-height:60px}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.color-chip{
  width:30px;height:30px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;transition:all .15s;
}
.color-chip.selected{border-color:var(--text);transform:scale(1.15)}
.form-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.btn-cancel{
  padding:8px 20px;border-radius:20px;border:2px solid var(--pink);
  background:white;color:var(--soft);font-size:.85rem;font-weight:700;
}
.btn-cancel:hover{background:var(--pink-pale)}
.btn-save{
  padding:8px 24px;border-radius:20px;border:none;
  background:linear-gradient(135deg,var(--pink-dark),var(--rose));
  color:white;font-size:.85rem;font-weight:700;
  box-shadow:0 3px 10px rgba(224,60,110,.3);
}
.btn-save:hover{transform:translateY(-1px)}
.btn-del{
  padding:8px 16px;border-radius:20px;border:1.5px solid #fca5a5;
  background:white;color:#ef4444;font-size:.85rem;font-weight:700;
  margin-right:auto;
}
.btn-del:hover{background:#fef2f2}

/* ── 컨텍스트 메뉴 ── */
.ctx-menu{
  position:fixed;z-index:600;background:white;border-radius:12px;
  box-shadow:0 8px 30px rgba(0,0,0,.15);border:1.5px solid var(--pink-mid);
  overflow:hidden;display:none;min-width:140px;
}
.ctx-menu.open{display:block}
.ctx-item{
  padding:9px 16px;font-size:.82rem;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:8px;color:var(--text);
}
.ctx-item:hover{background:var(--pink-pale);color:var(--rose)}
.ctx-item.danger{color:#ef4444}
.ctx-item.danger:hover{background:#fef2f2}

/* 역할 배지 색 */
.role-대표{background:#fff4e0;color:#c47c00}
.role-디자이너{background:#e8f4fd;color:#1a7bbf}
.role-제작{background:#e8fdf4;color:#1a8c6b}
.role-포장{background:#fdf0fd;color:#9c27b0}
.role-배송{background:#fdeee8;color:#bf4a1a}
.role-CS{background:#e8e8fd;color:#3f3fbf}
.role-기타{background:var(--pink-pale);color:var(--rose)}

@media(max-width:480px){
  .member-grid{grid-template-columns:1fr}
  .summary-row .sum-card{min-width:80px}
}
</style>
</head>
<body>

<!-- 탑바 -->
<div class="topbar">
  <span class="topbar-title">👥 멤버</span>
  <div class="topbar-tabs">
    <button class="t-tab active" onclick="setTab('all',this)">전체</button>
    <button class="t-tab" onclick="setTab('active',this)">재직중</button>
    <button class="t-tab" onclick="setTab('role',this)">역할별</button>
  </div>
  <div class="topbar-right">
    <button class="add-btn" onclick="openModal()">+ 멤버 추가</button>
  </div>
</div>

<!-- 메인 -->
<div class="main">
  <!-- 검색 -->
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="이름, 역할, 연락처로 검색..." oninput="renderCards()">
  </div>

  <!-- 요약 -->
  <div class="summary-row">
    <div class="sum-card"><div class="num" id="sumTotal">0</div><div class="lbl">전체 멤버</div></div>
    <div class="sum-card"><div class="num" id="sumActive">0</div><div class="lbl">재직중</div></div>
    <div class="sum-card"><div class="num" id="sumRole">0</div><div class="lbl">역할 종류</div></div>
  </div>

  <!-- 역할 필터 (역할별 탭) -->
  <div id="roleFilters" style="display:none;margin-bottom:14px;display:flex;gap:6px;flex-wrap:wrap"></div>

  <!-- 멤버 카드 -->
  <div class="member-grid" id="memberGrid"></div>
</div>

<!-- 추가/편집 모달 -->
<div class="modal-bg" id="modalBg" onclick="closeModalBg(event)">
  <div class="modal">
    <h2 id="modalTitle">멤버 추가</h2>
    <input type="hidden" id="editId">

    <div class="form-row">
      <label>이름 *</label>
      <input type="text" id="fName" placeholder="홍길동">
    </div>
    <div class="form-row">
      <label>역할 / 직책 *</label>
      <select id="fRole">
        <option value="대표">대표</option>
        <option value="디자이너">디자이너</option>
        <option value="제작">제작</option>
        <option value="포장">포장</option>
        <option value="배송">배송</option>
        <option value="CS">CS</option>
        <option value="기타">기타</option>
      </select>
    </div>
    <div class="form-row">
      <label>연락처</label>
      <input type="tel" id="fPhone" placeholder="010-0000-0000">
    </div>
    <div class="form-row">
      <label>이메일</label>
      <input type="email" id="fEmail" placeholder="example@email.com">
    </div>
    <div class="form-row">
      <label>입사일</label>
      <input type="date" id="fJoin">
    </div>
    <div class="form-row">
      <label>상태</label>
      <select id="fStatus">
        <option value="active">재직중</option>
        <option value="inactive">퇴직 / 휴직</option>
      </select>
    </div>
    <div class="form-row">
      <label>메모</label>
      <textarea id="fMemo" placeholder="특이사항, 담당업무 등..."></textarea>
    </div>
    <div class="form-row">
      <label>아바타 색상</label>
      <div class="color-row" id="colorRow"></div>
    </div>

    <div class="form-btns">
      <button class="btn-del" id="btnDel" onclick="deleteMember()" style="display:none">🗑 삭제</button>
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveMember()">저장</button>
    </div>
  </div>
</div>

<!-- 컨텍스트 메뉴 -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" onclick="ctxEdit()">✏️ 편집</div>
  <div class="ctx-item danger" onclick="ctxDelete()">🗑 삭제</div>
</div>

<script>
const COLORS=['#e8648a','#7040c0','#3dbb8f','#f0b429','#1a7bbf','#c47c00','#bf4a1a','#9c27b0'];
let members=[];
let currentTab='all';
let selectedRoleFilter='all';
let ctxTargetId=null;

function load(){
  try{members=JSON.parse(localStorage.getItem('mirimembers')||'[]')}catch(e){members=[]}
}
function save(){localStorage.setItem('mirimembers',JSON.stringify(members))}

function genId(){return Date.now()+Math.random().toString(36).slice(2)}

function initColorRow(selected){
  const cr=document.getElementById('colorRow');
  cr.innerHTML=COLORS.map(c=>`
    <div class="color-chip${selected===c?' selected':''}" style="background:${c}" data-c="${c}" onclick="selectColor(this)"></div>
  `).join('');
}
function selectColor(el){
  document.querySelectorAll('.color-chip').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
}
function getSelectedColor(){
  const el=document.querySelector('.color-chip.selected');
  return el?el.dataset.c:COLORS[0];
}

function openModal(id){
  document.getElementById('modalBg').classList.add('open');
  document.getElementById('btnDel').style.display='none';
  document.getElementById('editId').value='';
  if(id){
    const m=members.find(x=>x.id===id);
    if(!m)return;
    document.getElementById('modalTitle').textContent='멤버 편집';
    document.getElementById('editId').value=id;
    document.getElementById('fName').value=m.name;
    document.getElementById('fRole').value=m.role;
    document.getElementById('fPhone').value=m.phone||'';
    document.getElementById('fEmail').value=m.email||'';
    document.getElementById('fJoin').value=m.join||'';
    document.getElementById('fStatus').value=m.status||'active';
    document.getElementById('fMemo').value=m.memo||'';
    initColorRow(m.color||COLORS[0]);
    document.getElementById('btnDel').style.display='block';
  } else {
    document.getElementById('modalTitle').textContent='멤버 추가';
    document.getElementById('fName').value='';
    document.getElementById('fRole').value='기타';
    document.getElementById('fPhone').value='';
    document.getElementById('fEmail').value='';
    document.getElementById('fJoin').value=new Date().toISOString().slice(0,10);
    document.getElementById('fStatus').value='active';
    document.getElementById('fMemo').value='';
    initColorRow(COLORS[0]);
  }
}
function closeModal(){document.getElementById('modalBg').classList.remove('open')}
function closeModalBg(e){if(e.target===document.getElementById('modalBg'))closeModal()}

function saveMember(){
  const name=document.getElementById('fName').value.trim();
  if(!name){alert('이름을 입력해주세요');return}
  const id=document.getElementById('editId').value||genId();
  const m={
    id,name,
    role:document.getElementById('fRole').value,
    phone:document.getElementById('fPhone').value.trim(),
    email:document.getElementById('fEmail').value.trim(),
    join:document.getElementById('fJoin').value,
    status:document.getElementById('fStatus').value,
    memo:document.getElementById('fMemo').value.trim(),
    color:getSelectedColor(),
  };
  const idx=members.findIndex(x=>x.id===id);
  if(idx>=0)members[idx]=m; else members.push(m);
  save();renderCards();closeModal();
}

function deleteMember(){
  const id=document.getElementById('editId').value;
  if(!id)return;
  if(!confirm('이 멤버를 삭제할까요?'))return;
  members=members.filter(x=>x.id!==id);
  save();renderCards();closeModal();
}

function setTab(tab,el){
  currentTab=tab;
  selectedRoleFilter='all';
  document.querySelectorAll('.t-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const rf=document.getElementById('roleFilters');
  rf.style.display=tab==='role'?'flex':'none';
  renderCards();
}

function renderCards(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const rf=document.getElementById('roleFilters');

  let list=members.filter(m=>{
    if(currentTab==='active'&&m.status!=='active')return false;
    if(currentTab==='role'&&selectedRoleFilter!=='all'&&m.role!==selectedRoleFilter)return false;
    if(!q)return true;
    return(m.name+m.role+(m.phone||'')+(m.email||'')).toLowerCase().includes(q);
  });

  // 역할 필터 버튼
  if(currentTab==='role'){
    const roles=[...new Set(members.map(m=>m.role))];
    rf.innerHTML=['전체',...roles].map(r=>`
      <button class="t-tab${selectedRoleFilter===(r==='전체'?'all':r)?' active':''}"
        onclick="setRoleFilter('${r==='전체'?'all':r}')">${r}</button>
    `).join('');
  }

  // 요약
  document.getElementById('sumTotal').textContent=members.length;
  document.getElementById('sumActive').textContent=members.filter(m=>m.status==='active').length;
  document.getElementById('sumRole').textContent=new Set(members.map(m=>m.role)).size;

  const grid=document.getElementById('memberGrid');
  if(!list.length){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="ico">👥</div><p>멤버가 없습니다</p></div>`;
    return;
  }

  grid.innerHTML=list.map(m=>`
    <div class="member-card${m.status==='inactive'?' inactive':''}">
      <button class="card-menu" onclick="openCtx(event,'${m.id}')">⋯</button>
      <div class="card-top">
        <div class="avatar" style="background:${m.color||COLORS[0]}">${m.name.slice(0,1)}</div>
        <div class="card-info">
          <div class="card-name">${esc(m.name)}</div>
          <span class="card-role role-${m.role}">${m.role}</span>
        </div>
      </div>
      <div class="card-body">
        ${m.phone?`<div class="row"><span class="ico">📞</span><span>${esc(m.phone)}</span></div>`:''}
        ${m.email?`<div class="row"><span class="ico">✉️</span><span>${esc(m.email)}</span></div>`:''}
        ${m.memo?`<div class="memo-tag">💬 ${esc(m.memo)}</div>`:''}
      </div>
      <div class="card-footer">
        <span class="card-since">${m.join?'입사 '+m.join:''}</span>
        <span>
          <span class="status-dot ${m.status==='active'?'on':'off'}"></span>
          <span class="status-txt">${m.status==='active'?'재직중':'퇴직/휴직'}</span>
        </span>
      </div>
    </div>
  `).join('');
}

function setRoleFilter(r){
  selectedRoleFilter=r;
  renderCards();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// 컨텍스트 메뉴
function openCtx(e,id){
  e.stopPropagation();
  ctxTargetId=id;
  const m=document.getElementById('ctxMenu');
  m.style.left=Math.min(e.clientX,window.innerWidth-160)+'px';
  m.style.top=Math.min(e.clientY,window.innerHeight-90)+'px';
  m.classList.add('open');
}
function closeCtx(){document.getElementById('ctxMenu').classList.remove('open')}
function ctxEdit(){closeCtx();openModal(ctxTargetId)}
function ctxDelete(){
  closeCtx();
  if(!confirm('이 멤버를 삭제할까요?'))return;
  members=members.filter(x=>x.id!==ctxTargetId);
  save();renderCards();
}
document.addEventListener('click',()=>closeCtx());

load();renderCards();
</script>
</body>
</html>
