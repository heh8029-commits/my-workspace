<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👥 멤버 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#f7a8c0;--pink-dark:#e8648a;--pink-pale:#fff0f5;--pink-mid:#fcd5e5;
  --rose:#e03c6e;--cream:#fff8fb;--text:#3a1a2e;--soft:#b888a8;
  --shadow:rgba(232,100,138,.13);--white:#fff;
  --lav:#ddd0f8;--lav-dark:#8b60d0;
}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
button{font-family:inherit;cursor:pointer}

/* ── 탑바 ── */
.topbar{
  background:linear-gradient(180deg,#fff2f7,#ffe6f0);
  border-bottom:2.5px solid var(--pink);
  padding:9px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  position:sticky;top:0;z-index:200;box-shadow:0 3px 12px var(--shadow);
}
.topbar-title{font-size:1.05rem;font-weight:800;color:var(--rose);white-space:nowrap}
.topbar-tabs{display:flex;gap:5px;flex:1;flex-wrap:wrap}
.t-tab{
  padding:6px 16px;border-radius:30px;background:white;border:2px solid var(--pink);
  font-size:.82rem;font-weight:700;color:var(--soft);cursor:pointer;transition:all .15s;
  white-space:nowrap;
}
.t-tab:hover{background:var(--pink-pale);color:var(--rose)}
.t-tab.active{background:linear-gradient(135deg,var(--pink-dark),var(--rose));color:white;border-color:var(--rose);box-shadow:0 3px 10px rgba(224,60,110,.25)}
.topbar-right{display:flex;gap:6px;align-items:center;margin-left:auto}
.add-btn{
  padding:7px 18px;border-radius:30px;background:linear-gradient(135deg,var(--pink-dark),var(--rose));
  color:white;border:none;font-size:.85rem;font-weight:700;
  box-shadow:0 3px 10px rgba(224,60,110,.3);transition:all .15s;
}
.add-btn:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(224,60,110,.4)}

/* ── 메인 ── */
.main{max-width:960px;margin:0 auto;padding:20px 16px 60px}

/* ── 어드민 뷰 ── */
.admin-topnav{
  background:linear-gradient(180deg,#fff2f7,#ffe6f0);
  border-bottom:2px solid var(--pink);padding:10px 20px;
  display:flex;align-items:center;flex-wrap:wrap;gap:10px;
  position:sticky;top:56px;z-index:100;
}
.admin-period-row{display:flex;align-items:center;gap:6px;}
.admin-nav-btn{
  width:32px;height:32px;border-radius:50%;border:2px solid var(--pink);
  background:white;color:var(--rose);font-size:1.2rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;line-height:1;
}
.admin-nav-btn:hover{background:var(--pink-pale);}
.admin-period-lbl{font-size:.92rem;font-weight:700;color:var(--text);min-width:130px;text-align:center;}
.admin-action-row{display:flex;gap:8px;flex:1;justify-content:flex-end;}
.admin-action-btn{
  padding:7px 16px;border-radius:20px;border:2px solid var(--pink);
  background:white;color:var(--text);font-size:.82rem;font-weight:700;
}
.admin-action-btn:hover{background:var(--pink-pale);}
.admin-action-btn.active{background:linear-gradient(135deg,var(--pink-dark),var(--rose));color:white;border-color:var(--rose);}
.admin-action-btn.pink-btn{
  background:linear-gradient(135deg,#f0b0c8,var(--rose));
  color:white;border-color:var(--rose);
}
.admin-card-inner{
  background:white;border-radius:16px;
  box-shadow:0 4px 16px var(--shadow);overflow:hidden;margin-bottom:20px;
}
.admin-card-title{padding:16px 20px 4px;font-size:1rem;font-weight:800;color:var(--text);}
.admin-card-subtitle{padding:2px 20px 12px;font-size:.78rem;color:var(--soft);}
.admin-tbl{width:100%;border-collapse:collapse;}
.admin-tbl th{
  background:linear-gradient(135deg,var(--pink-pale),#fff0fa);
  padding:10px 14px;font-size:.78rem;font-weight:700;color:var(--soft);
  border-bottom:1px solid var(--pink-mid);text-align:center;
}
.admin-tbl th:first-child{text-align:left;}
.admin-tbl td{
  padding:10px 14px;font-size:.82rem;border-bottom:1px solid var(--pink-mid);
  text-align:center;color:var(--text);
}
.admin-tbl td:first-child{text-align:left;}
.admin-tbl tr:last-child td{border-bottom:none;}
.emp-name{display:flex;align-items:center;gap:6px;font-weight:700;}
.admin-tbl .total-row td{background:var(--pink-pale);font-weight:700;color:var(--rose);}
.admin-tbl .total-row td:first-child{text-align:right;font-size:.78rem;color:var(--soft);}
.admin-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:12px;}
.admin-cal-hd{text-align:center;font-size:.75rem;font-weight:700;color:var(--soft);padding:6px 0;}
.admin-cal-day{border-radius:10px;background:var(--pink-pale);padding:9px 8px;min-height:140px;}
.admin-cal-day.out-period{background:#f5f5f8;opacity:.55;}
.admin-cal-day.saturday{background:#dff0ff;}
.admin-cal-day.sunday{background:#e8e8ec;}
.admin-cal-date{font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:3px;}
.admin-cal-total{font-size:.82rem;font-weight:800;color:var(--rose);margin-bottom:5px;}
.admin-cal-emp{font-size:.75rem;color:var(--text);display:flex;align-items:center;gap:4px;margin:2px 0;line-height:1.4;}
.admin-cal-emp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.member-overlay{
  display:none;position:fixed;inset:0;z-index:400;
  background:rgba(100,50,80,.4);backdrop-filter:blur(4px);
  overflow:auto;
}
.member-overlay.open{display:block;}
.member-overlay-card{
  background:var(--cream);max-width:960px;margin:40px auto;
  border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,.2);overflow:hidden;
}
.member-overlay-hd{
  background:linear-gradient(180deg,#fff2f7,#ffe6f0);
  border-bottom:2px solid var(--pink);
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
  font-size:1rem;font-weight:800;color:var(--rose);position:sticky;top:0;
}
.member-overlay-close{
  width:32px;height:32px;border-radius:50%;border:2px solid var(--pink);
  background:white;color:var(--rose);font-size:1rem;font-weight:700;
}
.member-overlay-body{padding:16px;}

/* ── 요약 카드 ── */
.summary-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.sum-card{
  flex:1;min-width:120px;background:white;border-radius:14px;padding:12px 16px;
  border:1.5px solid var(--pink-mid);box-shadow:0 2px 8px var(--shadow);text-align:center;
}
.sum-card .num{font-size:1.6rem;font-weight:800;color:var(--rose);line-height:1}
.sum-card .lbl{font-size:.72rem;color:var(--soft);margin-top:4px;font-weight:600}

/* ── 멤버 그리드 ── */
.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}

/* ── 멤버 카드 ── */
.member-card{
  background:white;border-radius:18px;border:1.5px solid var(--pink-mid);
  padding:18px 16px 14px;box-shadow:0 2px 10px var(--shadow);
  position:relative;transition:all .15s;
}
.member-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(232,100,138,.18)}
.member-card.inactive{opacity:.55;filter:grayscale(.4)}

.card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.avatar{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;font-weight:800;color:white;flex-shrink:0;
  box-shadow:0 3px 8px rgba(0,0,0,.15);
}
.card-info{flex:1;min-width:0}
.card-name{font-size:1rem;font-weight:800;color:var(--text);margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-role{
  display:inline-block;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:700;
  background:var(--pink-pale);color:var(--rose);
}
.card-menu{
  position:absolute;top:12px;right:12px;
  background:none;border:none;font-size:1.1rem;color:var(--soft);
  padding:2px 6px;border-radius:8px;
}
.card-menu:hover{background:var(--pink-pale);color:var(--rose)}

.card-body{font-size:.8rem;color:var(--soft);line-height:1.9}
.card-body .row{display:flex;align-items:center;gap:6px;min-width:0}
.card-body .row span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-body .ico{width:16px;flex-shrink:0;text-align:center}

.card-footer{
  margin-top:12px;padding-top:10px;border-top:1px solid var(--pink-mid);
  display:flex;align-items:center;justify-content:space-between;
}
.card-since{font-size:.7rem;color:var(--soft)}
.status-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
  display:inline-block;margin-right:4px;
}
.status-dot.on{background:#3dbb8f;box-shadow:0 0 0 3px rgba(61,187,143,.2)}
.status-dot.off{background:#ccc}
.status-txt{font-size:.72rem;font-weight:600}

.memo-tag{
  display:inline-block;margin-top:6px;padding:3px 10px;border-radius:10px;
  background:#f5f0fd;color:var(--lav-dark);font-size:.72rem;max-width:100%;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ── 빈 상태 ── */
.empty{text-align:center;padding:60px 0;color:var(--soft)}
.empty .ico{font-size:3rem;margin-bottom:12px}
.empty p{font-size:.9rem}

/* ── 모달 ── */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(58,26,46,.35);
  z-index:500;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(3px);
}
.modal-bg.open{display:flex}
.modal{
  background:white;border-radius:22px;width:100%;max-width:440px;
  box-shadow:0 20px 60px rgba(232,100,138,.25);padding:28px 24px 24px;
  max-height:90vh;overflow-y:auto;
}
.modal h2{font-size:1.1rem;font-weight:800;color:var(--rose);margin-bottom:20px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:.78rem;font-weight:700;color:var(--soft);margin-bottom:5px}
.form-row input,.form-row select,.form-row textarea{
  width:100%;padding:9px 12px;border:1.5px solid var(--pink-mid);border-radius:10px;
  font-family:inherit;font-size:.88rem;color:var(--text);outline:none;
  transition:border-color .15s;background:var(--cream);
}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--rose)}
.form-row textarea{resize:vertical;min-height:60px}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.color-chip{
  width:30px;height:30px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;transition:all .15s;
}
.color-chip.selected{border-color:var(--text);transform:scale(1.15)}
.form-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.btn-cancel{
  padding:8px 20px;border-radius:20px;border:2px solid var(--pink);
  background:white;color:var(--soft);font-size:.85rem;font-weight:700;
}
.btn-cancel:hover{background:var(--pink-pale)}
.btn-save{
  padding:8px 24px;border-radius:20px;border:none;
  background:linear-gradient(135deg,var(--pink-dark),var(--rose));
  color:white;font-size:.85rem;font-weight:700;
  box-shadow:0 3px 10px rgba(224,60,110,.3);
}
.btn-save:hover{transform:translateY(-1px)}
.btn-del{
  padding:8px 16px;border-radius:20px;border:1.5px solid #fca5a5;
  background:white;color:#ef4444;font-size:.85rem;font-weight:700;
  margin-right:auto;
}
.btn-del:hover{background:#fef2f2}

/* ── 컨텍스트 메뉴 ── */
.ctx-menu{
  position:fixed;z-index:600;background:white;border-radius:12px;
  box-shadow:0 8px 30px rgba(0,0,0,.15);border:1.5px solid var(--pink-mid);
  overflow:hidden;display:none;min-width:140px;
}
.ctx-menu.open{display:block}
.ctx-item{
  padding:9px 16px;font-size:.82rem;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:8px;color:var(--text);
}
.ctx-item:hover{background:var(--pink-pale);color:var(--rose)}
.ctx-item.danger{color:#ef4444}
.ctx-item.danger:hover{background:#fef2f2}


/* ── 서브페이지 ── */
.subpage{display:none}
.subpage.active{display:block}

/* ── 출퇴근 페이지 배경 ── */
#page-attendance{
  min-height:calc(100vh - 54px);
  background:linear-gradient(140deg,#fce8f0 0%,#f0e8fc 50%,#e8eeff 100%);
  padding:28px 20px 60px;
}

/* ── 출퇴근 카드 ── */
.att-card{
  max-width:1100px;margin:0 auto;
  background:white;border-radius:24px;
  padding:30px 32px 24px;
  box-shadow:0 6px 36px rgba(200,150,220,.14);
}

/* 카드 헤더 */
.att-card-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.att-card-title{font-size:1.55rem;font-weight:800;color:var(--text)}
.att-card-sub{font-size:.73rem;color:var(--soft);margin-top:4px;font-weight:500}
.att-admin-btn{
  padding:7px 14px;border-radius:12px;border:1.5px solid #e2d6f4;
  background:white;font-size:.8rem;font-weight:700;color:#8060b0;
  display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap;
  transition:all .15s;flex-shrink:0;
}
.att-admin-btn:hover{background:#f5f0fd;border-color:#c0a0e8}

/* 직원 선택 라벨 */
.att-section-label{font-size:.78rem;font-weight:700;color:var(--soft);margin-bottom:10px}
.att-hint{font-size:.72rem;font-weight:400;color:#ccc;margin-left:6px}

/* 꽃 모션 */
@keyframes bloom{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.35)}
}
@keyframes bloom-fast{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.4)}
}
.att-flower{
  display:inline-block;font-size:1.8rem;flex-shrink:0;
  animation:bloom 2.4s ease-in-out infinite;
}
.att-emp-btn.selected .att-flower{
  animation:bloom-fast .7s ease-in-out infinite;
}

/* 직원 버튼 그리드 */
.att-emp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:26px}
.att-emp-btn{
  background:white;border:2.5px solid #ede8f8;border-radius:20px;
  padding:28px 16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:12px;
  font-family:inherit;transition:all .15s;
  box-shadow:0 2px 10px rgba(200,180,240,.13);
  min-height:90px;
}
.att-emp-btn:hover{border-color:var(--pink);background:#fff5fa;transform:translateY(-2px);box-shadow:0 6px 18px rgba(232,100,138,.15)}
.att-emp-btn.selected{
  background:linear-gradient(135deg,#fff0f6,#ffe0ec);
  border-color:var(--rose);
  box-shadow:0 6px 20px rgba(224,60,110,.22);
}
.att-emp-label{display:flex;align-items:baseline;gap:2px}
.att-emp-eng{font-size:1.3rem;font-weight:800;color:var(--text);letter-spacing:.02em}
.att-emp-nick{font-size:.85rem;color:var(--soft);font-weight:600}
.att-emp-btn.selected .att-emp-eng{color:var(--rose)}
.att-emp-btn.selected .att-emp-nick{color:var(--pink-dark)}

/* 컨트롤 박스 */
.att-controls{border-top:1.5px solid #f5eeff;padding-top:16px;margin-bottom:14px}
.att-ctrl-row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
.att-ctrl-item{display:flex;flex-direction:column;gap:4px}
.att-ctrl-hd{display:flex;align-items:center;gap:4px;font-size:.68rem;font-weight:700;color:var(--soft)}
.att-yesterday-btn{
  padding:7px 12px;border-radius:8px;border:1.5px solid #ede8f8;
  background:#fdfaff;font-size:.8rem;font-weight:700;color:var(--soft);
  cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0;
}
.att-yesterday-btn:hover{background:var(--pink-pale);color:var(--rose)}
.att-btn-row{display:flex;gap:8px;width:100%}
.att-input-date{
  border:1.5px solid #ede8f8;border-radius:8px;padding:7px 9px;
  font-family:inherit;font-size:.88rem;color:var(--text);outline:none;
  background:#fdfaff;
}
.att-input-date:focus{border-color:var(--rose)}
.att-sel{
  border:1.5px solid #ede8f8;border-radius:8px;padding:7px 6px;
  font-family:inherit;font-size:.88rem;color:var(--text);outline:none;
  background:#fdfaff;cursor:pointer;min-width:58px;
}
.att-sel:focus{border-color:var(--rose)}
.att-off-lbl{display:flex;align-items:center;gap:5px;font-size:.85rem;
  color:var(--soft);cursor:pointer;padding:7px 0}
.att-off-lbl input{accent-color:var(--rose);width:16px;height:16px}
.att-btn-row{display:flex;gap:8px}
.att-btn-save{
  flex:1;padding:10px 0;border-radius:12px;border:none;
  background:linear-gradient(135deg,#b8f0d8,#3dbb8f);
  color:white;font-size:.92rem;font-weight:800;font-family:inherit;
  box-shadow:0 3px 12px rgba(61,187,143,.28);cursor:pointer;transition:all .15s;
  white-space:nowrap;
}
.att-btn-save:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(61,187,143,.38)}
.att-btn-log{
  padding:10px 20px;border-radius:12px;border:1.5px solid #ffe066;
  background:#fffce0;color:#a08010;font-size:.85rem;font-weight:700;
  font-family:inherit;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;
}
.att-btn-log:hover{background:#fff8b0}

/* 인포 & 팁 */
.att-info{
  border:1.5px solid #ede8f8;border-radius:12px;
  padding:12px 16px;font-size:.9rem;color:var(--text);margin-bottom:10px;
  min-height:44px;background:#fdfaff;
}
.att-tip{font-size:.74rem;color:#bbb;padding-left:2px}

/* ── 근무일정표 오버레이 ── */
.log-overlay{
  display:none;position:fixed;inset:0;z-index:800;
  background:linear-gradient(140deg,#fce8f0 0%,#f0e8fc 50%,#e8eeff 100%);
  overflow-y:auto;padding:24px 20px 60px;
}
.log-overlay.open{display:block}
.log-card{max-width:1100px;margin:0 auto;background:white;border-radius:24px;
  padding:26px 28px;box-shadow:0 6px 36px rgba(200,150,220,.14);}

/* 헤더 */
.log-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:10px}
.log-title{font-size:1.45rem;font-weight:800;color:var(--text)}
.log-back-btn{
  padding:8px 18px;border-radius:20px;border:1.5px solid #ede8f8;
  background:white;font-size:.85rem;font-weight:700;color:#8060b0;
  cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit;
}
.log-back-btn:hover{background:#f5f0fd}

/* 기간 네비 */
.log-nav{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.log-nav-btn{
  width:32px;height:32px;border-radius:50%;border:1.5px solid #ede8f8;
  background:white;font-size:1rem;font-weight:700;color:#8060b0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;font-family:inherit;
}
.log-nav-btn:hover{background:#f5f0fd}
.log-period-lbl{font-size:1rem;font-weight:800;color:var(--text);min-width:160px;text-align:center}
.log-period-hint{font-size:.73rem;color:var(--soft);margin-bottom:18px}

/* 캘린더 그리드 */
.log-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.log-grid-hd{
  text-align:center;font-size:.78rem;font-weight:700;color:var(--soft);
  padding:6px 0;
}
.log-day{
  border-radius:12px;padding:8px 8px 10px;min-height:72px;
  display:flex;flex-direction:column;gap:4px;
}
.log-day.in-period{background:white;border:1.5px solid #f0eaff;box-shadow:0 2px 8px rgba(200,180,240,.1)}
.log-day.out-period{background:transparent;opacity:.4}
.log-day.has-data.in-period{border-color:var(--pink-mid)}
.log-day-date{font-size:.75rem;font-weight:700;color:#888}
.log-day.in-period .log-day-date{color:var(--text)}

<script>
const COLORS=['#e8648a','#7040c0','#3dbb8f','#f0b429','#1a7bbf','#c47c00','#bf4a1a','#9c27b0'];
let members=[];
let currentTab='attendance';
let ctxTargetId=null;

const FB_MEMBERS   ='https://my-workspace-b1b7a-default-rtdb.firebaseio.com/ws5/member_members.json';
const FB_ATT_BASE  ='https://my-workspace-b1b7a-default-rtdb.firebaseio.com/ws5/member_attendance';
const FB_SJ_BASE   ='https://my-workspace-b1b7a-default-rtdb.firebaseio.com/ws5/member_sjlogs';

async function fbGet(url){
  const r=await fetch(url+'?t='+Date.now());
  if(r.ok){const d=await r.json();return d;}
  return null;
}
async function fbPut(url,data){
  await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
}

async function load(){
  try{const d=await fbGet(FB_MEMBERS);members=Array.isArray(d)?d:[];}catch(e){members=[];}
}
async function save(){await fbPut(FB_MEMBERS,members);}

async function fbPost(url,data){
  await fetch(url+'.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
}
async function loadAttLogs(){
  try{
    const d=await fbGet(FB_ATT_BASE+'.json');
    if(!d)return[];
    if(Array.isArray(d))return d.filter(Boolean);
    if(typeof d==='object')return Object.values(d).filter(Boolean);
    return[];
  }catch(e){return[];}
}
async function saveAttLog(entry){await fbPost(FB_ATT_BASE,entry);}

async function loadSjLogs(){
  try{
    const d=await fbGet(FB_SJ_BASE+'.json');
    if(!d)return[];
    if(Array.isArray(d))return d.filter(Boolean);
    if(typeof d==='object')return Object.values(d).filter(Boolean);
    return[];
  }catch(e){return[];}
}
async function saveSjEntry(memberId,date,sjId,sjName,price,qty){
  const key=`${memberId}_${date}_${sjId}`;
  await fbPut(`${FB_SJ_BASE}/${key}.json`,{memberId,date,sjId,sjName,price:Number(price),qty:Number(qty),total:Number(price)*Number(qty),at:Date.now()});
}

function genId(){return Date.now()+Math.random().toString(36).slice(2)}

function avatarColor(name){
  const idx=name.charCodeAt(0)%COLORS.length;
  return COLORS[idx];
}

function renderSjFields(list){
  document.getElementById('sjFieldList').innerHTML='';
  list.forEach(sj=>addSjFieldItem(sj));
}
function addSjField(){addSjFieldItem();}
function addSjFieldItem(sj){
  const id=sj?sj.id:genId();
  const el=document.createElement('div');
  el.className='sj-field';el.dataset.sjid=id;
  el.innerHTML=`<input type="text" class="sj-name-input" placeholder="부업명 (예: 사은품, 꽃다발만들기)" value="${sj?esc(sj.name):''}">
    <div class="sj-field-row2">
      <input type="number" class="sj-price-input" placeholder="단가 (원)" value="${sj?sj.price:''}" min="0">
      <span style="font-size:.78rem;color:var(--soft);white-space:nowrap">원 / 개</span>
      <button type="button" class="sj-rm-btn" onclick="this.closest('.sj-field').remove()">✕</button>
    </div>`;
  document.getElementById('sjFieldList').appendChild(el);
}
function getSjFields(){
  return[...document.querySelectorAll('#sjFieldList .sj-field')].map(el=>({
    id:el.dataset.sjid,
    name:el.querySelector('.sj-name-input').value.trim(),
    price:Number(el.querySelector('.sj-price-input').value)||0,
  })).filter(sj=>sj.name);
}

async function saveMember(){
  const name=document.getElementById('fName').value.trim();
  if(!name){alert('이름을 입력해주세요');return}
  const id=document.getElementById('editId').value||genId();
  const m={
    id,name,
    eng:document.getElementById('fEng').value.trim().toUpperCase(),
    nick:document.getElementById('fNick').value.trim(),
    phone:document.getElementById('fPhone').value.trim(),
    join:document.getElementById('fJoin').value,
    status:document.getElementById('fStatus').value,
    wage:document.getElementById('fWage').value,
    tax:document.getElementById('fTax').checked,
    account:document.getElementById('fAccount').value.trim(),
    memo:document.getElementById('fMemo').value.trim(),
    sidejobs:getSjFields(),
  };
  const idx=members.findIndex(x=>x.id===id);
  if(idx>=0)members[idx]=m; else members.push(m);
  await save();renderCards();closeModal();if(currentTab==='admin')renderAdmin();
}

async function deleteMember(){
  const id=document.getElementById('editId').value;
  if(!id)return;
  if(!confirm('이 멤버를 삭제할까요?'))return;
  members=members.filter(x=>x.id!==id);
  await save();renderCards();closeModal();if(currentTab==='admin')renderAdmin();
}

let logPeriodOffset=0;
let adminOffset=0;
let isAdmin=false;

function getPeriodDates(offset){
  const today=new Date();
  const day=today.getDate();
  let sy=today.getFullYear(),sm;
  if(day<=10){sm=today.getMonth()-1;if(sm<0){sm=11;sy--;}}
  else{sm=today.getMonth();}
  sm+=offset;
  while(sm>11){sm-=12;sy++;}
  while(sm<0){sm+=12;sy--;}
  const em=sm+1>11?0:sm+1,ey=sm+1>11?sy+1:sy;
  return{start:new Date(sy,sm,11),end:new Date(ey,em,10)};
}

async function renderLog(){
  const m=members.find(x=>x.id===attSelected);
  if(!m)return;
  document.getElementById('logCalendar').innerHTML='<div style="text-align:center;padding:40px;color:var(--soft)">불러오는 중...</div>';
  const{start,end}=getPeriodDates(logPeriodOffset);
  const fmt=d=>`${d.getMonth()+1}월${d.getDate()}일`;
  document.getElementById('logTitle').innerHTML=
    `💗 <strong>${esc(m.eng||m.name)}</strong>${m.nick?`(${esc(m.nick)})`:''}  근무일정표 ✨`;
  document.getElementById('logPeriodLabel').textContent=`${fmt(start)}~${fmt(end)}`;

  const m2=members.find(x=>x.id===attSelected);
  const hasSj=m2&&m2.sidejobs&&m2.sidejobs.length>0;
  const [logs,sjLogs]=await Promise.all([loadAttLogs(),hasSj?loadSjLogs():Promise.resolve([])]);
  const dayMap={};
  for(const l of logs.filter(l=>l.memberId===attSelected)){
    if(!dayMap[l.date])dayMap[l.date]={totalMin:0,isOff:false,count:0};
    if(l.isOff){dayMap[l.date].isOff=true;}
    else{dayMap[l.date].totalMin+=parseInt(l.hour)*60+parseInt(l.min);dayMap[l.date].count++;}
  }
  const sjDayMap={};
  for(const l of sjLogs.filter(l=>l.memberId===attSelected)){
    if(!sjDayMap[l.date])sjDayMap[l.date]={total:0,items:[]};
    sjDayMap[l.date].total+=l.total||0;
    sjDayMap[l.date].items.push(l);
  }

  // 월요일부터 시작하는 캘린더 범위
  const calStart=new Date(start);
  const sd=calStart.getDay();
  calStart.setDate(calStart.getDate()-(sd===0?6:sd-1));
  const calEnd=new Date(end);
  const ed=calEnd.getDay();
  calEnd.setDate(calEnd.getDate()+(ed===0?0:7-ed));

  let html=`<div class="log-grid">`;
  for(const h of['월','화','수','목','금','토','일'])
    html+=`<div class="log-grid-hd">${h}</div>`;

  let totalMin=0,offDays=0,workDays=0;
  const cur=new Date(calStart);
  while(cur<=calEnd){
    const ds=cur.toISOString().slice(0,10);
    const inP=cur>=start&&cur<=end;
    const dd=dayMap[ds];
    const mins=dd?dd.totalMin:0;
    const isOff=dd?dd.isOff:false;
    const hasData=!!dd;
    if(inP&&hasData){if(isOff)offDays++;else{workDays++;totalMin+=mins;}}
    const h=Math.floor(mins/60),mn=mins%60;
    const lbl=isOff?'🌴 휴무':`⏰ ${h}시간 ${mn}분`;
    const sjDay=sjDayMap[ds];
    const clickable=inP&&hasSj?`onclick="openSjOverlay('${ds}')" style="cursor:pointer"`:'';
    html+=`<div class="log-day${inP?' in-period':' out-period'}${hasData?' has-data':''}${isOff?' off-day':''}" ${clickable}>
      <div class="log-day-date">${cur.getMonth()+1}/${cur.getDate()}</div>
      <div class="log-day-time">${lbl}</div>
      ${hasSj&&inP?`<div class="log-day-sj">💼 ${sjDay?sjDay.total.toLocaleString()+'원':'부업 입력'}</div>`:''}
    </div>`;
    cur.setDate(cur.getDate()+1);
  }
  html+='</div>';
  document.getElementById('logCalendar').innerHTML=html;

  const th=Math.floor(totalMin/60),tm=totalMin%60;
  let sjPeriodTotal=0;
  for(const ds of Object.keys(sjDayMap)){
    const d=new Date(ds+'T00:00:00');
    if(d>=start&&d<=end) sjPeriodTotal+=sjDayMap[ds].total||0;
  }
  document.getElementById('logSummary').innerHTML=
    `<div class="log-sum-item">근무일 <span>${workDays}일</span></div>
     <div class="log-sum-item">총 근무시간 <span>${th}시간 ${tm}분</span></div>
     <div class="log-sum-item">휴무 <span>${offDays}일</span></div>
     ${hasSj?`<div class="log-sum-item">부업 수입 <span>${sjPeriodTotal.toLocaleString()}원</span></div>`:''}
`;
}

async function renderAdmin(){
  const{start,end}=getPeriodDates(adminOffset);
  const fmt=d=>`${d.getMonth()+1}월${d.getDate()}일`;
  document.getElementById('adminPeriodLabel').textContent=`${fmt(start)}~${fmt(end)}`;
  document.getElementById('adminSummaryTable').innerHTML=`<div style="text-align:center;padding:30px;color:var(--soft)">불러오는 중...</div>`;
  document.getElementById('adminCalGrid').innerHTML='';

  const [logs,sjLogs]=await Promise.all([loadAttLogs(),loadSjLogs()]);
  const activeMembers=members.filter(m=>m.status==='active');

  const memberStats={};
  for(const m of activeMembers) memberStats[m.id]={totalMin:0,offDays:0,workDays:0,sjTotal:0};

  // 부업 집계
  for(const l of sjLogs){
    const d=new Date(l.date+'T00:00:00');
    if(d<start||d>end)continue;
    if(memberStats[l.memberId]!==undefined) memberStats[l.memberId].sjTotal+=l.total||0;
  }

  const dayData={};
  for(const l of logs){
    const d=new Date(l.date+'T00:00:00');
    if(d<start||d>end)continue;
    const ms=memberStats[l.memberId];
    if(!ms)continue;
    if(!dayData[l.date])dayData[l.date]={};
    if(!dayData[l.date][l.memberId])dayData[l.date][l.memberId]={totalMin:0,isOff:false};
    if(l.isOff){
      ms.offDays++;
      dayData[l.date][l.memberId].isOff=true;
    }else{
      const mins=parseInt(l.hour)*60+parseInt(l.min);
      ms.totalMin+=mins; ms.workDays++;
      dayData[l.date][l.memberId].totalMin+=mins;
    }
  }

  // 직원별 누적 테이블
  let tbl=`<div class="admin-card-inner">
    <div class="admin-card-title">🌟 직원별 누적 (${fmt(start)}~${fmt(end)})</div>
    <div class="admin-card-subtitle">🌴 휴무는 "휴무(일)"만 증가 (근무시간/급여에는 영향 없음)</div>
    <table class="admin-tbl"><thead><tr>
      <th>직원</th><th>근무시간</th><th>휴무(일)</th><th>예상 급여(원)</th><th>부업 수입</th><th>최종합계</th>
    </tr></thead><tbody>`;
  let totalFinal=0,totalSj=0;
  for(let i=0;i<activeMembers.length;i++){
    const m=activeMembers[i];
    const st=memberStats[m.id]||{totalMin:0,offDays:0,sjTotal:0};
    const th=Math.floor(st.totalMin/60),tm=st.totalMin%60;
    const wage=Number(m.wage)||0;
    const wageFinal=wage?Math.round(st.totalMin/60*wage*(m.tax?0.967:1)):0;
    const rowTotal=wageFinal+(st.sjTotal||0);
    totalFinal+=wageFinal; totalSj+=st.sjTotal||0;
    const color=COLORS[i%COLORS.length];
    tbl+=`<tr>
      <td><div class="emp-name"><span style="color:${color}">✦</span>${esc(m.name)}${m.account?`<small style="color:var(--soft);font-weight:400;font-size:.72rem"> ${esc(m.account)}</small>`:''}</div></td>
      <td>${th}시간 ${tm}분</td>
      <td>${st.offDays}</td>
      <td>${wageFinal?wageFinal.toLocaleString():0}${m.tax?'<small style="color:var(--soft);font-size:.7rem"> (3.3%)</small>':''}</td>
      <td>${st.sjTotal?(st.sjTotal).toLocaleString():'-'}</td>
      <td><strong>${rowTotal.toLocaleString()}</strong></td>
    </tr>`;
  }
  tbl+=`<tr class="total-row">
    <td colspan="3">총합계</td>
    <td>${totalFinal.toLocaleString()}</td>
    <td>${totalSj.toLocaleString()}</td>
    <td><strong>${(totalFinal+totalSj).toLocaleString()}</strong></td>
  </tr></tbody></table></div>`;
  document.getElementById('adminSummaryTable').innerHTML=tbl;

  // 달력
  const calStart=new Date(start);
  const sd=calStart.getDay();
  calStart.setDate(calStart.getDate()-(sd===0?6:sd-1));
  const calEnd=new Date(end);
  const ed=calEnd.getDay();
  calEnd.setDate(calEnd.getDate()+(ed===0?0:7-ed));

  let cal=`<div class="admin-card-inner"><div class="admin-card-title">📅 달력 (일별 직원 근무시간)</div><div class="admin-cal">`;
  for(const h of['월','화','수','목','금','토','일'])
    cal+=`<div class="admin-cal-hd">${h}</div>`;

  const cur=new Date(calStart);
  while(cur<=calEnd){
    const ds=cur.toISOString().slice(0,10);
    const inP=cur>=start&&cur<=end;
    const dow=cur.getDay();
    const isSat=dow===6,isSun=dow===0;
    const dayMems=dayData[ds]||{};
    let dayTotal=0;
    for(const mid of Object.keys(dayMems)) if(!dayMems[mid].isOff) dayTotal+=dayMems[mid].totalMin;
    const dth=Math.floor(dayTotal/60),dtm=dayTotal%60;
    const weBadge=(isSat||isSun)&&inP?`<span style="font-size:.55rem;background:var(--pink-dark);color:white;border-radius:5px;padding:0 4px">주말</span>`:'';
    cal+=`<div class="admin-cal-day${inP?'':' out-period'}${isSat?' saturday':''}${isSun?' sunday':''}">
      <div class="admin-cal-date">${cur.getMonth()+1}/${cur.getDate()} ${weBadge}</div>
      <div class="admin-cal-total">🕐 ${dth}시간 ${dtm}분</div>`;
    for(let i=0;i<activeMembers.length;i++){
      const m=activeMembers[i];
      const md=dayMems[m.id];
      const color=COLORS[i%COLORS.length];
      const mth=md&&!md.isOff?Math.floor(md.totalMin/60):0;
      const label=md?.isOff?'휴무':`${mth}시간`;
      cal+=`<div class="admin-cal-emp">
        <div class="admin-cal-emp-dot" style="background:${color}"></div>
        <span style="color:var(--soft)">${esc(m.name)}</span>
        <span style="color:${color};margin-left:2px">${label}</span>
      </div>`;
    }
    cal+='</div>';
    cur.setDate(cur.getDate()+1);
  }
  cal+='</div></div>';
  document.getElementById('adminCalGrid').innerHTML=cal;
}

function renderCards(){
  let list=members.slice();

  // 요약
  document.getElementById('sumTotal').textContent=members.length;
  document.getElementById('sumActive').textContent=members.filter(m=>m.status==='active').length;

  const grid=document.getElementById('memberGrid');
  if(!list.length){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="ico">👥</div><p>멤버가 없습니다</p></div>`;
    return;
  }

  grid.innerHTML=list.map(m=>`
    <div class="member-card${m.status==='inactive'?' inactive':''}">
      <button class="card-menu" onclick="openCtx(event,'${m.id}')">⋯</button>
      <div class="card-top">
        <div class="avatar" style="background:${avatarColor(m.name)}">${m.name.slice(0,1)}</div>
        <div class="card-info">
          <div class="card-name">${esc(m.name)}</div>
          <span>
            <span class="status-dot ${m.status==='active'?'on':'off'}"></span>
            <span class="status-txt">${m.status==='active'?'재직중':'퇴직/휴직'}</span>
          </span>
        </div>
      </div>
      <div class="card-body">
        ${m.wage?`<div class="row"><span class="ico">💰</span><span>${Number(m.wage).toLocaleString()}원/h ${m.tax?'<span style="font-size:.68rem;background:#fff3cd;color:#8a6d00;padding:1px 6px;border-radius:8px;font-weight:700">3.3%</span>':''}</span></div>`:''}
        ${m.phone?`<div class="row"><span class="ico">📞</span><span>${esc(m.phone)}</span></div>`:''}
        ${m.account?`<div class="row"><span class="ico">🏦</span><span>${esc(m.account)}</span></div>`:''}
        ${m.memo?`<div class="memo-tag">💬 ${esc(m.memo)}</div>`:''}
      </div>
      <div class="card-footer">
        <span class="card-since">${m.join?'입사 '+m.join:''}</span>
      </div>
      <button class="contract-btn${m.contractFile||m.contractUrl?' has':''}" onclick="openContractModal('${m.id}')">
        📄 ${m.contractFile||m.contractUrl?'근로계약서 보기':'근로계약서 등록'}
        ${m.contractFile&&m.contractFile.startsWith('data:image')?`<img class="contract-thumb" src="${m.contractFile}" onclick="event.stopPropagation();openLightbox('${m.id}')" title="클릭해서 크게 보기">`:''}
      </button>
    </div>
  `).join('');
}

/* ── 근로계약서 ── */
let contractFileData=null;
let contractFileName='';

function openContractModal(id){
  const m=members.find(x=>x.id===id);
  if(!m)return;
  document.getElementById('contractMemberId').value=id;
  document.getElementById('contractModalName').textContent=m.name+(m.eng?` (${m.eng})`:'');
  document.getElementById('contractFileName').textContent='';
  contractFileData=null;contractFileName='';
  // 클립보드 미리보기 초기화
  const preview=document.getElementById('contractPastePreview');
  const hint=document.getElementById('contractPasteHint');
  const area=document.getElementById('contractPasteArea');
  preview.style.display='none';preview.src='';
  hint.style.display='';area.classList.remove('has-img');
  // 현재 파일 표시
  const box=document.getElementById('contractCurrentBox');
  const link=document.getElementById('contractCurrentLink');
  if(m.contractFile){
    box.style.display='flex';
    link.href=m.contractFile;
    link.textContent=m.contractName||'파일 보기';
    if(m.contractFile.startsWith('data:image')){
      preview.src=m.contractFile;preview.style.display='block';
      hint.style.display='none';area.classList.add('has-img');
    }
  } else {
    box.style.display='none';
  }
  document.getElementById('contractModalBg').classList.add('open');
  // 포커스 → paste 이벤트 받기 위해
  setTimeout(()=>document.getElementById('contractPasteArea').focus(),100);
}

// 클립보드 붙여넣기
document.addEventListener('paste',function(e){
  if(!document.getElementById('contractModalBg').classList.contains('open'))return;
  const items=e.clipboardData&&e.clipboardData.items;
  if(!items)return;
  for(const item of items){
    if(item.type.startsWith('image/')){
      const file=item.getAsFile();
      const reader=new FileReader();
      reader.onload=ev=>{
        contractFileData=ev.target.result;
        contractFileName='clipboard_image.png';
        const preview=document.getElementById('contractPastePreview');
        const hint=document.getElementById('contractPasteHint');
        const area=document.getElementById('contractPasteArea');
        preview.src=ev.target.result;preview.style.display='block';
        hint.style.display='none';area.classList.add('has-img');
        document.getElementById('contractFileName').textContent='';
      };
      reader.readAsDataURL(file);
      break;
    }
  }
});
function closeContractModal(){document.getElementById('contractModalBg').classList.remove('open')}
function closeContractModalBg(e){if(e.target===document.getElementById('contractModalBg'))closeContractModal()}

function handleContractFile(e){
  const file=e.target.files[0];
  if(!file)return;
  if(file.size>2*1024*1024){alert('2MB 이하 파일만 첨부 가능해요');return}
  contractFileName=file.name;
  document.getElementById('contractFileName').textContent='선택됨: '+file.name;
  const reader=new FileReader();
  reader.onload=ev=>{contractFileData=ev.target.result};
  reader.readAsDataURL(file);
}

function saveContract(){
  const id=document.getElementById('contractMemberId').value;
  const m=members.find(x=>x.id===id);
  if(!m)return;
  if(contractFileData){
    m.contractFile=contractFileData;m.contractUrl='';m.contractName=contractFileName;
  } else {
    alert('클립보드 이미지를 붙여넣거나 파일을 선택해줘');return;
  }
  save();renderCards();closeContractModal();
}

function removeContract(){
  const id=document.getElementById('contractMemberId').value;
  const m=members.find(x=>x.id===id);
  if(!m)return;
  if(!confirm('근로계약서를 삭제할까요?'))return;
  m.contractUrl='';m.contractFile='';m.contractName='';
  save();renderCards();closeContractModal();
}

function openLightbox(id){
  const m=members.find(x=>x.id===id);
  if(!m||!m.contractFile)return;
  document.getElementById('lightboxImg').src=m.contractFile;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open')}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// 컨텍스트 메뉴
function openCtx(e,id){
  e.stopPropagation();
  ctxTargetId=id;
  const m=document.getElementById('ctxMenu');
  m.style.left=Math.min(e.clientX,window.innerWidth-160)+'px';
  m.style.top=Math.min(e.clientY,window.innerHeight-90)+'px';
  m.classList.add('open');
}
function closeCtx(){document.getElementById('ctxMenu').classList.remove('open')}
function ctxEdit(){closeCtx();openModal(ctxTargetId)}
async function ctxDelete(){
  closeCtx();
  if(!confirm('이 멤버를 삭제할까요?'))return;
  members=members.filter(x=>x.id!==ctxTargetId);
  await save();renderCards();if(currentTab==='admin')renderAdmin();
}
document.addEventListener('click',()=>closeCtx());

// 초기 로드
(async()=>{
  await load();
  document.getElementById('attDate').value=new Date().toISOString().slice(0,10);
// 시간 기본값 현재
const _now=new Date();
  document.getElementById('attHour').value=4;
  document.getElementById('attMin').value=0;
  ['attDate','attHour','attMin','attOff'].forEach(id=>{
    document.getElementById(id).addEventListener('change',updateAttInfo);
  });
  renderAttendance();
})();
</script>
