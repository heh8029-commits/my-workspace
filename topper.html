<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>토퍼 에디터</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Nanum+Myeongjo:wght@400;700;800&family=Nanum+Pen+Script&family=Black+Han+Sans&family=Do+Hyeon&family=Jua&family=East+Sea+Dokdo&family=Gaegu:wght@300;700&family=Single+Day&display=swap" rel="stylesheet">
<style>
@font-face { font-family:'Jalnan'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_four@1.2/JalnanOTF00.woff') format('woff'); }
@font-face { font-family:'GmarketSans'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff'); font-weight:700; }
@font-face { font-family:'HannaAge'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2021-03@1.0/HannaAge11yrs.woff') format('woff'); }
@font-face { font-family:'NanumSquareRound'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/NanumSquareRound.woff') format('woff'); }
@font-face { font-family:'SCDream'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/S-CoreDream-6Bold.woff') format('woff'); }
@font-face { font-family:'CookieRun'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/CookieRun-Regular.woff') format('woff'); }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --pink:#f7a8c0;--rose:#e03c6e;--pink-dark:#e8648a;
  --pink-pale:#fff0f5;--cream:#fff8fb;--text:#3a1a2e;--soft:#b888a8;
  --sidebar:320px;
}
html,body{height:100%;font-family:'Pretendard',-apple-system,sans-serif;background:#f2f2f5;color:var(--text)}

/* ── 탑바 ── */
.topbar{
  height:52px;background:linear-gradient(135deg,#fff2f7,#ffe0ee);
  border-bottom:2px solid var(--pink);
  display:flex;align-items:center;gap:12px;padding:0 16px;
  box-shadow:0 2px 10px rgba(232,100,138,.13);
  position:fixed;top:0;left:0;right:0;z-index:100;
}
.topbar-logo{font-size:1.3rem}
.topbar-title{font-size:1rem;font-weight:900;color:var(--rose)}
.topbar-divider{width:1px;height:24px;background:var(--pink);opacity:.5}
.size-display{
  display:flex;align-items:center;gap:6px;font-size:.82rem;font-weight:700;color:var(--soft);
}
.size-inp{
  width:58px;padding:4px 6px;border-radius:8px;
  border:1.5px solid var(--pink);font-size:.82rem;font-weight:700;
  font-family:'Pretendard',sans-serif;outline:none;text-align:center;color:var(--text);
}
.size-inp:focus{border-color:var(--rose)}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.export-btn{
  padding:8px 18px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--pink-dark),var(--rose));
  color:white;font-size:.85rem;font-weight:800;cursor:pointer;
  font-family:'Pretendard',sans-serif;
  box-shadow:0 3px 10px rgba(224,60,110,.3);
  transition:opacity .15s;white-space:nowrap;
}
.export-btn:hover{opacity:.88}

/* ── 메인 레이아웃 ── */
.main{display:flex;height:calc(100vh - 52px);margin-top:52px}

/* ── 캔버스 영역 ── */
.canvas-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  background:#d8d8d8;
  overflow:auto;
  min-width:0;
}
/* 캔버스 래퍼 */
.canvas-wrap{
  position:relative;
  box-shadow:0 8px 40px rgba(0,0,0,.18);
  border-radius:4px;
  overflow:hidden;
}

/* 선택 오브젝트 삭제 버튼 (플로팅) */
#del-float{
  display:none;position:fixed;z-index:200;
  background:#e03c6e;color:white;border:none;border-radius:8px;
  padding:5px 12px;font-size:.78rem;font-weight:800;cursor:pointer;
  font-family:'Pretendard',sans-serif;
  box-shadow:0 3px 10px rgba(224,60,110,.4);
  pointer-events:auto;
}

/* ── 사이드바 ── */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:white;border-left:2px solid #f0d0e0;
  overflow-y:auto;display:flex;flex-direction:column;gap:0;
}
.sb-section{border-bottom:1.5px solid #f7e0ed;padding:14px 16px}
.sb-title{
  font-size:.8rem;font-weight:900;color:var(--rose);
  margin-bottom:10px;display:flex;align-items:center;gap:5px;
}

/* 아이콘 그리드 */
.icon-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
.icon-btn{
  width:46px;height:46px;border-radius:10px;
  border:2px solid var(--pink);background:var(--pink-pale);
  font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .12s;user-select:none;
}
.icon-btn:hover{background:var(--pink);transform:scale(1.1)}
.upload-icon-label{
  width:46px;height:46px;border-radius:10px;
  border:2px dashed var(--pink-dark);background:white;
  font-size:.65rem;font-weight:800;color:var(--pink-dark);
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;line-height:1.3;text-align:center;transition:all .12s;
}
.upload-icon-label:hover{background:var(--pink-pale)}

/* 텍스트 */
.text-lines{display:flex;flex-direction:column;gap:8px}
.text-row{display:flex;align-items:center;gap:6px}
.line-num{font-size:.72rem;font-weight:900;color:var(--soft);min-width:14px;text-align:center}
.text-inp{
  flex:1;min-width:0;padding:7px 10px;border-radius:9px;
  border:1.5px solid var(--pink);font-size:.85rem;
  font-family:'Pretendard',sans-serif;outline:none;transition:border .12s;
}
.text-inp:focus{border-color:var(--rose)}
input[type=color]{
  width:30px;height:30px;border:2px solid var(--pink);
  border-radius:50%;padding:0;cursor:pointer;flex-shrink:0;
  background:none;
}
.line-ctrl{display:flex;gap:7px;margin-top:6px}
.line-ctrl-btn{
  padding:5px 12px;border-radius:9px;
  border:1.5px solid var(--pink);background:white;
  font-size:.78rem;font-weight:700;color:var(--rose);
  cursor:pointer;transition:all .12s;
}
.line-ctrl-btn:hover{background:var(--pink-pale)}
.font-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-top:8px}
.font-label{font-size:.73rem;color:var(--soft);font-weight:700}
.font-sel{
  padding:6px 8px;border-radius:9px;
  border:1.5px solid var(--pink);font-size:.8rem;
  font-family:'Pretendard',sans-serif;outline:none;background:white;
}
.fsize-inp{
  width:60px;padding:6px 8px;border-radius:9px;
  border:1.5px solid var(--pink);font-size:.8rem;
  font-family:'Pretendard',sans-serif;outline:none;text-align:center;
}

/* 편집 */
.edit-btns{display:flex;gap:8px;flex-wrap:wrap}
.edit-btn{
  padding:7px 14px;border-radius:10px;
  border:1.5px solid #ffb3c6;background:white;
  font-size:.78rem;font-weight:700;color:var(--rose);
  cursor:pointer;transition:all .12s;
}
.edit-btn:hover{background:#fff0f5}
.edit-btn.danger{border-color:#e03c6e;background:#fff0f5}

/* 모바일 */
@media(max-width:700px){
  :root{--sidebar:100%}
  .main{flex-direction:column}
  .canvas-area{min-height:50vw;padding:12px}
  .sidebar{width:100%;border-left:none;border-top:2px solid #f0d0e0}
}
</style>
</head>
<body>

<!-- 탑바 -->
<div class="topbar">
  <span class="topbar-logo">🎀</span>
  <span class="topbar-title">토퍼 에디터</span>
  <div class="topbar-divider"></div>
  <div class="size-display">
    <span>토퍼 크기</span>
    <input class="size-inp" type="number" id="cw-cm" value="10" min="1" max="100" step="0.5" onchange="updateCmSize()">
    <span style="color:var(--pink)">×</span>
    <input class="size-inp" type="number" id="ch-cm" value="10" min="1" max="100" step="0.5" onchange="updateCmSize()">
    <span>cm</span>
    <span id="px-hint" style="color:#ccc;font-size:.72rem;margin-left:4px">(1181×1181px)</span>
  </div>
  <div class="topbar-right">
    <button class="export-btn" onclick="exportPNG()">💾 PNG 저장</button>
  </div>
</div>

<!-- 메인 -->
<div class="main">

  <!-- 캔버스 -->
  <div class="canvas-area" id="canvas-area">
    <div class="canvas-wrap" id="canvas-wrap">
      <canvas id="topper-canvas"></canvas>
    </div>
  </div>

  <!-- 플로팅 삭제 버튼 -->
  <button id="del-float" onclick="deleteSelected()">✕ 삭제</button>

  <!-- 사이드바 -->
  <div class="sidebar">

    <!-- 아이콘 -->
    <div class="sb-section">
      <div class="sb-title">🎨 아이콘</div>
      <div class="icon-grid">
        <div class="icon-btn" onclick="addEmoji('🎀')">🎀</div>
        <div class="icon-btn" onclick="addEmoji('⭐')">⭐</div>
        <div class="icon-btn" onclick="addEmoji('🌸')">🌸</div>
        <div class="icon-btn" onclick="addEmoji('💕')">💕</div>
        <div class="icon-btn" onclick="addEmoji('🎂')">🎂</div>
        <div class="icon-btn" onclick="addEmoji('🎉')">🎉</div>
        <div class="icon-btn" onclick="addEmoji('👑')">👑</div>
        <div class="icon-btn" onclick="addEmoji('🦋')">🦋</div>
        <div class="icon-btn" onclick="addEmoji('🌟')">🌟</div>
        <div class="icon-btn" onclick="addEmoji('🌈')">🌈</div>
        <div class="icon-btn" onclick="addEmoji('🐣')">🐣</div>
        <div class="icon-btn" onclick="addEmoji('🍀')">🍀</div>
        <div class="icon-btn" onclick="addEmoji('🎵')">🎵</div>
        <div class="icon-btn" onclick="addEmoji('🌙')">🌙</div>
        <div class="icon-btn" onclick="addEmoji('🌺')">🌺</div>
        <label class="upload-icon-label">
          +<br>업로드
          <input type="file" accept="image/*" style="display:none" onchange="uploadIcon(this)">
        </label>
      </div>
    </div>

    <!-- 텍스트 -->
    <div class="sb-section">
      <div class="sb-title">✏️ 텍스트</div>
      <div class="text-lines" id="text-lines">
        <div class="text-row" data-line="0">
          <span class="line-num">1</span>
          <input class="text-inp" type="text" placeholder="첫 번째 줄" oninput="updateLine(0)">
          <input type="color" value="#ff0000" oninput="updateLine(0)" title="글자색">
        </div>
      </div>
      <div class="line-ctrl">
        <button class="line-ctrl-btn" onclick="addLine()">+ 줄 추가</button>
        <button class="line-ctrl-btn" onclick="removeLine()">− 줄 제거</button>
      </div>
      <div class="font-row">
        <span class="font-label">폰트</span>
        <select class="font-sel" id="font-sel" onchange="reRenderTexts()">
          <optgroup label="── 고딕/산세리프 ──">
            <option value="Pretendard">프리텐다드</option>
            <option value="'Nanum Gothic'">나눔고딕</option>
            <option value="GmarketSans">지마켓산스</option>
            <option value="SCDream">에스코어드림</option>
            <option value="NanumSquareRound">나눔스퀘어라운드</option>
            <option value="'Do Hyeon'">도현체</option>
            <option value="'Black Han Sans'">블랙한산스</option>
            <option value="Jua">주아체</option>
          </optgroup>
          <optgroup label="── 명조/세리프 ──">
            <option value="'Nanum Myeongjo'">나눔명조</option>
          </optgroup>
          <optgroup label="── 손글씨 ──">
            <option value="'Nanum Pen Script'">나눔펜체</option>
            <option value="Gaegu">개구쟁이체</option>
            <option value="'East Sea Dokdo'">동해독도체</option>
            <option value="'Single Day'">싱글데이</option>
            <option value="HannaAge">한나는열한살</option>
          </optgroup>
          <optgroup label="── 캐릭터/팝 ──">
            <option value="Jalnan">잘난체</option>
            <option value="CookieRun">쿠키런</option>
          </optgroup>
        </select>
        <span class="font-label">크기</span>
        <input class="fsize-inp" type="number" id="font-size" value="48" min="10" max="200" oninput="reRenderTexts()">
      </div>
    </div>

    <!-- 편집 -->
    <div class="sb-section">
      <div class="sb-title">🗑️ 편집</div>
      <div class="edit-btns">
        <button class="edit-btn" onclick="deleteSelected()">선택 항목 삭제</button>
        <button class="edit-btn danger" onclick="clearAll()">전체 초기화</button>
      </div>
      <div style="font-size:.72rem;color:#bbb;margin-top:8px">
        캔버스에서 항목 클릭 후 Delete키 또는 위 버튼으로 삭제
      </div>
    </div>

  </div>
</div>

<script>
// ── 캔버스 초기화 ──
const DISPLAY_PX = 460; // 화면 표시 크기 고정
let CW = DISPLAY_PX, CH = DISPLAY_PX;
let cmW = 10, cmH = 10;
const DPI = 300;
const CM_PER_INCH = 2.54;

const canvas = new fabric.Canvas('topper-canvas', {
  width: CW, height: CH,
  backgroundColor: '#f5f5f5'
});

// ── cm 크기 변경 ──
function updateCmSize() {
  cmW = parseFloat(document.getElementById('cw-cm').value) || 10;
  cmH = parseFloat(document.getElementById('ch-cm').value) || 10;
  const pxW = Math.round(cmW / CM_PER_INCH * DPI);
  const pxH = Math.round(cmH / CM_PER_INCH * DPI);
  document.getElementById('px-hint').textContent = '(' + pxW + '×' + pxH + 'px)';
  // 화면 캔버스는 비율만 변경
  const ratio = cmW / cmH;
  if (ratio > 1) { CW = DISPLAY_PX; CH = Math.round(DISPLAY_PX / ratio); }
  else           { CH = DISPLAY_PX; CW = Math.round(DISPLAY_PX * ratio); }
  canvas.setWidth(CW); canvas.setHeight(CH);
  canvas.renderAll();
}

// ── 아이콘(이모지) — 검정 테두리 포함 ──
function addEmoji(emoji) {
  const fs = 80;
  const sw = Math.max(10, Math.round(fs * 0.28));
  const t = new fabric.Text(emoji, {
    fontSize: fs, left: CW/2, top: CH/2,
    originX: 'center', originY: 'center',
    stroke: '#000000', strokeWidth: sw,
    strokeLineJoin: 'round', strokeLineCap: 'round',
    strokeUniform: true, paintFirst: 'stroke',
    selectable: true
  });
  canvas.add(t);
  canvas.setActiveObject(t);
  canvas.renderAll();
}

function uploadIcon(input) {
  if (!input.files[0]) return;
  const url = URL.createObjectURL(input.files[0]);
  fabric.Image.fromURL(url, function(img) {
    const maxW = CW * 0.4;
    if (img.width > maxW) img.scaleToWidth(maxW);
    img.set({
      left: CW/2, top: CH/2, originX:'center', originY:'center',
      stroke: '#000000', strokeWidth: 10, strokeUniform: true
    });
    canvas.add(img);
    canvas.setActiveObject(img);
    canvas.renderAll();
  });
  input.value = '';
}

// ── 텍스트 ──
let textObjs = [null];
const MAX_LINES = 5;

function getFontFamily() { return document.getElementById('font-sel').value; }
function getFontSize()   { return parseInt(document.getElementById('font-size').value) || 48; }

function updateLine(idx) {
  const row   = document.querySelectorAll('.text-row')[idx];
  if (!row) return;
  const inp   = row.querySelector('.text-inp');
  const col   = row.querySelector('input[type=color]');
  const val   = inp.value.trim();
  const color = col ? col.value : '#ff0000';
  const ff    = getFontFamily();
  const fs    = getFontSize();
  const sw    = Math.max(14, Math.round(fs * 0.38)); // 굵은 테두리

  if (textObjs[idx]) { canvas.remove(textObjs[idx]); textObjs[idx] = null; }
  if (!val) { canvas.renderAll(); return; }

  const rows  = document.querySelectorAll('.text-row');
  const total = rows.length;
  const gap   = fs * 1.35;
  const startY = CH/2 - ((total - 1) * gap) / 2;
  const y     = startY + idx * gap;

  // 틈 방지: 검정 배경 레이어 + 컬러 전경 레이어를 그룹으로
  const base = new fabric.Text(val, {
    fontFamily: ff, fontSize: fs,
    fill: '#000000',
    stroke: '#000000', strokeWidth: sw,
    strokeLineJoin: 'round', strokeLineCap: 'round',
    paintFirst: 'fill',
    charSpacing: -30,
    left: 0, top: 0, originX: 'center', originY: 'center',
    selectable: false, evented: false
  });
  const front = new fabric.Text(val, {
    fontFamily: ff, fontSize: fs,
    fill: color,
    charSpacing: -30,
    left: 0, top: 0, originX: 'center', originY: 'center',
    selectable: false, evented: false
  });
  const t = new fabric.Group([base, front], {
    left: CW/2, top: y,
    originX: 'center', originY: 'center',
    selectable: true
  });
  textObjs[idx] = t;
  canvas.add(t);
  canvas.renderAll();
}

function reRenderTexts() {
  document.querySelectorAll('.text-row').forEach((_,i) => updateLine(i));
}

function addLine() {
  const rows = document.querySelectorAll('.text-row');
  if (rows.length >= MAX_LINES) return;
  const idx = rows.length;
  const div = document.createElement('div');
  div.className = 'text-row';
  div.dataset.line = idx;
  div.innerHTML = `
    <span class="line-num">${idx+1}</span>
    <input class="text-inp" type="text" placeholder="${idx+1}번째 줄" oninput="updateLine(${idx})">
    <input type="color" value="#ff0000" oninput="updateLine(${idx})" title="글자색">
  `;
  document.getElementById('text-lines').appendChild(div);
  textObjs.push(null);
}

function removeLine() {
  const rows = document.querySelectorAll('.text-row');
  if (rows.length <= 1) return;
  const idx = rows.length - 1;
  if (textObjs[idx]) canvas.remove(textObjs[idx]);
  textObjs.splice(idx, 1);
  rows[idx].remove();
  reRenderTexts();
}

// ── 편집 ──
function deleteSelected() {
  const obj = canvas.getActiveObject();
  if (!obj) return;
  const ti = textObjs.indexOf(obj);
  if (ti > -1) textObjs[ti] = null;
  canvas.remove(obj);
  hideDelFloat();
  canvas.renderAll();
}

function clearAll() {
  if (!confirm('전체 초기화할까요?')) return;
  canvas.clear();
  canvas.setBackgroundColor(null, canvas.renderAll.bind(canvas));
  textObjs.fill(null);
  document.querySelectorAll('.text-inp').forEach(i => i.value = '');
  hideDelFloat();
}

// ── 플로팅 삭제 버튼 ──
const delFloat = document.getElementById('del-float');
canvas.on('selection:created', showDelFloat);
canvas.on('selection:updated', showDelFloat);
canvas.on('selection:cleared', hideDelFloat);
canvas.on('object:moving', updateDelFloatPos);

function showDelFloat(e) {
  const obj = canvas.getActiveObject();
  if (!obj) return;
  updateDelFloatPos();
  delFloat.style.display = 'block';
}
function hideDelFloat() { delFloat.style.display = 'none'; }
function updateDelFloatPos() {
  const obj = canvas.getActiveObject();
  if (!obj) return;
  const br  = document.getElementById('canvas-wrap').getBoundingClientRect();
  const objBr = obj.getBoundingRect();
  const scale = br.width / CW;
  delFloat.style.left = (br.left + objBr.left * scale + (objBr.width * scale)/2 - 30) + 'px';
  delFloat.style.top  = (br.top  + objBr.top  * scale - 36) + 'px';
}

// Delete 키
document.addEventListener('keydown', function(e) {
  if ((e.key === 'Delete' || e.key === 'Backspace') &&
      !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
    deleteSelected();
  }
});

// ── 내보내기 (300 DPI 고해상도) ──
function exportPNG() {
  const pxW = Math.round(cmW / CM_PER_INCH * DPI);
  const pxH = Math.round(cmH / CM_PER_INCH * DPI);
  const mW  = pxW / CW;
  const mH  = pxH / CH;
  const multiplier = Math.min(mW, mH);
  const dataURL = canvas.toDataURL({ format:'png', quality:1, multiplier });
  const a = document.createElement('a');
  a.href = dataURL;
  a.download = '토퍼_' + cmW + 'x' + cmH + 'cm_300dpi.png';
  a.click();
}
</script>
</body>
</html>
